<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สรุปคะแนนแบบตรวจมาตรฐาน HBO</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root { --primary: #0a6cb1; --primary-dark: #084d80; --accent: #ff8a00;
    --bg: #f4f7fb; --card: #ffffff; --border: #d6dee8; --text: #1a2a3a;
    --muted: #5c6b80; --success: #1f9d55; --warn: #d97706;
    --danger: #c2410c; --critical: #b91c1c; --skip: #6b7280; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Sarabun","Tahoma","Segoe UI",sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; }
  header { background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; padding: 14px 20px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  header h1 { margin: 0 0 4px; font-size: 17px; }
  header .subtitle { font-size: 12px; opacity: .92; }
  .container { max-width: 1280px; margin: 18px auto; padding: 0 14px 60px; }
  .card { background: var(--card); border-radius: 10px; border: 1px solid var(--border);
    box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 16px; padding: 16px 18px; }
  .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; align-items: end; }
  .filters label { display: block; font-weight: 600; font-size: 12px;
    margin-bottom: 4px; color: var(--muted); }
  .filters input, .filters select { width: 100%; padding: 9px 10px;
    border: 1px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 14px; }
  .btn { border: none; cursor: pointer; padding: 10px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 600; font-family: inherit; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-secondary { background: #eef2f6; color: var(--text); border: 1px solid var(--border); }

  .cat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin-bottom: 16px; }
  .cat-card { background: var(--card); padding: 18px; border-radius: 10px;
    border-left: 4px solid var(--primary); border: 1px solid var(--border); }
  .cat-card.cat-1 { border-left-color: #0a6cb1; }
  .cat-card.cat-2 { border-left-color: #c2410c; }
  .cat-card.cat-3 { border-left-color: #1f9d55; }
  .cat-card h3 { margin: 0 0 6px; font-size: 15px; color: var(--primary-dark); }
  .cat-card .big { font-size: 28px; font-weight: 700; color: var(--primary-dark); }
  .cat-card .mini { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .cat-card .inspectors { font-size: 11px; color: var(--muted); margin-top: 8px; }
  .not-passed-list { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  .not-passed-title { font-size: 12px; font-weight: 700; color: var(--warn); margin-bottom: 6px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .np-toggle-btn { font-size: 11px; font-weight: 600; padding: 2px 8px;
    border: 1px solid #f0b429; border-radius: 4px; background: #fffbeb; color: #92400e;
    cursor: pointer; white-space: nowrap; transition: background .15s; flex-shrink: 0; }
  .np-toggle-btn:hover { background: #fef3c7; }
  .not-passed-items { max-height: 180px; overflow-y: auto; padding-right: 4px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px 6px; }
  .not-passed-item { display: flex; align-items: baseline; gap: 6px; padding: 3px 0; font-size: 12px; }
  .not-passed-code { background: #fff3cd; color: #7c4a00; border: 1px solid #fcd96a;
    padding: 1px 7px; border-radius: 4px; font-family: "Consolas",monospace; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .not-passed-detail { color: var(--text); flex: 1; line-height: 1.4; display: none; }
  .not-passed-score { color: var(--warn); font-weight: 700; white-space: nowrap; font-size: 11px; display: none; }
  .not-passed-list.expanded .not-passed-items { display: block; }
  .not-passed-list.expanded .not-passed-item { border-bottom: 1px dashed #f0e6d3; }
  .not-passed-list.expanded .not-passed-item:last-child { border-bottom: none; }
  .not-passed-list.expanded .not-passed-detail { display: inline; }
  .not-passed-list.expanded .not-passed-score { display: inline; }

  .overall-card { background: linear-gradient(135deg, #0a6cb1, #084d80); color: white; padding: 22px; border-radius: 10px; }
  .overall-card h2 { margin: 0 0 8px; font-size: 18px; }
  .overall-card .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-top: 10px; }
  .overall-card .stat b { display: block; font-size: 24px; }
  .overall-card .stat small { opacity: .85; font-size: 12px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table th, table td { padding: 8px 10px; border-bottom: 1px solid var(--border);
    text-align: left; vertical-align: middle; }
  table th { background: #f1f5fb; font-weight: 700; color: var(--primary-dark); }
  table tr:hover td { background: #fafbfd; }
  .right { text-align: right; }
  .center { text-align: center; }

  .check-box { display: inline-block; width: 26px; height: 26px; background: #1f9d55; color: white;
    border-radius: 5px; font-size: 16px; line-height: 26px; text-align: center; font-weight: 700; }
  .strike { color: #9ca3af; text-decoration: line-through; font-size: 14px; }
  .status-text { font-weight: 600; font-size: 12px; padding: 3px 10px; border-radius: 999px; display: inline-block; }
  .status-text.submitted { color: #155724; background: #d4edda; }
  .status-text.in-progress { color: #856404; background: #fff3cd; }
  .status-text.pending { color: #9ca3af; background: #f1f5fb; }
  .missing-codes { display: flex; flex-wrap: wrap; gap: 4px; max-width: 320px; }
  .missing-code { background: #fef2f2; color: var(--critical); border: 1px solid #fecaca;
    padding: 2px 8px; border-radius: 4px; font-family: "Consolas", monospace; font-size: 11px; font-weight: 700; }
  .completion-cell { display: flex; align-items: center; gap: 8px; }
  .completion-bar { flex: 1; background: #e5e7eb; height: 6px; border-radius: 3px; overflow: hidden; min-width: 60px; }
  .completion-fill { height: 100%; background: var(--success); }
  .completion-fill.partial { background: var(--warn); }

  .section-block { background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 14px; overflow: hidden; }
  .section-block-header { background: var(--primary); color: white; padding: 10px 14px;
    font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
  .section-block-header .total-info { font-size: 12px; font-weight: 400; opacity: .9; }
  .section-block table { font-size: 13px; }
  .skip-mismatch { padding: 10px 14px; background: #fff7ed; border-top: 1px solid #fed7aa; }
  .skip-mismatch-title { font-size: 12px; font-weight: 700; color: #c2410c; margin-bottom: 6px; }
  .skip-mismatch-row { display: flex; align-items: baseline; gap: 8px; padding: 3px 0;
    font-size: 12px; flex-wrap: wrap; border-bottom: 1px dashed #fed7aa; }
  .skip-mismatch-row:last-child { border-bottom: none; }
  .skip-mismatch-code { background: #ffedd5; color: #9a3412; border: 1px solid #fdba74;
    padding: 1px 7px; border-radius: 4px; font-family: "Consolas",monospace; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .skip-mismatch-detail { color: var(--muted); flex: 1; line-height: 1.5; }
  .skip-ok { padding: 8px 14px; background: #f0fdf4; border-top: 1px solid #bbf7d0;
    font-size: 12px; color: #15803d; font-weight: 600; }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .loading { color: var(--muted); text-align: center; padding: 20px; }

  .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 14px; flex-wrap: wrap; }
  .tab { padding: 10px 18px; cursor: pointer; border: 1px solid transparent;
    border-bottom: none; border-radius: 6px 6px 0 0; font-weight: 600; font-size: 13px; color: var(--muted); }
  .tab.active { background: var(--card); color: var(--primary-dark); border-color: var(--border); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  @media (max-width: 640px) {
    .container { padding: 0 10px 60px; }
    table { font-size: 12px; }
    table th, table td { padding: 6px 8px; }
    .missing-codes { max-width: 200px; }
  }
  #print-notpassed-page { display: none; }
  .np-print-cat { margin-bottom: 18px; }
  .np-print-cat-title { font-size: 14px; font-weight: 700; background: #0a6cb1; color: #fff;
    padding: 6px 12px; border-radius: 4px; margin-bottom: 8px; }
  .np-print-empty { font-size: 12px; color: #888; padding: 4px 12px; font-style: italic; }
  .np-print-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .np-print-table th { background: #e8f0fe; padding: 6px 8px; border: 1px solid #c0c0c0;
    text-align: left; font-weight: 700; }
  .np-print-table td { padding: 5px 8px; border: 1px solid #d0d0d0; vertical-align: top; line-height: 1.4; }
  .np-print-table tr:nth-child(even) td { background: #fafafa; }
  .np-code-tag { background: #fff3cd; color: #7c4a00; border: 1px solid #fcd96a;
    border-radius: 3px; padding: 1px 6px; font-weight: 700; white-space: nowrap; }
  @media print {
    header, .filters, .toolbar, .tabs { display: none !important; }
    .tab-pane { display: block !important; }
    #print-notpassed-page {
      display: block !important;
      page-break-before: always;
      padding: 14mm 16mm;
      font-family: inherit;
    }
    .not-passed-items { max-height: none !important; overflow: visible !important; }
    .not-passed-detail, .not-passed-score { display: inline !important; }
  }
</style>
</head>
<body>

<header>
  <h1>สรุปคะแนนแบบตรวจมาตรฐานหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง</h1>
  <div class="subtitle">Admin Dashboard — แยกตามผู้ตรวจรายหัวข้อ (3 ผู้ตรวจ × 3 กลุ่ม)</div>
</header>

<div class="container">

  <div class="card">
    <div class="filters">
      <div>
        <label>หน่วยงาน</label>
        <select id="f-unit-sel" onchange="onAdminUnitChange()">
          <option value="">ทั้งหมด</option>
          <option value="รพ.สมเด็จพระนางเจ้าสิริกิติ์ พร.">รพ.สมเด็จพระนางเจ้าสิริกิติ์ พร.</option>
          <option value="รพ.อาภากร ฐท.สส.">รพ.อาภากร ฐท.สส.</option>
          <option value="รพ.ฐท.สข.ทรภ.2">รพ.ฐท.สข.ทรภ.2</option>
          <option value="รพ.ฐท.พง.ทรภ.3">รพ.ฐท.พง.ทรภ.3</option>
          <option value="__other__">ระบุเอง...</option>
        </select>
        <input type="text" id="f-unit" placeholder="พิมพ์ชื่อหน่วยงาน" style="display:none;margin-top:6px;">
      </div>
      <div>
        <label>วันที่ตรวจ</label>
        <input type="date" id="f-date">
      </div>
      <div>
        <button class="btn btn-primary" id="btn-load">⤓ ดึงข้อมูลจาก Google Sheets</button>
      </div>
      <div>
        <button class="btn btn-success" id="btn-export">⤓ Export Excel</button>
        <button class="btn btn-secondary" id="btn-print">🖨 พิมพ์</button>
      </div>
    </div>
  </div>

  <div id="summary-area">
    <div class="empty">กรอก URL ของ Google Apps Script ในไฟล์นี้ แล้วกด "ดึงข้อมูล"</div>
  </div>

</div>

<script>

const DATA = [{"category":"อำนวยการ","title":"หมวดอำนวยการ (Administration)","sections":[{"sheet":"อำนวยการ HBOG","code_prefix":"HBOG","title":"1. HYPERBARIC GOVERNANCE (การกำกับดูแลด้านเวชศาสตร์ความดันบรรยากาศสูง) (การกำกับดูแลด้านเวชศาสตร์ความดันบรรยากาศสูง)","items":[{"code":"HBOG 1.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงเป็นหน่วยงานที่ถูกกฎหมายหรืออยู่ภายใต้องค์กรที่ถูกกฎหมาย","inspection":"เอกสารอธิบายสถานภาพทางกฎหมายขององค์กรหรือสถานพยาบาล\n-เอกชนต้องมีการจดทะเบียน\n-การจัดโครงสร้างของหน่วยงานภาครัฐ"},{"code":"HBOG 2.0","critical":false,"detail":"ฝ่ายบริหารมีการกำหนด วิสัยทัศน์ พันธกิจ ยุทธศาสตร์ของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- เอกสารอธิบายภารกิจ เป้าหมาย และวัตถุประสงค์ของสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง\n(ครอบคลุมเรื่องความปลอดภัย)"},{"code":"HBOG 2.1","critical":true,"detail":"ฝ่ายบริหารต้องทำให้มั่นใจว่าหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงนั้นมีทรัพยากรและมีบุคลากรเพียงพอที่เหมาะสมที่จะปฏิบัติงานตามวิสัยทัศน์ พันธกิจ ยุทธศาสตร์","inspection":"-อัตรา อฉก.ปกติ และบูรณาการ\n-ตารางการปฏิบัติงานประจำวัน\n-คำสั่งช่วยราชการของบุคลากรที่ไม่ได้ประจำหน่วย\n-ข้อมูลการบริหารทรัพยากรบุคคล"},{"code":"HBOG 2.2","critical":true,"detail":"ฝ่ายบริหารจัดเตรียมโครงสร้างองค์กร \nและระบุความสัมพันธ์ในแต่ละตำแหน่งขององค์กร\nด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"-JD JS\n-โครงสร้าง แพทย์ พยาบาล และจนท.ปรับฯ"},{"code":"HBOG 2.3","critical":true,"detail":"ฝ่ายบริหารนำข้อบังคับ นโยบาย กฎระเบียบและขั้นตอน มาปรับใช้ หรือกำหนดขึ้นใหม่เป็นลายลักษณ์อักษรให้สอดคล้องกัน\nเพื่อการจัดการที่เหมาะสมขององค์กร","inspection":"กฎออกโดยผู้มีหน้าที่กำกับดูแล\nสำหรับการบริหารจัดการสถานพยาบาล\nด้านเวชศาสตร์ความดันบรรยากาศสูง"},{"code":"HBOG 2.4","critical":true,"detail":"ฝ่ายบริหารตรวจสอบปัญหาทั้งหมด\nทั้งทางด้านกฎหมายและการแพทย์ซึ่งเกี่ยวข้องกับหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง\nและเจ้าหน้าที่ และแก้ไขตามที่เห็นสมควร","inspection":"-การจัดการความเสี่ยง\n-risk profile\n-ตัวอย่างการรายงานความเสี่ยง"},{"code":"HBOG 2.5","critical":true,"d e,"detail":"ผู้อำนวยการด้านความปลอดภัย (Safety Director) หรือผู้รับผิดชอบด้านเทคนิค (หากมีแต่งตั้ง) ทำงานร่วมกันอย่างใกล้ชิดกับผู้อำนวยการด้านการแพทย์เพื่อกำหนดคุณสมบัติขั้นต่ำของเจ้าหน้าที่ ประสบการณ์ และองค์ประกอบอื่น ๆ โดยพิจารณาจากจำนวนและประเภทของห้องปรับความดันบรรยากาศสูงที่มีใช้งาน ความสามารถในการให้การรักษาสูงสุด และประเภทของการรักษาตามปกติให้กับผู้ป่วยด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"เอกสารแสดงการมีส่วนร่วมของผู้อำนวยการด้านความปลอดภัยในการพัฒนานโยบายที่เกี่ยวกับความปลอดภัย การบำรุงรักษา การจัดเจ้าหน้าที่ และการปฏิบัติงานของสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง"},{"code":"HBOA 7.0","critical":true,"detail":"มีการพัฒนากฎและระเบียบต่าง ๆ สำหรับการจัดการก๊าซอย่างปลอดภัยในหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""}]},{"sheet":"อำนวยการ HBOQI","code_prefix":"HBOQI","title":"16. HYPERBARIC QUALITY IMPROVEMENT","items":[{"code":"HBOQI 1.0","critical":true,"detail":"มีโครงการที่เกี่ยวข้องกับการปรับปรุงคุณภาพงานด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOQI 1.1","critical":false,"detail":"มีโครงการปรับปรุงคุณภาพงานด้านเวชศาสตร์ความดันบรรยากาศสูง ทั้งในเรื่องทางการรักษา การจัดการ ค่าใช้จ่ายในการดูแล และผลในการรักษาผู้ป่วย","inspection":""},{"code":"HBOQI 1.2","critical":true,"detail":"มีการตั้งตัวชี้วัดของงานด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOQI 1.3","critical":true,"detail":"มีการประเมินผลงานตามตัวชี้วัด","inspection":""},{"code":"HBOQI 2.0","critical":true,"detail":"นำผลของการประเมินมาปรับปรุงกระบวนการให้มีการพัฒนาอย่างต่อเนื่อง","inspection":""},{"code":"HBOQI 2.1","critical":true,"detail":"ตัวอย่างกิจกรรมการปรับปรุงคุณภาพขั้นตอนด้านเวชศาสตร์ความดันบรรยากาศสูงรวมถึง (แต่ไม่จำกัดเฉพาะ) การประเมินหัวข้อในการดูแลผู้ป่วยด้านเวชศาสตร์ความดันบรรยากาศสูงดังต่อไปนี้\nA. ผลที่ไม่คาดคิดหรือความยุ่งยากในการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง\nB. ผลในการรักษาและรูปแบบการปฏิบัติงานของผู้ให้บริการด้านเวชศาสตร์ความดันบรรยากาศสูง\nC. การตรวจสอบเวชระเบียนเพื่อคุณภาพในการรักษาและความสมบูรณ์ของข้อมูล\nD. การให้บริการทางวิชาชีพอื่น ๆ ที่เตรียมไว้ให้\nE. การประเมินความพอใจของผู้ป่วย\nF. ความคิดเห็นของเจ้าหน้าที่\nG. การเข้าถึงได้\nH. ปัญหาทางการแพทย์/กฎหมาย\nI. การปฏิบัติที่ไม่มีประโยชน์\nJ. การตรวจสอบการใช้ประโยชน์\nK. การแสดงความไม่พอใจของผู้ป่วย","inspection":""},{"code":"HBOQI 2.2","critical":true,"detail":"ผู้ปฏิบัติงานด้านเวชศาสตร์ความดันบรรยากาศสูง (Hyperbaric Practitioners) ประเมินความถี่ ความรุนแรง และสาเหตุของปัญหาที่เกี่ยวข้องกับเวชศาสตร์ความดันบรรยากาศสูงอันไม่คาดคิด","inspection":""},{"code":"HBOQI 2.3","critical":true,"detail":"กิจกรรมที่เกี่ยวข้องกับการปรับปรุงคุณภาพการทำงาน ต้องเก็บข้อมูลอย่างเป็นระบบ และนำมาวิเคราะห์ผลอย่างต่อเนื่อง","inspection":""},{"code":"HBOQI 2.4","critical":true,"detail":"วิเคราะห์ความผิดพลาดในการทำงานเพื่อนำมาสู่การปรับปรุง","inspection":""},{"code":"HBOQI 2.5","critical":true,"detail":"ระบุการเปลี่ยนแปลงที่จะนำไปสู่การปรับปรุงคุณภาพเพื่อลดความเสี่ยงที่จะเกิดกับผู้ป่วยด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOQI 2.6","critical":true,"detail":"สิ่งที่พัฒนาปรับปรุงคุณภาพมีการจัดเก็บอย่างเหมาะสม","inspection":"เอกสารที่แสดงให้เห็นขอบเขตของแนวคิดในการปรับปรุงคุณภาพของสถานพยาบาลและผลการปฏิบัติ"},{"code":"HBOQI 3.0","critical":true,"detail":"มีบุคลากรหรือคณะกรรมการรับผิดชอบโครงการการจัดการความเสี่ยงด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":""}]},{"sheet":"อำนวยการ HBOPI","code_prefix":"HBOPI","title":"17. HYPERBARIC PROFESSIONAL IMPROVEMENT","items":[{"code":"HBOPI 1.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีห้องสมุดหรือแหล่งความรู้อ้างอิงด้านเวชศาสตร์ความดันบรรยากาศสูง ที่เจ้าหน้าที่สามารถเข้าถึงได้","inspection":""},{"code":"HBOPI 2.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีการแนะนำเบื้องต้นและฝึกอบรมเพื่อให้บุคลากรทั้งหมดคุ้นเคยกับนโยบาย ขั้นตอน หรือข้อมูลอื่น ๆ ของสถานพยาบาล","inspection":""},{"code":"HBOPI 3.0","critical":false,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงสนับสนุนการมีส่วนร่วมในสัมมนา การประชุมเชิงปฏิบัติงาน และกิจกรรมทางการเรียนรู้อื่น ๆ ซึ่งเกี่ยวข้องกับการปฏิบัติงานของเวชศาสตร์ความดันบรรยากาศสูงและความปลอดภัยของสถานพยาบาล","inspection":""},{"code":"HBOPI 4.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงตรวจสอบใบอนุญาตและประกาศนียบัตรของเจ้าหน้าที่ที่ปฏิบัติงานต่อตามข้อกำหนด","inspection":"นโยบายเกี่ยวกับการใช้ข้อกำหนดสำหรับใบอนุญาตและประกาศนียบัตรที่ต่ออายุ"}]},{"sheet":"อำนวยการ HBOL","code_prefix":"HBOL","title":"18. HYPERBARIC LEADERSHIP","items":[{"code":"HBOL 1.0","critical":false,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior hyperbaric leaders)เตรียมการสำหรับการวางแผนโครงการด้านเวชศาสตร์ความดันบรรยากาศสูงโดยกำหนดพันธกิจ วิสัยทัศน์ และ ค่านิยม ของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง และสร้างแผนงานและนโยบายเชิงกลยุทธ์ ด้านการดำเนินงาน ด้านโครงการ และอื่น ๆ เพื่อให้บรรลุภาระหน้าที่และวิสัยทัศน์ของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOL 1.1","critical":true,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior hyperbaric leaders)\nมีหน้าที่ในการถ่ายทอด วิสัยทัศน์ พันธกิจ \nและแผนงานของหน่วย","inspection":""},{"code":"HBOL 1.2","critical":false,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior hyperbaric leaders)\nมีหน้าที่ในการจัดลำดับความสำคัญ\nและระบุแนวทางในการพัฒนาองค์กร","inspection":""},{"code":"HBOL 2.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีการดูแลผู้ป่วยเป็นไปตามเป้าหมายและขอบเขตของการบริการที่เขียนไว้เป็นลายลักษณ์อักษร","inspection":""},{"code":"HBOL 3.0","critical":true,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior hyperbaric leaders)\nมีแผนการบริหารและพัฒนาบุคลากร\nเจ้าหน้าที่เวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOL 3.1","critical":true,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior hyperbaric leaders) ดำเนินการตามแผนการบริหารและพัฒนาบุคลากร เจ้าหน้าที่เวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOL 4.0","critical":true,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior Hyperbaric Leaders)\nวางแนวทางให้หน่วยมีบุคลากรที่มีคุณสมบัติและมีคุณภาพจำนวนเพียงพอสำหรับการดูแลรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- เอกสารแนวทางการประเมินของหน่วยงาน"},{"code":"HBOL 5.0","critical":false,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior Hyperbaric Leaders)\nมีส่วนร่วมใน กิจกรรมพัฒนาคุณภาพของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOL 5.2","critical":true,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior Hyperbaric Leaders) มอบหมายให้บุคลากรของหน่วยงานเข้าร่วมในกิจกรรมการปรับปรุงผลงาน","inspection":"เอกสารกำหนดหน้าที่ความรับผิดชอบสำหรับการปฏิบัติตามคำแนะนำจากกิจกรรมปรับปรุงผลการทำงาน\n-หัวหน้างานมีการมอบหมายงานให้บุคลากร"},{"code":"HBOL 5.3","critical":true,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior Hyperbaric Leaders)\nให้บุคลากรมีเวลาเพียงพอในการเข้าร่วมกิจกรรมพัฒนาคุณภาพ","inspection":"- มีระยะเวลาในการทำงานที่เหมาะสม"},{"code":"HBOL 5.4","critical":false,"detail":"ผู้ปฏิบัติงานอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูง (Senior Hyperbaric Leaders) ส่งเสริมให้บุคลากรได้รับการอบรม ในหลักสูตรที่เกี่ยวข้องกับการพัฒนาคุณภาพ","inspection":"เอกสารแสดงให้เห็นว่าผู้นำระดับอาวุโสด้านเวชศาสตร์ความดันบรรยากาศสูงให้โอกาสบุคลากรทางการศึกษาที่เกี่ยวข้องกับการปรับปรุงผลการทำงาน"}]},{"sheet":"อำนวยการ HBOHR","code_prefix":"HBOHR","title":"19. HYPERBARIC HUMAN RESOURCES","items":[{"code":"HBOHR 1.0","critical":true,"detail":"ผู้บริหารระดับสูงของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงกำหนดคุณสมบัติและผลการปฏิบัติงานที่คาดหวังของเจ้าหน้าที่ด้านเวชศาสตร์ความดันบรรยากาศสูงทั้งหมด","inspection":"เอกสารอธิบายรายละเอียดหน้าที่การทำงานของบุคลากรสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูงทั้งหมด\n- JD/JS\n- KPI"},{"code":"HBOHR 2.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูง\nมีบุคลากรซึ่งมีคุณสมบัติที่ตรงกับหน้าที่ความรับผิดชอบในการปฏิบัติงานเพียงพอ","inspection":"-ใบ certificate\n-CNEU\n-portfolio"},{"code":"HBOHR 2.1","critical":false,"detail":"มีแพทย์หรือพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง ที่ผ่านการอบรมและได้รับการรับรอง อย่างน้อยสองราย เป็นบุคลากรประจำ \n(Full Time Staff) ในการดำเนินการรักษาผู้ป่วยแรงดันบรรยากาศสูง","inspection":"เกณฑ์ให้คะแนน\n4 มีครบ แพทย์ พยาบาล พี่เลี้ยง\n3 มีครบ ต้องเสริมด้วย part time\n2 ไม่ครบ ปฏิบัติงานได้ต่อเนื่องไม่ได้\n1 มี 1 คน ไม่สามารถปฏิบัติงานได้\n0 ไม่มี"},{"code":"HBOHR 2.1.1","critical":true,"detail":"แพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูงซึ่งผ่านการอบรมและการรับรอง ได้รับแต่งตั้งและรับผิดชอบดูแลตำแหน่งหน้าที่ของผู้อำนวยการด้านการแพทย์ (Medical Director)","inspection":"-คำสั่งแต่งตั้งจาก พร. \n(มีตารางแพทย์รับ consult)"},{"code":"HBOHR 2.1.2","critical":false,"detail":"การจัดตารางแพทย์หรือพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูงครอบคลุมการให้คำปรึกษาตลอด 24 ชั่วโมงของเวชศาสตร์ความดันบรรยากาศสูง","inspection":"-ตารางเวรแพทย์ในเวลาราชการ\n-ตารางเวรแพทย์นอกเวลาราชการ"},{"code":"HBOHR 2.1.3","critical":true,"detail":"มีแพทย์หรือพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง สามารถให้การประเมินและรักษาผู้ป่วย ได้ในเวลาที่เหมาะสม","inspection":"-ตารางเวรแพทย์ในเวลาราชการ\nและนอกเวลาราชการ\n-แผนการทำงานในเวลาราชการ\nและนอกเวลาราชการ"},{"code":"HBOHR 2.1.4","critical":true,"detail":"แพทย์หรือพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง ต้องรับผิดชอบในการดูแลผู้ป่วยในระหว่างรับการรักษาในห้องปรับความดันบรรยากาศสูง","inspection":""},{"code":"HBOHR 2.1.5","critical":true,"detail":"มีการจัดอัตราของแพทย์ พยาบาล ในสัดส่วนที่เหมาะสม กับจำนวนผู้รับบริการของสถานพยาบาลนั้น ๆ","inspection":""},{"code":"HBOHR 2.1.7","critical":true,"detail":"การจัดตารางแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูงทำให้แน่ใจได้ว่าแพทย์มีเวลาพักผ่อนและฟื้นฟูตนเองเพียงพอ","inspection":""},{"code":"HBOHR 2.2","critical":true,"detail":"ในระหว่างการรักษาต้องมีพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูงอยู่ตลอดเวลาที่ผู้ป่วยได้รับการรักษา","inspection":"ระบุอัตราขั้นต่ำของเจ้าหน้าที่ ที่ใช้ในการทำงานของ MonoHBC และ MultiHBC"},{"code":"HBOHR 2.2.1","critical":true,"detail":"สถานพยาบาลจะต้องมีพยาบาลที่มีขีดความสามารถเหมาะสมสอดคล้องกับผู้ป่วยที่ได้รับการรักษาในห้องปรับความดันบรรยากาศสูง เช่น การดูแลบาดแผล การดูแลผู้ป่วยวิกฤต","inspection":""},{"code":"HBOHR 2.2.5","critical":true,"detail":"สถานพยาบาลจะต้องมีการกำหนดขอบเขตสิ่งที่กระทำได้หรือสิ่งที่ไม่ควรกระทำสำหรับพยาบาลที่เป็นเจ้าหน้าที่ที่มิได้เป็นพยาบาลเวชศาสตร์ความดันบรรยากาศสูง","inspection":"เอกสารกำหนดกิจกรรม\nพยาบาลวิชาชีพ"},{"code":"HBOHR 2.3","critical":true,"detail":"มีเจ้าหน้าที่เทคนิคด้านความดันบรรยากาศสูงหรือเจ้าหน้าที่เวชศาสตร์ความดันบรรยากาศสูงที่ได้รับการอบรมอย่างน้อยหนึ่งรายคอยประจำการในหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงเมื่อมีการปฏิบัติงานห้องปรับความดันบรรยากาศสูงซึ่งไม่เกี่ยวข้องกับการรักษา","inspection":"เอกสารแสดงข้อกำหนดให้มีเจ้าหน้าที่\nสายเวชศาสตร์ใต้น้ำประจำอยู่\nในหน่วยงาน (พยาบาล/ช่างเทคนิค)"},{"code":"HBOHR 3.0","critical":true,"detail":"การจัดเจ้าหน้าที่ด้านเวชศาสตร์ความดันบรรยากาศสูงเพื่อให้การรักษาด้านเวชศาสตร์ความดันบรรยากาศสูงที่ปลอดภัยนั้นต้องคำนึงถึงปัจจัยดังต่อไปนี้\nA. ประเภทและจำนวนของห้องปรับความดันบรรยากาศสูงที่ใช้ในหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง\nB. จำนวนผู้ป่วยที่เข้ารับการรักษาที่คาดไว้\nC. ประเภทของการรักษาผู้ป่วยที่คาดไว้ (ประจำวันหรือฉุกเฉิน)\nD. จำนวนการรักษาผู้ป่วยที่ต้องกระทำในแต่ละวัน\nE. สถานที่ตั้งของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง (อยู่ในโรงพยาบาล คลินิก หรือไม่ขึ้นกับองค์กรใด)\nF. ระดับประสบการณ์ของพยาบาลและเจ้าหน้าที่เทคนิคที่มีอยู่\nG. ระดับของการสนับสนุนทางเทคนิคเพิ่มเติม (เจ้าหน้าที่บำรุงรักษาของโรงพยาบาล ฯลฯ)","inspection":""},{"code":"HBOHR 4.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูง\nมีขั้นตอนการแนะนำเบื้องต้นเพื่อให้เจ้าหน้าที่ด้านเวชศาสตร์ความดันบรรยากาศสูงรายใหม่คุ้นเคยกับงานและการประเมินผลงาน เพื่อให้ทำงานตามหน้าที่ที่รับผิดชอบได้อย่างเต็มความสามารถ","inspection":"ร่างเอกสารการแนะนำเบื้องต้นสำหรับเจ้าหน้าที่ใหม่ของสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง"},{"code":"HBOHR 4.1","critical":false,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีการอบรมระหว่างการทำงานอยู่เสมอและโครงการเรียนรู้ อื่น ๆ เพื่อรักษาและพัฒนาประสิทธิภาพของเจ้าหน้าที่ด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"เอกสารระบุว่ามีการอบรมในระหว่างการทำงานให้กับเจ้าหน้าที่เพื่อรักษาและปรับปรุงผลการทำงานของเจ้าหน้าที่"},{"code":"HBOHR 4.2","critical":false,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงประเมินความสามารถของเจ้าหน้าที่ด้านเวชศาสตร์ความดันบรรยากาศสูงแต่ละรายว่าเป็นไปตามผลงานที่คาดหวังไว้ซึ่งระบุไว้ในรายละเอียดหน้าที่ของงาน","inspection":"เอกสารระบุว่าเจ้าหน้าที่มีผลการปฏิบัติงานเป็นไปตามการประเมินผลการทำงานตามที่กำหนดไว้ในรายละเอียดความรับผิดชอบของงาน"}]},{"sheet":"อำนวยการ HBOTP","code_prefix":"HBOTP","title":"23. HYPERBARIC TEACHING AND PUBLICATION","items":[{"code":"HBOTP 1.0","critical":true,"detail":"สำหรับหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงซึ่งมีส่วนเกี่ยวข้องในกิจกรรมการให้ความรู้ ต้องมีนโยบายการจัดสรรเวลาให้เหมาะสม  นอกเหนือไปจากงานดูแลผู้ป่วย","inspection":"- มีการให้ความรู้\nผ่านการประชาสัมพันธ์หน่วย\n- มีการจัดประชุม สัมมนา\nในหน่วย และนอกหน่วย\n- เกณฑ์การให้คะแนน\n4 มีผลงานวิจัย/ ทำตำรา\n3 นำเสนองานวิชาการ/ ประชุม\n2 สอน\n1 social media"},{"code":"HBOTP 2.0","critical":false,"detail":"สำหรับหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงซึ่งมีส่วนเกี่ยวข้องในกิจกรรมการออกสู่สาธารณะ  ต้องมีนโยบายเพื่อจัดการกับรายการดังนี้\nA. ได้รับการอนุมัติจากฝ่ายบริหาร เมื่อแสดงความคิดเห็น ประกาศนโยบาย และขั้นตอนในการที่จะแสดงออกสู่สาธารณะ \nB. ข้อกำหนดและเงื่อนไขของค่าตอบแทนและค่าใช้จ่ายของการแสดงออกสู่สาธารณะ","inspection":"- เอกสารอธิบายนโยบายของสถานพยาบาลที่เกี่ยวกับกิจกรรมการให้ความรู้และการจัดพิมพ์\n- สำเนาของเอกสารควบคุมทั้งหมด\n(แผนการแนะนำ ฯลฯ) สำหรับหลักสูตรที่สอนโดยเจ้าหน้าที่ของสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง\n- สำเนาของเอกสารทั้งหมดที่ส่งไปยังกองเวชศาสตร์ใต้น้ำและการบิน กรมแพทย์ทหารเรือ เพื่อการตรวจสอบและอนุมัติหลักสูตร\nสำเนาของบทคัดย่อ บทความ เอกสารทางวิทยาศาสตร์ ฯลฯ\nที่จัดพิมพ์หรือนำเสนอโดยเจ้าหน้าที่ของสถานพยาบาลภายในระยะเวลาสามปีก่อนการสำรวจ"},{"code":"HBOTP 3.0","critical":false,"detail":"เจ้าหน้าที่หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีส่วนเกี่ยวข้องในกิจกรรมการให้ความรู้ชุมชนทางการแพทย์และบุคคลทั่วไปซึ่งเกี่ยวข้องกับงานด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":""}]},{"sheet":"อำนวยการ HBOCR","code_prefix":"HBOCR","title":"24. HYPERBARIC CLINICAL RESEARCH","items":[{"code":"HBOCR 1.0","critical":true,"detail":"สำหรับหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงซึ่งมีส่วนเกี่ยวข้องกับงานวิจัยเพื่อการรักษา กิจกรรมการวิจัยนั้นให้กระทำตามหลักการของจริยธรรมการวิจัย ตามข้อกำหนดทางกฎหมาย กิจกรรมเหล่านี้มีการตรวจสอบเป็นระยะ","inspection":"- สำเนาของรายงานการวิจัยเพื่อการรักษาที่ได้รับอนุมัติจาก IRB ทั้งหมดซึ่งกระทำในช่วงสามปีก่อนการสำรวจ\n- ผลการวิจัยเพื่อการรักษาที่ได้รับอนุมัติจาก IRB ทั้งหมดซึ่งกระทำในช่วงสามปีก่อนการสำรวจ"},{"code":"HBOCR 1.1","critical":true,"detail":"มีคณะกรรมการจริยธรรมวิจัยกรมแพทย์ทหารเรือ หรือหน่วยงานที่มีฐานะเท่าเทียมกันเป็นผู้อนุมัติลำดับขั้นตอนงานวิจัยเพื่อการรักษา","inspection":"สำเนาของรายงานการวิจัยเพื่อการรักษาที่ได้รับอนุมัติจาก IRB ทั้งหมดซึ่งกระทำในสถานพยาบาลในปัจจุบัน"},{"code":"HBOCR 1.2","critical":false,"detail":"งานวิจัยเพื่อการรักษาซึ่งกระทำในหน่วยงาน  เวชศาสตร์ความดันบรรยากาศสูงนั้นเหมาะสมต่อความเชี่ยวชาญของเจ้าหน้าที่ด้านเวชศาสตร์ความดันบรรยากาศสูงและทรัพยากรของสถานพยาบาล","inspection":""},{"code":"HBOCR 1.3","critical":false,"detail":"บุคลากรด้านเวชศาสตร์ความดันบรรยากาศสูงที่ทำการวิจัยได้รับการสนับสนุนงานวิจัยอย่างเหมาะสม","inspection":""},{"code":"HBOCR 1.4","critical":true,"detail":"มีขั้นตอนเพื่อให้แน่ใจว่าสิทธิและสวัสดิภาพของผู้เข้าร่วมงานวิจัยทั้งหมดนั้นได้รับการปกป้องอย่างเพียงพอ และมีวิธีการที่เหมาะสมในการขอเอกสารแสดงความยินยอมจากผู้เข้าร่วมงานวิจัยโดยใช้ภาษาที่ผู้เข้าร่วมงานวิจัยเข้าใจ","inspection":""},{"code":"HBOCR 1.5","critical":true,"detail":"เจ้าหน้าที่ทั้งหมดของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงรับทราบนโยบายการวิจัยของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""}]}]},{"category":"ความปลอดภัย","title":"หมวดความปลอดภัย (Safety)","sections":[{"sheet":"ความปลอดภัย HBOO","code_prefix":"HBOO","title":"3. HYPERBARIC OPERATIONS","items":[{"code":"HBOO 1.0","critical":true,"detail":"มีการเตรียมกฎและระเบียบสำหรับขั้นตอนฉุกเฉินให้กับหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOO 1.1","critical":true,"detail":"มีเอกสารขั้นตอนเกี่ยวกับอัคคีภัยในห้องปรับแรงดันฯ เหตุฉุกเฉินจากอุปกรณ์ และทางกายภาพ ซึ่งเจ้าหน้าที่ด้านเวชศาสตร์ความดันบรรยากาศสูงซ้อมแผนอย่างน้อยปีละครั้ง","inspection":"เอกสารแสดงขั้นตอนฉุกเฉินซึ่งฝึกซ้อมเป็นประจำโดยบุคลากรของสถานพยาบาล"},{"code":"HBOO 1.2","critical":true,"detail":"มีการบันทึกการฝึกอบรมระหว่างการปฏิบัติงานในหัวข้อด้านความปลอดภัยทางเวชศาสตร์ความดันบรรยากาศสูงที่คัดเลือกมา เช่น การซ้อมหนีไฟ เหตุฉุกเฉินกับผู้ป่วยสมมติ การจำลองการเสียหายของอุปกรณ์ อากาศปนเปื้อน การปรับปรุงกฎหมาย และมาตรฐาน","inspection":"เอกสารแสดงการอบรมในระหว่างการทำงานด้านความปลอดภัยเป็นประจำ"},{"code":"HBOO 1.3","critical":true,"detail":"บุคลากรด้านเวชศาสตร์ความดันบรรยากาศสูงทุกรายได้รับการอบรมด้านขั้นตอนการลดแรงดันในห้องปรับความดันบรรยากาศสูงอย่างฉุกเฉินเมื่ออุปกรณ์ไฟฟ้าทั้งหมดไม่สามารถใช้งานได้","inspection":"เอกสารแสดงให้เห็นว่าบุคลากรทั้งหมดได้รับการอบรมด้านขั้นตอนการปรับลดแรงดันฉุกเฉิน"},{"code":"HBOO 1.4","critical":true,"detail":"ระหว่างควบคุมการใช้งานห้องปรับความดันบรรยากาศสูงด้วยบุคคล ผู้ปฏิบัติงานห้องปรับความดันบรรยากาศสูงต้องอยู่ประจำและคอยสังเกตเครื่องควบคุมห้องปรับความดันบรรยากาศสูงอยู่เสมอทั้งจากภาพและเสียง","inspection":""},{"code":"HBOO 2.0","critical":true,"detail":"การสูบบุหรี่ เปลวไฟ วัตถุมีอุณหภูมิสูง และแหล่งพลังงานอัลตราไวโอเลต ซึ่งอาจทำให้เครื่องตรวจจับอัคคีภัย (หากติดตั้ง) ทำงานก่อนเวลาอันควรได้นั้นไม่อนุญาตให้นำเข้าไปใน, อยู่ด้านนอก, หรืออยู่บริเวณใกล้กับห้องปรับความดันบรรยากาศสูง","inspection":""},{"code":"HBOO 2.1","critical":true,"detail":"ไม่อนุญาตให้นำ วัตถุ ของเหลว หรือไอระเหยไวไฟเข้าไปในห้องปรับแรงดันบรรยากาศสูงประเภท Class A เว้นเสียแต่ได้รับการอนุมัติจาก ผู้อำนวยการด้านความปลอดภัย(Safety Director)","inspection":""},{"code":"HBOO 2.2","critical":true,"detail":"วัตถุ ของเหลว หรือไอระเหยไวไฟไม่อนุญาตให้นำเข้าไปในห้องปรับแรงดันบรรยากาศสูงประเภท Class B","inspection":""},{"code":"HBOO 3.1","critical":true,"detail":"มีการใช้ขั้นตอนการป้องกันการเกิดไฟฟ้าสถิตซึ่งกำหนดโดย ผู้อำนวยการด้านความปลอดภัย (Safety Director) เมื่อใดก็ตามที่บรรยากาศในห้องปรับแรงดันมีออกซิเจนมากกว่า 23.5% โดยปริมาตร","inspection":""},{"code":"HBOO 3.2","critical":true,"detail":"สำหรับห้องปรับแรงดันบรรยากาศสูงประเภท\nClass A หรือ Class B ซึ่งในบรรยากาศมีออกซิเจนมากกว่า 23.5% โดยปริมาตร จะมีการต่อสายดินเข้ากับผู้ป่วยโดยใช้สายตัวนำไฟฟ้าที่มีความต้านทานสูงสัมผัสกับผิวหนังของผู้ป่วย","inspection":"ห้องปรับแรงดันประเภท Class B\nจำเป็นต้องปฏิบัติตามข้อกำหนดนี้"},{"code":"HBOO 4.0","critical":true,"detail":"ผ้าที่ผลิตจากผ้าไหม ผ้าขนสัตว์ หรือผ้าใยสังเคราะห์ไม่อนุญาตให้นำเข้าไปภายในห้องปรับความดันบรรยากาศสูงประเภท Class A หรือ Class B เว้นเสียแต่ได้รับการอนุมัติโดย ผู้อำนวยการด้านความปลอดภัย (Safety Director)","inspection":""},{"code":"HBOO 4.1","critical":true,"detail":"เสื้อผ้าที่ใช้ในห้องปรับความดันบรรยากาศสูงประเภท Class A และ Class B ทำจาก 100% cotton หรือผ้าผสม cotton/polyester โดย polyester ไม่เกิน 50%","inspection":"เอกสารแสดงข้อกำหนดด้านเสื้อผ้าของผู้ป่วยและได้รับอนุมัติจากผู้อำนวยการด้านความปลอดภัยของห้องปรับความดันบรรยากาศสูง"},{"code":"HBOO 4.2","critical":true,"detail":"อุปกรณ์ต้องห้าม เช่น อุปกรณ์เย็บแผล (Suture Material) อุปกรณ์แอลโลพลาสติก (Alloplastic Devices) อุปกรณ์ป้องกันแบคทีเรีย (Bacterial Barriers) อุปกรณ์ตกแต่งแผล (Surgical Dressings) และ Biological Interfaces(เช่น ผิวหนังสังเคราะห์ เส้นเลือดเทียม) ถ้าจำเป็นต้องใช้ในห้องปรับแรงดันประเภท Class A \nหรือ Class B ต้องมีการขออนุญาตและอนุมัติเป็นลายลักษณ์อักษรซึ่งลงลายมือชื่อโดย ผู้อำนวยการด้านความปลอดภัย(Safety Director)","inspection":"เอกสารอนุญาตจากผู้อำนวยการด้านความปลอดภัยเมื่อมีการอนุญาตให้ใช้วัตถุต้องห้ามในห้องปรับความดันบรรยากาศสูง"},{"code":"HBOO 4.3","critical":true,"detail":"ผ้าปูที่ใช้ในห้องปรับแรงดันฯ ประเภท Class A นั้นเป็นไปตามข้อกำหนดการทดสอบการลุกลามของเปลวไฟตามที่แจ้งไว้ใน NFPA 701","inspection":""},{"code":"HBOO 4.5","critical":true,"detail":"ไม่อนุญาตให้ผู้ปฏิบัติงานในห้องปรับแรงดัน/ผู้ป่วย ใช้สเปรย์ฉีดผม น้ำมันใส่ผม ครีมทาผิว โลชัน หรือเครื่องสำอางที่ติดไฟได้ในห้องปรับความดันบรรยากาศสูงประเภท Class A และ Class B","inspection":""},{"code":"HBOO 4.6","critical":true,"detail":"ผู้ป่วยที่เปลี่ยนเสื้อผ้าต้องใช้เสื้อผ้าที่ได้รับอนุมัติจาก ผู้อำนวยการด้านความปลอดภัย (Safety Director) ให้สวมใส่ภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A และ Class B","inspection":"เอกสารแสดงข้อกำหนดด้านเสื้อผ้าของผู้ป่วยและได้รับอนุมัติจากผู้อำนวยการด้านความปลอดภัยของห้องปรับแรงดันบรรยากาศสูง"},{"code":"HBOO 4.7","critical":true,"detail":"วัสดุที่เป็นผ้าประเภทอื่น เช่น ผ้ารอง ผ้าม่าน และผ้าคลุมซึ่งใช้ภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A และ Class B จะต้องได้รับการอนุมัติโดย ผู้อำนวยการด้านความปลอดภัย (Safety Director)","inspection":""},{"code":"HBOO 5.0","critical":true,"detail":"อุปกรณ์ทุกชิ้นที่ใช้ภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A ได้รับการอนุมัติโดย ผู้อำนวยการด้านความปลอดภัย (Safety Director)","inspection":""},{"code":"HBOO 5.2","critical":true,"detail":"ไม่ใช้งานเอ็กซเรย์เคลื่อนที่ อุปกรณ์การเผาจี้โดยไฟฟ้า (Electrocautery) และอุปกรณ์พลังงานไฟฟ้าสูงชนิดอื่นที่คล้ายคลึงกันภายในห้องปรับความดันบรรยากาศสูง เว้นเสียแต่ว่าได้รับการอนุมัติโดย ผู้อำนวยการด้านความปลอดภัย (Safety Director)","inspection":""},{"code":"HBOO 5.3","critical":true,"detail":"ไม่ใช้อุปกรณ์บันทึกภาพที่ใช้แฟลช ไฟส่องสนาม หรืออุปกรณ์ที่คล้ายคลึงกันภายในห้องปรับความดันบรรยากาศสูงเมื่อมีการปรับแรงดัน","inspection":""},{"code":"HBOO 5.4","critical":true,"detail":"อนุญาตให้ใช้อุปกรณ์เลเซอร์เพียง Class I หรือ Class II ภายในห้องปรับฯ ประเภท Class A","inspection":""},{"code":"HBOO 5.6","critical":false,"detail":"ควรใช้กระดาษภายในห้องปรับฯ \nประเภท Class A ให้น้อยที่สุด","inspection":""},{"code":"HBOO 5.7","critical":true,"detail":"กระดาษที่นำเข้าไปในห้องปรับแรงดันบรรยากาศสูงประเภท Class A ต้องเก็บไว้ในกล่องโลหะที่ปิดมิดชิด","inspection":""},{"code":"HBOO 5.8","critical":true,"detail":"กล่องหรือภาชนะที่นำมาใช้เก็บกระดาษนั้นต้องนำสิ่งของที่อยู่ด้านในออกให้หมดหลังการใช้งานห้องปรับฯ ประเภท Class A เสร็จทุกครั้ง","inspection":""},{"code":"HBOO 5.9","critical":true,"detail":"ไม่อนุญาตให้นำอุปกรณ์ใดเข้าไปภายใน l":true,"detail":"จำนวนและประเภทของถังบรรจุก๊าซอัดแรงดันในห้องปรับแรงดันบรรยากาศสูง\nประเภท Class A นั้น ได้รับการอนุมัติจาก ผู้อำนวยการด้านความปลอดภัย(Safety Director)","inspection":""},{"code":"HBOO 7.0","critical":true,"detail":"มีการบันทึกเป็นลายลักษณ์อักษรถึงความสามารถในการลดแรงดันของห้องปรับแรงดันบรรยากาศสูงประเภท Class A จาก 3 ATA มาที่ระดับพื้นผิวภายใน 6 นาที","inspection":"เอกสารแสดงให้เห็นว่าห้องปรับแรงดันบรรยากาศสูงแต่ละห้องสามารถลดแรงดันได้ตามข้อกำหนด"},{"code":"HBOO 7.1","critical":true,"detail":"มีการบันทึกเป็นลายลักษณ์อักษรถึงความสามารถในการลดแรงดันของห้องปรับแรงดันบรรยากาศสูงประเภท Class B จากระดับ 3 ATA มาที่ระดับพื้นผิวภายใน 2  นาที","inspection":"เอกสารแสดงให้เห็นว่าห้องปรับแรงดันบรรยากาศสูงแต่ละห้องสามารถลดแรงดันได้ตามข้อกำหนด"}]},{"sheet":"ความปลอดภัย HBOM","code_prefix":"HBOM","title":"4. HYPERBARIC MAINTENANCE","items":[{"code":"HBOM 1.0","critical":true,"detail":"ผู้อำนวยการด้านความปลอดภัย \n(Safety Director) ของห้องปรับแรงดันบรรยากาศสูง ต้องตรวจตราให้มั่นใจว่า วาล์ว เครื่องควบคุม มิเตอร์ และอุปกรณ์ที่คล้ายคลึงกันนั้นเหมาะสมและปลอดภัยกับการใช้งานภายใต้สภาวะแรงดันบรรยากาศสูง และผ่านการทดสอบตามกำหนดการบำรุงรักษาเป็นประจำของสถานพยาบาล","inspection":"เอกสารแสดงนโยบายการบำรุงรักษาเป็นประจำของสถานพยาบาล"},{"code":"HBOM 1.1","critical":true,"detail":"วาล์วปล่อยแรงดัน (safety valve/pressure relief valve) ของห้องปรับแรงดันบรรยากาศสูงต้องได้รับการทดสอบและตรวจสอบตามกำหนดการบำรุงรักษาเป็นประจำของสถานพยาบาล","inspection":"เอกสารแสดงนโยบายการบำรุงรักษาเป็นประจำของสถานพยาบาล"},{"code":"HBOM 1.2","critical":true,"detail":"ผู้อำนวยการด้านความปลอดภัย \n(Safety Director) ของห้องปรับแรงดันบรรยากาศสูงตรวจสอบให้แน่ใจว่าจุดจ่ายก๊าซทั้งในและนอกห้องปรับแรงดันบรรยากาศสูงนั้นมีป้ายบอกตามที่กำหนดไว้ใน CGA C-7 (Guide to Classification and Labeling of Compressed Gases).","inspection":""},{"code":"HBOM 1.3","critical":true,"detail":"มีการตรวจสอบว่าก๊าซที่ปล่อยออกจากจุดจ่ายก๊าซนั้นถูกต้องเป็นไปตามที่ระบุไว้บนป้ายบอกตรงทางออก","inspection":""},{"code":"HBOM 1.3.1","critical":true,"detail":"ก๊าซสำหรับการรักษาผู้ป่วย\n(อากาศและออกซิเจน)\nเป็นชนิดที่ใช้ทางการแพทย์","inspection":"เอกสารรายงานผลการตรวจสอบความบริสุทธิ์ของก๊าซที่ใช้รักษาผู้ป่วย"},{"code":"HBOM 1.4","critical":true,"detail":"ไม่จัดเก็บวัสดุที่เป็นอันตรายต่อร่างกายหรือต่อความปลอดภัยไว้ในห้องเดียวกับห้องที่ติดตั้งห้องปรับแรงดันบรรยากาศสูง","inspection":""},{"code":"HBOM 1.5","critical":true,"detail":"ไม่ใช้หรือจัดเก็บก๊าซซึ่งติดไฟได้ในห้องที่ติดตั้งห้องปรับแรงดันบรรยากาศสูง","inspection":""},{"code":"HBOM 1.6","critical":true,"detail":"ส่วนหรือองค์ประกอบของอุปกรณ์ที่นำมาเปลี่ยนทดแทนในการบำรุงรักษาห้องปรับแรงดันบรรยากาศสูงและระบบสนับสนุนต่างๆ ที่เกี่ยวข้องนั้นต้องเข้ากันกับรายละเอียดข้อกำหนดของการออกแบบดั้งเดิม","inspection":""},{"code":"HBOM 2.0","critical":true,"detail":"การติดตั้ง การซ่อมแซม และการปรับเปลี่ยนอุปกรณ์ใดๆ ที่เกี่ยวข้องกับห้องปรับแรงดันต้องมีการประเมินโดยวิศวกร ผ่านการทดสอบภายใต้แรงดัน และอนุมัติเป็นลายลักษณ์อักษร\nโดยผู้อำนวยการด้านความปลอดภัย\n(Safety Director)","inspection":""},{"code":"HBOM 2.1","critical":true,"detail":"ผู้อำนวยการด้านความปลอดภัย (Safety Director) กำกับให้มีการบันทึกการบำรุงรักษาและการทดสอบอุปกรณ์ทุกชนิดทุกระบบของห้องปรับแรงดันบรรยากาศสูง","inspection":""},{"code":"HBOM 2.2","critical":true,"detail":"การจดบันทึกการใช้งานอุปกรณ์ต้องเก็บรักษาและลงลายมือชื่อโดย ผู้อำนวยการด้านความปลอดภัย(Safety Director) ก่อนการใช้งานห้องปรับแรงดันอีกครั้ง","inspection":""},{"code":"HBOM 2.3","critical":true,"detail":"ผู้อำนวยการด้านความปลอดภัย\n(Safety Director) ทำให้มั่นใจว่า อุปกรณ์ไฟฟ้า อุปกรณ์การตรวจวัด อุปกรณ์การช่วยชีวิต อุปกรณ์ป้องกัน และระบบการระบายอากาศของห้องปรับแรงดันบรรยากาศสูง ได้รับการตรวจสอบและทดสอบตามกำหนดการบำรุงรักษาตามวงรอบอย่างสม่ำเสมอ","inspection":""},{"code":"HBOM 3.0","critical":true,"detail":"วงจรไฟฟ้าทุกวงจรสำหรับห้องปรับความดันบรรยากาศสูงผ่านการทดสอบตามกำหนดการบำรุงรักษาเป็นประจำของสถานพยาบาล","inspection":""},{"code":"HBOM 3.1","critical":true,"detail":"มีขั้นตอนแสดงวิธีการปิดอุปกรณ์ไฟฟ้าภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A ทั้งหมดที่ไม่มีความจำเป็น \nก่อนเริ่มทำการดับเพลิง กรณีเกิดเหตุเพลิงไหม้","inspection":""},{"code":"HBOM 3.2","critical":true,"detail":"มีขั้นตอนแสดงวิธีการปิดการทำงาน เมื่ออุปกรณ์ไฟฟ้าเกิดลุกไหม้หรือมีควันภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A ก่อนทำการดับไฟเฉพาะอุปกรณ์ที่เกี่ยวข้องนั้น","inspection":""},{"code":"HBOM 4.1","critical":true,"detail":"ที่หุ้มขาเก้าอี้ ยาง ล้อ หรือส่วนประกอบของเฟอร์นิเจอร์และอุปกรณ์ต่างๆ ซึ่งมีคุณสมบัตินำไฟฟ้าภายในห้องปรับแรงดันฯ ประเภท \nClass A  ต้องผ่านการตรวจสอบเพื่อให้แน่ใจว่าปราศจากแว็กซ์ เศษผ้า หรือสิ่งแปลกปลอมใดๆ ซึ่งอาจเป็นฉนวนและทำให้เสียคุณสมบัติการนำไฟฟ้า","inspection":""},{"code":"HBOM 4.3","critical":true,"detail":"ไม่ใช้โลหะที่อาจก่อให้เกิดประกายไฟสำหรับล้อหรือที่หุ้มขาเก้าอี้ ภายในห้องปรับแรงดันฯ ประเภท Class A","inspection":""},{"code":"HBOM 4.4","critical":true,"detail":"ใช้สารหล่อลื่นล้อที่มีคุณสมบัติทนไฟและเข้ากันได้กับออกซิเจนเท่านั้น ภายในห้องปรับแรงดันฯ ประเภท Class A","inspection":""},{"code":"HBOM 4.5","critical":true,"detail":"การใช้งานเก้าอี้รถเข็นและเตียงเคลื่อนที่ ที่มีตลับลูกปืนในห้องปรับแรงดันประเภท Class A สามารถทำได้ เมื่อดำเนินการตามข้อกำหนด\nNFPA 99 เรื่องการตรวจวัดออกซิเจนในห้องปรับฯ","inspection":""},{"code":"HBOM 4.8.1","critical":true,"detail":"วัสดุทุกอย่างที่มีส่วนประกอบของยางได้รับการตรวจสอบการแตกหรือเสื่อมสภาพอย่างสม่ำเสมอ","inspection":""},{"code":"HBOM 4.9","critical":true,"detail":"สวิตช์ไฟฟ้า วาล์ว และอุปกรณ์ตรวจวัดไฟฟ้าที่เกี่ยวข้องกับการตรวจจับไฟและการดับเพลิง ภายในห้องปรับแรงดันฯ ประเภท Class A ต้องผ่านการตรวจสอบด้วยสายตาก่อนใช้งานห้องปรับแรงดันทุกครั้ง","inspection":""},{"code":"HBOM 4.10","critical":true,"detail":"ระบบตรวจจับเพลิงไหม้ภายในห้องปรับแรงดันฯ ประเภท Class A ต้องได้รับการทดสอบสัญญาณเตือนทุกสัปดาห์","inspection":""},{"code":"HBOM 4.11","critical":true,"detail":"อุปกรณ์ตรวจจับไฟไหม้และอุปกรณ์ดับเพลิงภายในห้องปรับแรงดันฯ ประเภท Class A ต้องมีการทดสอบอย่างเต็มระบบ ปีละ 1 ครั้ง","inspection":"- มีเอกสารแสดงถึงการทดสอบอุปกรณ์ดับเพลิง"},{"code":"HBOM 4.11.1","critical":true,"detail":"หากระบบดับเพลิงของห้องปรับแรงดันบรรยากาศสูงประเภท Class A ไม่สามารถใช้งานได้ไม่ว่าด้วยเหตุใดก็ตาม ต้องแจ้งให้ผู้ที่เกี่ยวข้องรับทราบ","inspection":""},{"code":"HBOM 4.11.2","critical":true,"detail":"หากระบบดับเพลิงของห้องปรับแรงดันบรรยากาศสูงประเภท Class A ไม่สามารถใช้งานได้ไม่ว่าด้วยเหตุใดก็ตาม ต้องมีป้ายบอกสถานะอย่างชัดเจน","inspection":""},{"code":"HBOM 4.12","critical":true,"detail":"มีตารางการดูแลทำความสะอาดอย่างสม่ำเสมอเพื่อให้แน่ใจว่าห้องปรับแรงดันบรรยากาศสูงนั้นปราศจากจาระบี เศษผ้า สิ่งสกปรก และฝุ่น","inspection":""},{"code":"HBOM 4.12.1","critical":true,"detail":"มีบันทึกการอบรมเจ้าหน้าที่ทำความสะอาด เกี่ยวกับความเสี่ยงที่อาจจะเกิดความเสียหายขึ้นจากการทำความสะอาด อันตรายที่อาจเกิดกับเจ้าหน้าที่ขณะทำความสะอาด ขั้นตอนการทำความสะอาดที่มีความเฉพาะเจาะจง และอุปกรณ์ที่ไม่จำเป็นต้องทำความสะอาด","inspection":"เอกสารที่แสดงให้เห็นว่ามีการอบรมพนักงานทำความสะอาดในเรื่องข้อปฏิบัติเพื่อป้องกันอันตรายที่เกี่ยวข้องกับการปฏิบัติงานในสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง"},{"code":"HBOM 5.0","critical":true,"detail":"มีคำแนะนำเป็นลายลักษณ์อักษรสำหรับการบำรุงรักษาเชิงป้องกันของอุปกรณ์ที่เกี่ยวข้องกับงานเวชศาสตร์ความดันบรรยากาศสูงทั้งหมด\nโดยผู้เชี่ยวชาญทางเทคนิคหรือผู้รับจ้างอื่น\nหรือผู้รับสัญญาซ่อมบำรุง","inspection":""},{"code":"HBOM 6.0","critical":true,"detail":"มีคำแนะนำเป็นลายลักษณ์อักษรสำหรับการบำรุงรักษาอุปกรณ์ประกอบและเครื่องมือภายในสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง เช่น เครื่องอัดอากาศ อุปกรณ์ควบคุม ระบบดับเพลิง ฯลฯ","inspection":"เอกสารแสดงการแนะนำสำหรับโครงการการบำรุงรักษาหลักของอุปกรณ์เฉพาะด้านเวชศาสตร์ความดันบรรยากาศสูง เช่น เครื่องอัดแรงดันอากาศ ฯลฯ"},{"code":"HBOM 7.0","critical":true,"detail":"มีการตรวจสอบด้วยสายตาของช่องอะคริลิก และท่อทรงกระบอกทั้งหมดทุกวันตามข้อกำหนดการตรวจสอบที่ระบุไว้ใน ASME PVHO-2, มาตรฐานความปลอดภัยของห้องแรงดันสำหรับการใช้งานกับมนุษย์: ข้อแนะนำระหว่างการใช้งานสำหรับหน้าต่างอะคริลิก PVHO (Safety Standard for Pressure Vessels for Human Occupancy: In-service Guidelines for PVHO Acrylic Windows)","inspection":"เอกสารที่ระบุว่ามีการตรวจสอบอะคริลิกประจำวัน สำหรับห้องปรับแรงดันฯทุกห้อง"},{"code":"HBOM 7.1","critical":true,"detail":"มีบันทึกการตรวจสอบ Acrylic Windows \nและ Acrylic light pipes ทุกวัน โดยระบุตาม Serial Number หรือตามชื่อที่หน่วยงานกำหนด","inspection":"เอกสารระบุว่ามีการตรวจสอบอะคริลิกทุกวันสำหรับแต่ละห้องปรับความดันบรรยากาศสูง"}]},{"sheet":"ความปลอดภัย HBOC","code_prefix":"HBOC","title":"5. HYPERBARIC FACILITY CONSTRUCTION","items":[{"code":"HBOC 1.0","critical":true,"detail":"ห้องปรับแรงดันบรรยากาศสูงและอุปกรณ์ที่ใช้งานต่างๆ ปกป้องด้วยโครงสร้างที่สามารถทนไฟได้นาน 2 ชั่วโมง สำหรับสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูงที่มีห้องปรับแรงดันบรรยากาศสูงประเภท Class A","inspection":"สำเนาของหนังสือรับรองการใช้อาคาร\n(Certificate of Occupancy)\nหรือใบอนุญาตอาคาร (Building Clearance)"},{"code":"HBOC 1.1","critical":true,"detail":"ประตูเชื่อมต่อไปยังห้องที่ติดตั้งห้องปรับแรงดันบรรยากาศสูงและอุปกรณ์ใช้งานต่างๆ ต้องเป็นประตูทนไฟระดับ B-label \nทนไฟได้อย่างน้อย 1 ชั่วโมงครึ่ง","inspection":""},{"code":"HBOC 2.0","critical":true,"detail":"ห้องที่ติดตั้งห้องปรับแรงดันบรรยากาศสูงประเภท Class A หรือ Class B ใช้เฉพาะสำหรับการปฏิบัติงานด้านเวชศาสตร์ความดันบรรยากาศสูงเท่านั้น","inspection":""},{"code":"HBOC 2.1","critical":false,"detail":"ห้องที่มีอุปกรณ์ประกอบการทำงานของระบบห้องปรับฯ (เช่น เครื่องอัดอากาศ)\nมีการปกป้องด้วยโครงสร้างที่สามารถทนไฟได้\nนาน 2 ชั่วโมง และอย่างน้อยประตูต้องมีระดับความทนไฟ B-label ซึ่งสามารถทนไฟได้\nนาน 1 ชั่วโมงครึ่ง","inspection":""},{"code":"HBOC 2.2","critical":true,"detail":"ห้องปรับแรงดันบรรยากาศสูงต้องมีฐานรองเข้มแข็งเพียงพอ โดยเฉพาะในกรณีที่มีแรงดันกระทำต่อพื้นสูงขึ้น เช่น ระหว่างการทดสอบ Hydrostatic ของห้องปรับฯ","inspection":""},{"code":"HBOC 3.0","critical":true,"detail":"มีการติดตั้งระบบดับเพลิงอัตโนมัติ\nชนิด wet pipe sprinkler system หรือ\nwater mist fire protection system\nในห้องที่ติดตั้งห้องปรับแรงดันบรรยากาศสูง\nตามข้อกำหนดของ NFPA 13 (Standard for the Installation of Sprinkler Systems)","inspection":""},{"code":"HBOC 3.1","critical":true,"detail":"มีการติดตั้งระบบดับเพลิงอัตโนมัติ\nชนิด wet pipe sprinkler system หรือ\nwater mist fire protection system\nในห้องที่ติดตั้งอุปกรณ์ที่เกี่ยวข้องกับห้องปรับฯ\nตามข้อกำหนดของ NFPA 13 (Standard for the Installation of Sprinkler Systems)","inspection":""},{"code":"HBOC 4.0","critical":true,"detail":"ระบบท่อส่งก๊าซเข้าห้องปรับแรงดันฯ\nจะต้องมีการติดตั้งวาล์ว\nสำหรับ เปิด-ปิด การไหลของก๊าซ\nไว้ภายนอกห้องที่มีการติดตั้งห้องปรับแรงดันฯ","inspection":""}]},{"sheet":"ความปลอดภัย HBOF","code_prefix":"HBOF","title":"6. HYPERBARIC CHAMBER FABRICATION","items":[{"code":"HBOF 1.0","critical":true,"detail":"ห้องปรับแรงดันบรรยากาศสูงทั้งหมดที่ใช้ในสถานพยาบาลด้านเวชศาสตร์ความดันฯ\nต้องผ่านขั้นตอนการผลิตและประทับตรา\nตามข้อกำหนดในการออกแบบ ผลิต ทดสอบ และประทับตราของ ANSI/ASME PVHO-1 หรือมีการรับรองจาก มาตรฐานสากลอื่นที่เทียบเท่ามาตรฐานความปลอดภัยของ ASME PVHOs","inspection":""},{"code":"HBOF 1.1","critical":true,"detail":"Viewports และช่องสำหรับเชื่อมต่อ\n(Penetrator plates)\nในห้องปรับแรงดันฯ ประเภท Class A\nและ Class B ต้องออกแบบและผลิตตามมาตรฐาน ANSI/ASME PVHO-1 หรือมีการรับรองจากมาตรฐานสากลอื่นที่เทียบเท่ามาตรฐานความปลอดภัยของ ASME PVHOs","inspection":""},{"code":"HBOF 2.0","critical":false,"detail":"การจัดทำพื้นภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A ต้องเพียงพอต่อการติดตั้งและใช้งานอุปกรณ์ต่างๆ และขึ้นอยู่กับความจำเป็นเพื่อจุดประสงค์ในการปฏิบัติงานของเจ้าหน้าที่","inspection":""},{"code":"HBOF 2.1","critical":true,"detail":"พื้นของห้องปรับแรงดันบรรยากาศสูง\nประเภท Class A เป็นวัสดุไม่ติดไฟ","inspection":""},{"code":"HBOF 2.3","critical":true,"detail":"พื้นที่ว่างใต้แผ่นวัสดุปูพื้น (Bilge) ภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A ต้องสามารถเข้าถึงได้เพื่อการทำความสะอาด","inspection":""},{"code":"HBOF 3.0","critical":true,"detail":"หากพื้นภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A ประกอบขึ้นด้วยแผ่นวัสดุที่สามารถถอดออกได้ จะต้องทำการยึดติดให้แน่นหนา เพื่อเป็นการต่อสายดินเข้ากับตัวโครงสร้างห้องปรับฯและป้องกันการเลื่อนหลุด","inspection":""},{"code":"HBOF 4.0","critical":true,"detail":"ด้านในของห้องปรับแรงดันประเภท Class A\nอาจไม่เคลือบด้วยสารใดๆ หรือเคลือบด้วยสาร\nที่มีคุณสมบัติเป็นสารอนินทรีย์ที่ผลิตจากสังกะสี\nหรือเรซินสังเคราะห์คุณภาพสูง\nหรือสารต้านเปลวไฟ ตามคำแนะนำของ\nNFPA 101 Class A inferior finish.","inspection":""},{"code":"HBOF 4.2","critical":false,"detail":"หากใช้วัสดุกันเสียงภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A\nต้องเป็นวัสดุที่จำกัดการติดไฟ","inspection":""},{"code":"HBOF 5.0","critical":true,"detail":"ช่องสำหรับเชื่อมต่ออุปกรณ์ตรวจวัดและอุปกรณ์อื่นๆ ด้านในและด้านนอกของห้องปรับแรงดันประเภท Class A ต้องทำการห่อหุ้มด้วยวัสดุกันน้ำเพื่อป้องกันเมื่อ Sprinkler ทำงาน","inspection":""},{"code":"HBOF 6.0","critical":true,"detail":"แหล่งให้แสงสว่าง หากไม่ได้รับการออกแบบเฉพาะสำหรับใช้ในห้องปรับแรงดันฯ ประเภท Class A ต้องติดตั้งไว้ด้านนอกห้องปรับแรงดันฯ และจัดให้แสงลอดผ่านช่องมอง หรือช่องเชื่อมต่อที่ออกแบบมาสำหรับไฟเบอร์ออพติค หรือแหล่งให้แสงสว่างที่คล้ายคลึงกัน","inspection":""},{"code":"HBOF 6.1","critical":true,"detail":"อุปกรณ์ติดตั้งแหล่งให้แสงสว่างที่ใช้เชื่อมต่อ\nควรออกแบบโดยใช้วัสดุทนความร้อนในระดับตามที่กำหนดไว้","inspection":""},{"code":"HBOF 7.0","critical":true,"detail":"หากห้องปรับแรงดันบรรยากาศสูงประเภท \nClass A มีแหล่งให้แสงสว่างที่ติดตั้งถาวรและชั่วคราวภายในห้องปรับแรงดันต้องเป็นไปตามข้อกำหนด NFPA 99 ฉบับปัจจุบัน","inspection":""},{"code":"HBOF 7.1","critical":false,"detail":"มีการติดตั้งแหล่งให้แสงสว่างฉุกเฉินภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A","inspection":""},{"code":"HBOF 9.0","critical":true,"detail":"อุปกรณ์ห้องปรับแรงดันบรรยากาศสูงแต่ละเครื่องต้องมีแบบรับรองแสดงมาตรฐาน ASME PVHO-1 หรือเทียบเท่า","inspection":""}]},{"sheet":"ความปลอดภัย HBOV","code_prefix":"HBOV","title":"7. HYPERBARIC CHAMBER VENTILATION","items":[{"code":"HBOV 1.1","critical":true,"detail":"อัตราการระบายอากาศขั้นต่ำ\n(Threshold Ventilation Rate) \nสำหรับห้องปรับแรงดันประเภท Class A\nคือ 3 Actual cu. ft. per minute (ACFM)","inspection":""},{"code":"HBOV 1.4","critical":true,"detail":"ห้องปรับแรงดันบรรยากาศสูงประเภท Class A สามารถระบายอากาศได้ระหว่างเพิ่มแรงดัน\nและไม่มีการเพิ่มแรงดัน","inspection":""},{"code":"HBOV 2.0","critical":true,"detail":"มีอุปกรณ์เพื่อใช้หายใจเฉพาะบุคคล\nพร้อมใช้งานครบตามจำนวนผู้ที่อยู่ภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A","inspection":""},{"code":"HBOV 2.1","critical":true,"detail":"อุปกรณ์เพื่อใช้หายใจสำหรับแต่ละบุคคล ต้องได้รับก๊าซจากแหล่งจ่ายก๊าซที่แยกจากอากาศที่ใช้ภายในห้องปรับแรงดันบรรยากาศสูง","inspection":""},{"code":"HBOV 2.2","critical":true,"detail":"แหล่งจ่ายก๊าซให้กับอุปกรณ์เพื่อใช้หายใจต้องออกแบบให้อุปกรณ์ดังกล่าวสามารถทำงานได้พร้อมกัน","inspection":""},{"code":"HBOV 2.3","critical":true,"detail":"มีเอกสารบันทึกการทำงานของอุปกรณ์เพื่อใช้หายใจส่วนบุคคลซึ่งสามารถทำงานได้ทุกระดับความดันของห้องปรับแรงดันบรรยากาศสูงประเภท Class A และ Class B ที่มีการติดตั้งระบบอากาศคั่น (air break)","inspection":""},{"code":"HBOV 2.4","critical":true,"detail":"กรณีเกิดอัคคีภัย\nอุปกรณ์เพื่อใช้หายใจของแต่ละบุคคล ต้องได้รับการจ่ายก๊าซจากแหล่งก๊าซที่แยกออกจากอากาศภายในห้องปรับแรงดันบรรยากาศสูง","inspection":""},{"code":"HBOV 2.5","critical":true,"detail":"กรณีเกิดควันจากการเผาไหม้ขึ้น\nภายในห้องปรับแรงดันบรรยากาศสูง\nต้องมี Smoky Hood หรือ SCBA พร้อมใช้งานอยู่ด้านนอกห้องปรับแรงดันฯ Class A และ Class Bเพื่อให้ผู้ปฏิบัติงานด้านนอกสามารถปฏิบัติหน้าที่ต่อได้ตามขั้นตอนฉุกเฉิน","inspection":""},{"code":"HBOV 3.0","critical":true,"detail":"ช่องอากาศเข้าของเครื่องอัดอากาศ ต้องติดตั้งให้ห่างจากการปนเปื้อนควันเสียที่มาจากยานพาหนะ เครื่องยนต์ที่เผาไหม้ภายใน เครื่องยนต์ที่ติดตั้งถาวร หรือท่อระบายอากาศเสียของอาคาร ฯลฯ","inspection":""},{"code":"HBOV 3.1","critical":true,"detail":"หากใช้เครื่องอัดอากาศแบบที่ใช้น้ำมันเป็นสารหล่อลื่นต้องมีชุดกรองอากาศที่ออกแบบมาให้ผลิตอากาศสำหรับใช้ทางการแพทย์\nและมีมาตรการตรวจสอบคุณภาพอากาศ","inspection":""},{"code":"HBOV 3.3","critical":true,"detail":"หากใช้เครื่องอัดอากาศแบบที่ใช้น้ำมันเป็นสารหล่อลื่น ชุดกรองอากาศต้องมีระบบป้องกันอัตโนมัติ","inspection":""},{"code":"HBOV 3.4","critical":true,"detail":"การติดตั้งเครื่องอัดอากาศต้องประกอบด้วยเครื่องอัดอากาศ 2 เครื่อง หรือมากกว่า โดยแต่ละเครื่องสามารถทำงานแยกกันได้โดยอิสระ และสามารถคงอัตราการระบายอากาศในระบบได้ตามมาตรฐานในกรณีที่เครื่องอัดอากาศเครื่องใดเครื่องหนึ่งเกิดขัดข้อง หรือถ้าหากหน่วยงานนั้นมีถังอากาศสำรองมากเพียงพอ หรือมีระบบเครื่องอัดอากาศที่ไม่ต้องใช้ไฟฟ้าเตรียมไว้ใช้ในการระบายอากาศภายในห้องปรับฯและเป็นแหล่งจ่ายอากาศสำหรับการเพิ่มแรงดัน ให้ยกเว้นข้อกำหนดนี้","inspection":""},{"code":"HBOV 3.5","critical":true,"detail":"เครื่องอัดอากาศแต่ละเครื่องต้องมีแหล่งวงจรจ่ายไฟแยกจากกัน เว้นแต่ได้รับการยกเว้นโดย HBOV 3.4","inspection":""},{"code":"HBOV 3.6","critical":true,"detail":"เครื่องอัดอากาศที่ผลิตอากาศสำหรับใช้ทางการแพทย์ให้กับระบบท่อก๊าซและหน่วยงาน\nเวชศาสตร์ความดันบรรยากาศสูงเป็นไปตามข้อกำหนด NFPA 99 ฉบับปัจจุบัน","inspection":""},{"code":"HBOV 3.7","critical":true,"detail":"เครื่องอัดอากาศที่จ่ายก๊าซสำหรับหน่วยงาน\nเวชศาสตร์ความดันบรรยากาศสูงโดยเฉพาะนั้นเป็นไปตามข้อกำหนดของ NFPA 99 ฉบับปัจจุบัน","inspection":""},{"code":"HBOV 4.0","critical":true,"detail":"หากมีการปรับอุณหภูมิของอากาศภายในห้องปรับแรงดันประเภท Class A ให้เพิ่มขึ้นหรือลดลงให้ใช้การหมุนเวียนอากาศโดยรอบภายในห้องปรับแรงดันผ่านทางขดลวดที่มีน้ำร้อนหรือน้ำเย็นหรือส่วนผสมระหว่างน้ำและไกลคอลไหลเวียนอยู่","inspection":""},{"code":"HBOV 4.1","critical":false,"detail":"กรณีที่ต้องการลดความชื้นภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A กำหนดให้ใช้ระบบคอยล์ (coil)","inspection":""},{"code":"HBOV 4.2","critical":false,"detail":"กรณีที่ต้องการเพิ่มความชื้นภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A กำหนดให้ใช้เครื่องพ่นละอองน้ำที่ทำงานด้วยระบบแรงดันอากาศ","inspection":""},{"code":"HBOV 4.3","critical":true,"detail":"หากมีการใช้พัดลมเพื่อช่วยหมุนเวียนอากาศภายในห้องปรับแรงดันบรรยากาศสูงประเภท Class A ส่วนของแกนใบพัดต้องหล่อลื่นด้วยสารหล่อลื่นที่ไม่ไวไฟ","inspection":""},{"code":"HBOV 5.0","critical":true,"detail":"ห้องปรับแรงดันประเภท Class B มีอัตราการระบายอากาศอย่างน้อย 1 actual cu. ft. per minute (ACFM)","inspection":""},{"code":"HBOV 5.1","critical":true,"detail":"ห้องปรับแรงดันประเภท Class B ที่ไม่ได้รับการออกแบบให้ใช้กับสภาพแวดล้อมภายในที่มีออกซิเจน 100% ต้องมีการตรวจวัดระดับออกซิเจนอยู่อย่างสม่ำเสมอ","inspection":""},{"code":"HBOV 5.1.1","critical":true,"detail":"ห้องปรับแรงดันประเภท Class B ที่ไม่ได้รับการออกแบบให้ใช้กับสภาพแวดล้อมภายในที่มีออกซิเจน 100% \nต้องได้รับการติดตั้งระบบเตือนภัยในรูปแบบของเสียงและสัญญาณเตือนภัยที่มองเห็นได้","inspection":""},{"code":"HBOV 6.0","critical":true,"detail":"ห้องปรับแรงดันประเภท Class B ที่ไม่ได้รับการออกแบบให้ใช้กับสภาพแวดล้อมภายในที่มีออกซิเจน 100% ต้องใช้อากาศที่เป็นไปตามข้อกำหนด CGA Grade E หรืออากาศสำหรับใช้ทางการแพทย์ โดยมีข้อจำกัดเพิ่มเติมคือห้ามมีไฮโดรคาร์บอนที่ควบแน่นได้ในอากาศ","inspection":""},{"code":"HBOV 7.0","critical":true,"detail":"อากาศที่จ่ายให้กับห้องปรับฯ ประเภท Class A \nเป็นไปตามข้อกำหนดสำหรับ CGA Grade E หรืออากาศสำหรับใช้ทางการแพทย์","inspection":""},{"code":"HBOV 8.0","critical":true,"detail":"หากมีการใช้สารระเหยในห้องปรับฯ\nอากาศภายในห้องปรับฯ ต้องได้รับการติดตามค่าอย่างต่อเนื่องเพื่อตรวจวัดค่าความเข้มข้นของก๊าซที่ติดไฟได้","inspection":""},{"code":"HBOV 8.1","critical":true,"detail":"เมื่อใดก็ตามที่มีการใช้สารระเหยภายในห้องปรับฯต้องติดตั้งมอนิเตอร์ซึ่งมีสัญญาณเตือนภัยในรูปแบบสัญญาณเสียงและสัญญาณไฟ ที่จะแจ้งเตือนที่ค่าต่ำกว่าค่าจุดระเบิดของก๊าซนั้นๆ 10% (Lower Explosive Limit – LEL)","inspection":""},{"code":"HBOV 9.0","critical":true,"detail":"หากมีการใช้ก๊าซไนโตรเจนหรือก๊าซตัวทำละลายอื่นๆ เพื่อลดความเข้มข้นของออกซิเจนในอากาศภายในห้องปรับฯ ต้องมีการติดตามค่าของระดับออกซิเจนภายในห้องปรับฯ อย่างต่อเนื่อง","inspection":""},{"code":"HBOV 9.1","critical":true,"detail":"หากมีการใช้ไนโตรเจนหรือก๊าซตัวทำละลายอื่นๆ เพื่อลดความเข้มข้นของออกซิเจนในอากาศภายในห้องปรับฯ ต้องมีการติดตั้งระบบเตือนภัยในรูปแบบของสัญญาณเสียงและสัญญาณไฟ\nเพื่อตรวจจับระดับแรงดันย่อยของออกซิเจนที่ต่ำกว่ากำหนด","inspection":""},{"code":"HBOV 10.0","critical":true,"detail":"ต้องมีการติดตามค่าของระดับออกซิเจนอย่างต่อเนื่อง หากมีการใช้ก๊าซผสมที่มีความเข้มข้นของออกซิเจนมากกว่า 21%\nในการหายใจโดย จนท. และ/หรือ ผู้ป่ ให้มากที่สุด","inspection":""}]},{"sheet":"ความปลอดภัย HBOFP","code_prefix":"HBOFP","title":"8. HYPERBARIC CHAMBER FIRE PROTECTION","items":[{"code":"HBOFP 1.0","critical":true,"detail":"มีระบบดับเพลิงที่มีการใช้น้ำจากแหล่งจ่ายที่แยกเป็นอิสระ เพื่อส่งน้ำให้ระบบสายฉีดน้ำดับเพลิง ติดตั้งไว้ในห้องปรับฯ ประเภท Class A","inspection":""},{"code":"HBOFP 1.1","critical":true,"detail":"มีระบบดับเพลิงที่มีการใช้น้ำจากแหล่งจ่ายที่แยกเป็นอิสระ เพื่อส่งน้ำให้ระบบปล่อยน้ำดับเพลิง (Deluge) ที่ติดตั้งไว้ในห้องปรับฯ ประเภท Class A","inspection":""},{"code":"HBOFP 1.6","critical":true,"detail":"อุปกรณ์เพื่อการแจ้งเตือนเมื่อเกิดเหตุไฟไหม้ต้องมีการติดตั้งไว้ที่แผงควบคุมของผู้ปฏิบัติงานห้องปรับแรงดันฯ ประเภท Class A เพื่อแจ้งเหตุและขอความช่วยเหลือ (ใช้โทรศัพท์เป็นอุปกรณ์ดังกล่าวได้ตามข้อกำหนดนี้)","inspection":""},{"code":"HBOFP 1.7","critical":true,"detail":"ผ้ากันไฟและถังดับเพลิงชนิดคาร์บอนไดออกไซด์ที่สามารถเคลื่อนย้ายได้ ห้ามติดตั้งหรือนำเข้าไปในห้องปรับฯ ประเภท Class A","inspection":""},{"code":"HBOFP 1.8","critical":true,"detail":"ปั๊ม (Booster pump) วงจรไฟฟ้าควบคุม และอุปกรณ์ไฟฟ้าใดที่เกี่ยวข้องกับการทำงานในระบบดับเพลิงของห้องปรับฯ ประเภท Class A ต้องใช้พลังงานจากระบบไฟฟ้าฉุกเฉินตามที่ระบุไว้ใน NFPA 99 ฉบับปัจจุบัน","inspection":""},{"code":"HBOFP 2.0","critical":true,"detail":"ระบบปล่อยน้ำดับเพลิง (Deluge) ที่ติดตั้งแบบถาวรต้องติดตั้งในทุกส่วนของห้องปรับแรงดันประเภท Class A และต้องออกแบบให้สามารถเปิดใช้งานได้เองโดยเจ้าหน้าที่","inspection":""},{"code":"HBOFP 2.1","critical":true,"detail":"ในห้องปรับฯ ประเภท Class A ที่แบ่งออกเป็นหลายส่วน (ล็อค) ต้องได้รับการติดตั้งระบบปล่อยน้ำดับเพลิง (Deluge) ทุกส่วน และต้องแน่ใจว่าสามารถทำงานได้ตามมาตรฐานข้อกำหนด เมื่อแต่ละส่วนของห้องปรับฯ มีแรงดันบรรยากาศขณะปล่อยน้ำดับเพลิงที่แตกต่างกัน","inspection":""},{"code":"HBOFP 2.2","critical":true,"detail":"ตัวควบคุมการเปิด/ปิด ระบบสายฉีดน้ำดับเพลิง\nในห้องปรับฯ ประเภท Class A ต้องติดตั้งไว้ที่แผงควบคุมของผู้ปฏิบัติงาน","inspection":""},{"code":"HBOFP 2.3","critical":true,"detail":"ตัวควบคุมการเปิด/ปิด ระบบสายฉีดน้ำดับเพลิง\nในห้องปรับฯ ประเภท Class A\nต้องติดตั้งอยู่ในแต่ละส่วนของห้องปรับฯ (ล็อค)\nที่มีระบบฉีดน้ำดับเพลิงติดตั้งอยู่","inspection":""},{"code":"HBOFP 2.4","critical":true,"detail":"ตัวควบคุมการเปิด/ปิด ระบบสายฉีดน้ำดับเพลิง\nในห้องปรับฯ ประเภท Class A ที่ติดตั้งไว้ที่แผงควบคุมของผู้ปฏิบัติงานและในแต่ละส่วนของห้องปรับแรงดันนั้นถูกออกแบบมาเพื่อป้องกันการเปิดระบบโดยไม่ตั้งใจ","inspection":""},{"code":"HBOFP 2.5","critical":true,"detail":"เมื่อเปิดใช้งานระบบปล่อยน้ำดับเพลิง (Deluge)\nในห้องปรับฯ ประเภท Class A\nน้ำจะต้องไหลออกจากจุดปล่อยน้ำในห้องปรับฯ\nภายในเวลา 3 วินาที","inspection":""},{"code":"HBOFP 2.8","critical":true,"detail":"แหล่งจ่ายน้ำต้องมีน้ำเพียงพอสำหรับระบบปล่อยน้ำดับเพลิง (Deluge) ในห้องปรับฯ ประเภท Class A เพื่อคงอัตราการไหลตามข้อกำหนด NFPA 99 (2015) ข้อ 14.2.5.2.6\nเป็นระยะเวลา 1 นาที","inspection":""},{"code":"HBOFP 2.9","critical":true,"detail":"ระบบปล่อยน้ำดับเพลิง (Deluge) ในห้องปรับฯ ประเภท Class A ต้องมีแรงดันเพียงพอสำหรับการทำงานของระบบเป็นระยะเวลาไม่น้อยกว่า 15 วินาที","inspection":""},{"code":"HBOFP 3.0","critical":true,"detail":"ระบบสายฉีดน้ำดับเพลิง\nต้องติดตั้งไว้ในทุกส่วน (ล็อค) ของห้องปรับฯ ประเภท Class A","inspection":""},{"code":"HBOFP 3.1","critical":true,"detail":"ระบบสายฉีดน้ำดับเพลิง ในห้องปรับฯ ประเภท Class A ต้องติดตั้งไว้ภายในส่วน (ล็อค) สำหรับเคลื่อนย้ายบุคลากรอย่างน้อยหนึ่งจุด","inspection":""},{"code":"HBOFP 3.1.1","critical":true,"detail":"ระบบสายฉีดน้ำดับเพลิงในห้องปรับฯ ประเภท ClassA ต้องติดตั้งไว้ภายในส่วน (ล็อค) สำหรับทำการรักษาอย่างน้อยสองจุด","inspection":""},{"code":"HBOFP 3.2","critical":true,"detail":"หากส่วน (ล็อค) ใดของห้องปรับฯ\nประเภท Class A มีพื้นที่ว่างใต้แผ่นวัสดุปูพื้น (Bilge) ต้องมีสายฉีดน้ำดับเพลิงอย่างน้อยหนึ่งสายที่ยาวพอให้ใช้งานได้ในบริเวณดังกล่าว","inspection":""},{"code":"HBOFP 3.3","critical":true,"detail":"สายฉีดน้ำดับเพลิงในห้องปรับฯ\nประเภท Class A ต้องมีขนาดเส้นผ่านศูนย์กลางภายในอย่างน้อย  ½ นิ้ว","inspection":""},{"code":"HBOFP 3.4","critical":true,"detail":"สายฉีดน้ำดับเพลิงในห้องปรับฯ\nประเภท Class A ต้องสามารถทนแรงดันได้มากกว่าแรงดันสูงสุดของระบบจ่ายน้ำดับเพลิง","inspection":""},{"code":"HBOFP 3.5","critical":true,"detail":"สายฉีดน้ำดับเพลิงในห้องปรับฯ\nประเภท Class A แต่ละสายต้องเปิดใช้งานด้วยวาล์วที่หมุน ¼ รอบและเปิดใช้งานได้ด้วยมืออย่างรวดเร็ว ซึ่งติดตั้งอยู่ภายในส่วนของห้องปรับฯ (ล็อค) หรือเป็นวาล์วระบบสปริงซึ่งสามารถปิดด้วยมือได้ที่ปลายสุดของสาย","inspection":""},{"code":"HBOFP 3.6","critical":true,"detail":"ระบบสายฉีดน้ำดับเพลิงในห้องปรับฯ ประเภท Class A ต้องมีวาล์ว เปิด-ปิด แยกไว้เพื่อควบคุมจากภายนอก ซึ่งเจ้าหน้าที่ภายนอกห้องปรับฯสามารถเข้าถึงได้โดยง่าย","inspection":""},{"code":"HBOFP 3.7","critical":true,"detail":"แรงดันน้ำที่จ่ายให้ระบบสายฉีดน้ำดับเพลิงในห้องปรับฯ ประเภท Class A ต้องมีแรงดันมากกว่าแรงดันใช้งานสูงสุดของห้องปรับฯ อย่างน้อย 50 psi","inspection":""},{"code":"HBOFP 5.0","critical":true,"detail":"ระบบปล่อยน้ำดับเพลิง (Deluge) ในห้องปรับฯ ประเภท Class A ต้องมีการทดสอบการทำงานของระบบอย่างน้อยปีละ 2 ครั้ง ตามข้อกำหนด \nNFPA 99 (2015) ข้อ 14.2.5.2.7","inspection":"ผลการทดสอบทุกครึ่งปีของระบบดับเพลิงชนิดเปิดและระบบท่อของห้องปรับฯ ประเภท Class A"},{"code":"HBOFP 5.1","critical":true,"detail":"ระบบสายฉีดน้ำดับเพลิงในห้องปรับฯ\nประเภท Class A ต้องมีการทดสอบการทำงานของระบบอย่างน้อยปีละ 2 ครั้ง\nตามข้อกำหนด NFPA 99 (2015) ข้อ 14.2.5.3.7","inspection":""},{"code":"HBOFP 5.2","critical":true,"detail":"ต้องมีการทดสอบการปล่อยน้ำดับเพลิงภายในห้องปรับฯ ประเภท Class A ในระหว่างขั้นตอนการก่อสร้าง หรือเมื่อใดก็ตามที่มีการเปลี่ยนแปลงของระบบปล่อยน้ำดับเพลิง โดยทำการทดสอบที่แรงดันพื้นผิว และแรงดันใช้งานสูงสุด เพื่อตรวจสอบให้เป็นไปตามข้อกำหนด\nNFPA 99 (2015) ข้อ 14.2.5.2.6","inspection":""},{"code":"HBOFP 5.4","critical":true,"detail":"การทดสอบระบบดับเพลิงของห้องปรับฯ ประเภท Class A ต้องจัดทำบันทึกรายละเอียดการทดสอบเก็บรวบรวมไว้\nและสำเนาให้ผู้อำนวยการด้านความปลอดภัย (Safety Director)","inspection":"รายงานผลการทดสอบระบบดับเพลิงห้องปรับแรงดัน Class A ที่ส่งไปให้ผู้อำนวยการด้านความปลอดภัย"},{"code":"HBOFP 6.0","critical":true,"detail":"ป้ายแจ้งประเภทของวัสดุที่ไม่อนุญาตให้นำเข้าห้องปรับฯ ประเภท Class A ต้องติดไว้บริเวณทางเข้าห้องปรับฯ สามารถมองเห็นได้ง่ายและชัดเจน","inspection":""},{"code":"HBOFP 7.0","critical":true,"detail":"ป้ายแจ้งประเภทของวัสดุที่ไม่อนุญาตให้นำเข้าห้องปรับฯ ประเภท Class B ต้องติดไว้ทั่วบริเวณห้องที่ติดตั้งห้องปรับฯ สามารถมองเห็นได้ง่าย และชัดเจน","inspection":""},{"code":"HBOFP 8.0","critical":true,"detail":"อุปกรณ์เพื่อการแจ้งเตือนเมื่อเกิดเหตุไฟไหม้ต้องมีติดตั้งไว้ในห้องที่มีห้องปรับฯ \nประเภท Class B เพื่อแจ้งเหตุและขอความช่วยเหลือ (ใช้โทรศัพท์เป็นอุปกรณ์ดังกล่าวได้ตามข้อกำหนดนี้)","inspection":""}]},{"sheet":"ความปลอดภัย HBOE","code_prefix":"HBOE","title":"9. HYPERBARIC CHAMBER ELECTRICAL SYSTEMS AND SERVICES","items":[{"code":"HBOE 1.0","critical":true,"detail":"อุปกรณ์ที่ใช้งานเพื่อสนับสนุนการปฏิบัติงานของห้องปรับฯ ประเภท Class A เช่น แผงสวิตช์ แผงระบบไฟฟ้า หรือแผงควบคุมระบบไฟ ต้องอยู่ภายนอกห้องที่มีการติดตั้งห้องปรับฯ และอยู่ติดกับห้องปรับฯ","inspection":""},{"code":"HBOE 1.1","critical":true,"detail":"เมื่อมีการใช้กระแสไฟฟ้ากับแผงควบคุมหรือส่วนควบคุมของห้องปรับฯ ประเภท Class A ที่ติดตั้งอยู่ในพื้นที่ที่มีแนวท่อออกซิเจนในบริเวณเดียวกัน\nต้องมีการระบายอากาศตลอดเวลา หรือต้องมีการตรวจวัดค่าออกซิเจนในอากาศอย่างต่อเนื่องเพื่อเฝ้าระวังค่าออกซิเจนที่สูงเกินข้อกำหนด","inspection":""},{"code":"HBOE 1.2","critical":true,"detail":"การติดตั้งอุปกรณ์ไฟฟ้าภายในห้องปรับฯ ประเภท Class A ต้องไม่มี\nเครื่องตัดกระแสไฟฟ้า (Circuit Breakers)\nฟิวส์ (Line Fuses)\nส่วนควบคุมมอเตอร์ (Motor Controllers) \nอุปกรณ์ปล่อยกระแสไฟฟ้า (Relays)\nหม้อแปลงไฟฟ้า (Transformers) \nบัลลาสต์ (Ballasts)\nแผงไฟส่องสว่าง (lighting panels)\nหรือแผงวงจรไฟฟ้า (powered panels)","inspection":""},{"code":"HBOE 1.3","critical":true,"detail":"หากมีการติดตั้งมอเตอร์ภายในห้องปรับฯ\nประเภท Class A จะต้องเป็นไปตาม\nข้อกำหนดของ \nNFPA 99 (2015) ข้อ 14.2.8.3.14","inspection":""},{"code":"HBOE 1.4","critical":true,"detail":"อุปกรณ์ไฟฟ้าทั้งหมดที่เชื่อมต่อหรือเป็นส่วนเชื่อมต่อกับผู้ป่วยในห้องปรับฯ ประเภท Class A ต้องเป็นไปตามข้อกำหนดของ NFPA 99 (2005) \nบทที่ 8 เรื่อง Electrical Equipment\nและ NFPA 99 (2015) ข้อ 14.2.8.3","inspection":""},{"code":"HBOE 1.6","critical":true,"detail":"กรณีไฟฟ้าขัดข้อง ไม่จำเป็นต้องคงสถานะการทำงานของอุปกรณ์ที่ใช้ไฟฟ้าในการทำงาน ในระบบของห้องปรับฯ ตราบใดที่ยังสามารถทำการควบคุมและทำการลดแรงดันในห้องปรับฯ ได้","inspection":""},{"code":"HBOE 2.0","critical":true,"detail":"แหล่งจ่ายกระแสไฟฟ้าที่จ่ายให้กับห้องปรับฯ ต้องมาจาก 2 แหล่ง ซึ่งสามารถทำงานแยกกันได้อิสระ","inspection":""},{"code":"HBOE 2.1","critical":true,"detail":"สำหรับห้องปรับฯ ประเภท Class A ที่มีสถานที่ตั้งอยู่ภายในโรงพยาบาล แหล่งจ่ายไฟฟ้าหนึ่งแหล่งจากทั้งหมด ต้องเป็นเครื่องกำเนิดไฟฟ้าที่มีกำลังการจ่ายไฟเพียงพอสำหรับการปฏิบัติงานและได้รับการออกแบบให้เป็นระบบไฟฟ้าฉุกเฉินที่ตรงตามข้อกำหนด NFPA 99 (2015)\nบทที่ 6 เรื่อง Electrical Systems \nและต้องติดตั้งไว้ในบริเวณโรงพยาบาล","inspection":""},{"code":"HBOE 2.2","critical":true,"detail":"สำหรับห้องปรับฯ ประเภท Class A ที่ไม่ได้ตั้งอยู่ในโรงพยาบาล ระบบไฟฟ้าฉุกเฉินเป็นไปตาม \nNFPA 70 “National Electrical Code” Article 700 เรื่อง Emergency Systems","inspection":""},{"code":"HBOE 2.3","critical":true,"detail":"อุปกรณ์/เครื่องใช้ไฟฟ้าที่เกี่ยวข้องกับการช่วยเหลือผู้ป่วยเมื่อเกิดเหตุฉุกเฉิน (Life Support Functions) ของห้องปรับฯ ประเภท Class A\nต้องเชื่อมต่อกับแหล่งจ่ายไฟฟ้าที่มีระบบไฟฟ้าฉุกเฉินและหากเกิดกระแสไฟฟ้าดับจะต้องจ่ายไฟฟ้าได้ภายในเวลา 10 วินาที อุปกรณ์ที่เกี่ยวข้องดังกล่าวต้องรวมถึงอุปกรณ์ดังต่อไปนี้\na. เต้ารับสำหรับปลั๊กไฟที่ติดตั้งภายในห้องปรับ\nb. ไฟส่องสว่างฉุกเฉิน (แบบติดตั้งภายใน หรือภายนอก)\nc. ระบบสื่อสาร ระหว่างภายนอกและภายในห้องปรับฯ\nd. ระบบสัญญาณเตือนภัย รวมถึงระบบตรวจจับเพลิงไหม้\ne. ระบบดับเพลิงของห้องปรับฯ (ส่วนควบคุมและอุปกรณ์ประกอบ) และระบบปั๊มน้ำเพิ่มกำลังดันหากมีติดตั้ง จะต้องแยกระบบเบรกเกอร์ออกจากอุปกรณ์อื่น\nf. อุปกรณ์ควบคุมการเพิ่ม/ลดแรงดัน และการระบายอากาศที่ใช้ไฟฟ้า\ng. ไฟส่องสว่างสำรองภายในห้องที่ติดตั้งห้องปรับฯ เพื่อความปลอดภัยในการปฏิบัติงานระหว่างที่ไม่มีไฟฟ้าจากแหล่งจ่ายหลัก","inspection":""},{"code":"HBOE 2.4","critical":true,"detail":"เครื่องอัดแรงดันอากาศที่ใช้พลังงานไฟฟ้าและอุปกรณ์ไฟฟ้าเสริมอื่นๆ ที่ใช้สำหรับควบคุมบรรยากาศในห้องปรับฯ ประเภท Class A ซึ่งโดยปกติติดตั้งภายนอกห้องปรับฯ นั้นต้องเชื่อมต่อกับระบบการทำงานของห้องปรับฯ หรือระบบฉุกเฉิน","inspection":""},{"code":"HBOE 2.5","critical":true,"detail":"เครื่องอัดแรงดันอากาศที่ใช้พลังงานไฟฟ้าและอุปกรณ์ไฟฟ้าเสริมอื่นๆ ที่ติดตั้งไว้นอกห้องที่ติดตั้งห้องปรับฯ ประเภท Class A มีการเชื่อมต่อกับระบบไฟฟ้าฉุกเฉินแบบอัตโนมัติที่มีการหน่วงเวลา หรือการเชื่อมต่อแบบควบคุมเอง เพื่อป้องกันการได้รับกระแสไฟฟ้าเกินในระบบ ในระหว่างที่มีการเริ่มต้นระบบใหม่","inspection":""},{"code":"HBOE 2.6","critical":true,"detail":"ระบบควบคุมไฟฟ้าและระบบสัญญาณเตือนภัยของห้องปรับฯ ประเภท Class A ต้องได้รับการออกแบบเพื่อป้องกันการเกิดอันตรายจากการทำงานที่ผิดปกติของระบบในระหว่างที่ระบบจ่ายไฟฟ้าขัดข้อง เช่น การสูญเสียการควบคุมแรงดันของห้องปรับฯ ระบบปล่อยน้ำดับเพลิงทำงานเอง ระบบสัญญาณเตือนภัยทำงานผิดพลาด เป็นต้น","inspection":""},{"code":"HBOE 3.0","critical":true,"detail":"อุปกรณ์หรือส่วนประกอบของอุปกรณ์ที่ติดตั้งภายในหรือใช้งานภายในห้องปรับฯ ประเภท Class A ต้องผ่านการวัดระดับ ทดสอบ และบันทึก ว่าเหมาะสมสำหรับสภาวะแรงดันบรรยากาศสูงก่อนการใช้งาน","inspection":""},{"code":"HBOE 3.1","critical":true,"detail":"อุปกรณ์ไฟฟ้าที่อนุญาตให้ใช้ภายในห้องปรับฯ ประเภท Class A อนุญาตเฉพาะที่จำเป็นต่อความปลอดภัยในการปฏิบัติงานและจำเป็นต่อการให้การดูแลผู้ป่วยเท่านั้น","inspection":""},{"code":"HBOE 3.2","critical":true,"detail":"ไม่อนุญาตให้นำอุปกรณ์แบบพกพาได้ เข้าไปภายในห้องปรับฯ เว้นเสียแต่ว่าจำเป็นต่อการรักษาผู้ป่วย","inspection":""},{"code":"HBOE 3.3","critical":true,"detail":"ส่วนของวงจรไฟฟ้าที่ถูกห่อหุ้มด้วยพื้นผิวที่สามารถนำไฟฟ้าได้ จะต้องต่อสายดินและเชื่อมต่อเข้ากับตัวโครงสร้างของห้องปรับฯ","inspection":""},{"code":"HBOE 3.3.1","critical":true,"detail":"แรงต้านทานไฟฟ้าระหว่างตัวโครงสร้างห้องปรับฯ\nที่ต่อสายดินแล้ว กับสายดินจะต้องไม่เกิน 1 ohm","inspection":""},{"code":"HBOE 3.3.1.1","critical":true,"detail":"ตรวจสอบความเชื่อมต่อของระบบสายดินสำหรับห้องปรับฯ ประเภท Class A สัปดาห์
