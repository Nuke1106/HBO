 หรือในกรณีที่เป็นส่วนประกอบของอุปกรณ์ไฟฟ้าทางการแพทย์ เช่น สายตรวจวัดผู้ป่วย และต้องปฏิบัติตามข้อกำหนด NFPA 99 (2015) ข้อ 14.2.8.3.17 \nสำหรับห้องปรับฯ ประเภท Class A","inspection":""},{"code":"HBOE 3.14","critical":true,"detail":"ห้ามใช้มอเตอร์ไฟฟ้าในห้องปรับฯ\nประเภท Class A\nยกเว้นกรณีมอเตอร์นั้นตรงตามข้อกำหนด\nNFPA 70 Article 501.125(a)(1) ซึ่งระบุไว้สำหรับใช้ในห้องปรับฯ และใช้ในพื้นที่ที่มีความเข้มข้นของออกซิเจนสูง หรือมอเตอร์นั้นเป็นชนิดปิดมิดชิดตามข้อกำหนด NFPA 70, Article 501. 125 (a)(2) หรือ (3)","inspection":""},{"code":"HBOE 3.15","critical":true,"detail":"หลอดไฟที่ติดตั้งถาวรภายในห้องปรับฯ Class A ต้องมีฝาครอบ","inspection":""},{"code":"HBOE 3.16","critical":true,"detail":"หลอดไฟที่ติดตั้งถาวรภายในห้องปรับฯ \nประเภท Class A ต้องติดตั้งห่างจากพื้นที่ที่อาจก่อให้เกิดอันตรายทางกายภาพได้ เช่น จากการเคลื่อนไหวตามปกติของบุคลากรหรืออุปกรณ์","inspection":""},{"code":"HBOE 3.17","critical":true,"detail":"บัลลาสต์(Ballasts) และอุปกรณ์กักเก็บพลังงานอื่นๆ ซึ่งเป็นส่วนประกอบของวงจรให้แสงสว่างต้องติดตั้งอยู่ภายนอกห้องปรับฯ ประเภท Class A ตามข้อกำหนด NFPA 99 (2015) ข้อ 14.2.8.1.4","inspection":""},{"code":"HBOE 3.18","critical":true,"detail":"ไฟส่องสว่างเฉพาะจุดแบบเคลื่อนย้ายได้ที่ใช้ภายในห้องปรับฯ ประเภท Class A ต้องเป็นวัสดุที่สามารถป้องกันการแตกและป้องกันความเสียหายจากการกระแทกได้","inspection":""},{"code":"HBOE 3.20","critical":true,"detail":"ระบบอื่นๆ ในห้องปรับฯ ประเภท Class A \nเช่น สายเคเบิลของหูฟัง\nสายเซ็นเซอร์ ที่ไม่ถูกระบุไว้ในข้อกำหนด \nNFPA 99 (2015) ข้อ 14.2.8.3.7 นั้น\nต้องเป็นระบบที่มีความปลอดภัย หรือมีการออกแบบวงจร โดยกำหนดให้มีกระแสไฟฟ้าไม่เกิน 28 V และ 0.5 A ทั้งขณะที่ทำงานได้ปกติและเกิดขัดข้อง","inspection":""},{"code":"HBOE 3.21","critical":true,"detail":"ลำโพงในห้องปรับฯ ประเภท Class A\nต้องออกแบบมาให้วงจรไฟฟ้าและสายไฟ\nได้รับการห่อหุ้มอย่างมิดชิด","inspection":""},{"code":"HBOE 3.22","critical":true,"detail":"กำลังไฟลำโพงที่ใช้ในห้องปรับฯ\nประเภท Class A\nต้องไม่เกิน 28 V RMS และ 25 W","inspection":""},{"code":"HBOE 3.23","critical":true,"detail":"ชุดหูฟังอินเตอร์คอมชนิดเคลื่อนที่ได้ในห้องปรับฯ ประเภท Class A ซึ่งใช้พลังงานแบตเตอรี่ต้องปฏิบัติตามข้อกำหนด\nNFPA 99 (2015) ข้อ 14.2.8.3.17.5 ซึ่งเป็นข้อกำหนดของอุปกรณ์ที่ใช้พลังงานแบตเตอรี่","inspection":""},{"code":"HBOE 4.1","critical":true,"detail":"เครื่องใช้ไฟฟ้าที่เกี่ยวกับการดูแลผู้ป่วยชนิดเคลื่อนที่ได้ซึ่งใช้ในห้องปรับฯ ประเภท Class A ต้องมีการตรวจสอบและจดบันทึกความพร้อมใช้งานตามแนวทางการบำรุงรักษาที่กำหนดไว้ใน \nNFPA 99 (2015) บทที่ 10 “Electrical Equipment”","inspection":"เอกสารแสดงว่ามีการตรวจสอบและจดบันทึกความสมบูรณ์ของไฟฟ้าและเครื่องยนต์ของอุปกรณ์ดูแลผู้ป่วยชนิดเคลื่อนที่ได้เป็นประจำตามตารางการบำรุงรักษา"},{"code":"HBOE 4.2","critical":true,"detail":"เครื่องใช้ไฟฟ้าที่เกี่ยวกับการดูแลผู้ป่วยชนิดเคลื่อนที่ได้ซึ่งใช้ในห้องปรับแรงดันฯ ประเภท Class A ต้องเป็นไปตามข้อกำหนด\nNFPA 99 (2015) ข้อ 14.2.8.3.1\nและ 14.2.8.3.12","inspection":""},{"code":"HBOE 4.3","critical":true,"detail":"เครื่องใช้ไฟฟ้าที่เกี่ยวกับการดูแลผู้ป่วยชนิดเคลื่อนที่ได้ซึ่งใช้ในห้องปรับฯ ประเภท Class A\nที่ใช้งานร่วมกับออกซิเจนต้องไม่เกิดการสะสมของออกซิเจนในส่วนที่มีกระแสไฟฟ้าของอุปกรณ์ทั้งในการทำงานที่ปกติหรือเมื่อเกิดขัดข้อง","inspection":""},{"code":"HBOE 5.0","critical":true,"detail":"เมื่อใช้อุปกรณ์ที่ใช้พลังงานจากแบตเตอรี่ในห้องปรับฯ ประเภท Class A แบตเตอรี่ต้องถูกห่อหุ้มอย่างมิดชิดและอยู่ภายในส่วนที่ปิดของอุปกรณ์","inspection":""},{"code":"HBOE 5.1","critical":true,"detail":"เมื่อใช้อุปกรณ์ที่ใช้พลังงานจากแบตเตอรี่ในห้องปรับฯ ประเภท Class A แบตเตอรี่ต้องเป็นชนิดปิดผนึกซึ่งไม่มีการรั่วไหลของก๊าซออกมาระหว่างใช้งาน","inspection":""},{"code":"HBOE 5.2","critical":true,"detail":"เมื่อใช้อุปกรณ์ที่ใช้พลังงานจากแบตเตอรี่ในห้องปรับฯ ประเภท Class A อุปกรณ์ต้องมีระดับไฟฟ้าไม่เกิน 12 V และ 48 W","inspection":""},{"code":"HBOE 5.3","critical":true,"detail":"เมื่อใช้อุปกรณ์พกพาที่ใช้พลังงานจากแบตเตอรี่ในห้องปรับฯ ประเภท Class A ห้ามทำการชาร์จแบตเตอรี่ระหว่างการใช้งานห้องปรับฯ","inspection":""},{"code":"HBOE 5.4","critical":true,"detail":"ไม่เปลี่ยนแบตเตอรี่ในอุปกรณ์ที่ใช้ในห้องปรับฯ ประเภท Class A ระหว่างการใช้งานห้องปรับฯ","inspection":""},{"code":"HBOE 5.5","critical":true,"detail":"ห้ามใช้แบตเตอรี่ลิเทียมและลิเทียมไอออน ในห้องปรับฯ ประเภท Class A ขณะปฏิบัติงาน ยกเว้น ได้รับการรับรองว่าสามารถใช้ได้จากโรงงานผู้ผลิตหรือสถาบันที่เชื่อถือได้","inspection":""},{"code":"HBOE 6.0","critical":true,"detail":"อุปกรณ์ต่อเชื่อมระบบไฟฟ้า ในห้องปรับฯ ประเภท Class A แรงดันไฟฟ้าต้องไม่เกิน 120 V และ 2 A","inspection":""},{"code":"HBOE 6.1","critical":true,"detail":"อุปกรณ์ต่อเชื่อมระบบไฟฟ้า ในห้องปรับฯ ประเภท Class A ต้องมีสวิตช์เปิดปิด","inspection":""},{"code":"HBOE 6.2","critical":true,"detail":"อุปกรณ์ต่อเชื่อมระบบไฟฟ้าในห้องปรับฯ ประเภท Class A ต้องไม่รบกวนระบบไฟฟ้าที่ส่งให้กับอุปกรณ์โดยรวม","inspection":""},{"code":"HBOE 8.0","critical":true,"detail":"อุปกรณ์ไฟฟ้าภายในห้องปรับฯ\nประเภท Class B จำกัดให้ใช้ได้เฉพาะอุปกรณ์เพื่อการสื่อสารและสายตรวจวัดการทำงานทางกายภาพของผู้ป่วย","inspection":""},{"code":"HBOE 9.0","critical":true,"detail":"สายสำหรับอุปกรณ์สื่อสารในห้องปรับฯ ประเภท Class B ต้องป้องกันจากการเกิดอันตรายทางกายภาพและไม่สัมผัสกับวัสดุติดไฟง่ายโดยใช้วัสดุห่อหุ้มหรือใส่ในท่อ","inspection":""},{"code":"HBOE 9.1","critical":true,"detail":"สายตรวจวัดผู้ป่วยในห้องปรับฯ\nประเภท Class B\nต้องเป็นส่วนประกอบของอุปกรณ์ไฟฟ้าทางการแพทย์ที่ได้รับอนุมัติตามข้อกำหนด\nNFPA 99 (2015) ข้อ 14.2.8.3.17","inspection":""},{"code":"HBOE 10.0","critical":true,"detail":"อุปกรณ์ให้แสงสว่างภายในห้องปรับฯ ประเภท Class B ต้องมีแหล่งจ่ายพลังงานอยู่ภายนอก","inspection":""},{"code":"HBOE 11.1","critical":true,"detail":"อุปกรณ์ควบคุม\nเครื่องขยายเสียง (Power Amplifier)\nหม้อแปลงเสียง (Output Transformer) มอนิเตอร์ที่เกี่ยวข้องกับอุปกรณ์สื่อสารและการตรวจวัด ต้องติดตั้งภายนอกห้องปรับฯ ประเภท Class A หรือเป็นไปตามข้อกำหนด\nNFPA 99 (2015) ข้อ 14.2.8.3.16","inspection":""},{"code":"HBOE 12.0","critical":true,"detail":"ในห้องปรับฯ ประเภท Class A ระบบสื่อสารของทุกส่วน (ล็อค) ต้องสามารถติดต่อสื่อสารกับผู้ปฏิบัติงานที่แผงควบคุมได้","inspection":""},{"code":"HBOE 12.1","critical":true,"detail":"หากมีการใช้งานหน้ากากออกซิเจนที่ติดไมโครโฟน (Oxygen Mask Microphone) ในห้องปรับฯ ประเภท Class A อุปกรณ์นั้นต้องได้มาตรฐานความปลอดภัย สามารถใช้งานได้ที่ความดันสูงสุดและที่ปริมาณออกซิเจน 95 ± 5%","inspection":""},{"code":"HBOE 16.3","critical":true,"detail":"อุปกรณ์ตรวจวัดไฟฟ้าที่ใช้ในห้องปรับฯ\nประเภท Class A เป็นไปตามข้อกำหนด\nNFPA 99 (2015) ข้อ 14.2.8","inspection":""},{"code":"HBOE 16.4","critical":true,"detail":"การตรวจวัดภายในห้องปรับฯ โดยใช้โทรทัศน์วงจรปิดนั้นมีไว้สำหรับให้ผู้ปฏิบัติงานที่ไม่สามารถสื่อสารทางภาพได้โดยตรงกับด้านในของห้องปรับฯ จากตำแหน่งที่ผู้ปฏิบัติงานทำงาน","inspection":""},{"code":"HBOE 17.0","critical":true,"detail":"เฟอร์นิเจอร์ทุกชิ้นที่ติดตั้งถาวรในห้องปรับฯ ประเภท Class A ต้องต่อกับสายดิน","inspection":""}]},{"sheet":"ความปลอดภัย HBOGH","code_prefix":"HBOGH","title":"10. HYPERBARIC GAS HANDLING","items":[{"code":"HBOGH 1.0","critical":false,"detail":"ถังบรรจุก๊าซอัดแรงดัน\n(Compressed Gas Cylinders)\nมีป้ายบอกชื่อทางเคมีหรือชื่อซึ่งเป็นที่ยอมรับกันโดยทั่วไปของก๊าซที่บรรจุภายใน และสามารถอ่านได้ชัดเจนบริเวณด้านนอกของถัง","inspection":""},{"code":"HBOGH 1.3","critical":false,"detail":"ถังบรรจุก๊าซอัดแรงดัน\n(Compressed Gas Cylinders)\nสำหรับการใช้ทางการแพทย์ที่บรรจุออกซิเจน\nมีสัญลักษณ์สีเขียว","inspection":""},{"code":"HBOGH 1.4","critical":false,"detail":"ถังบรรจุก๊าซอัดแรงดัน\n(Compressed Gas Cylinders)\nสำหรับการใช้ทางการแพทย์ที่บรรจุฮีเลียม\nมีสัญลักษณ์สีน้ำตาล","inspection":""},{"code":"HBOGH 1.5","critical":false,"detail":"ถังบรรจุก๊าซอัดแรงดัน\n(Compressed Gas Cylinders)\nสำหรับการใช้ทางการแพทย์ที่บรรจุไนโตรเจน\nมีสัญลักษณ์สีดำ","inspection":""},{"code":"HBOGH 1.6","critical":false,"detail":"ถังบรรจุก๊าซอัดแรงดัน\n(Compressed Gas Cylinders)\nสำหรับการใช้ทางการแพทย์ที่บรรจุอากาศ\nมีสัญลักษณ์สีเหลือง","inspection":""},{"code":"HBOGH 1.7","critical":false,"detail":"ถังบรรจุก๊าซอัดแรงดัน\n(Compressed Gas Cylinders)\nสำหรับการใช้ทางการแพทย์ที่บรรจุส่วนผสมของก๊าซอื่นนอกเหนือจากออกซิเจนและไนโตรเจน (เช่น Heliox) มีสัญลักษณ์ผสมตามสีของก๊าซแต่ละชนิด","inspection":""},{"code":"HBOGH 1.10","critical":false,"detail":"ถังบรรจุก๊าซแรงดันสูง\n(High-pressure Gas Cylinders) ให้ติดสัญลักษณ์สีไว้บริเวณส่วนบน (Shoulder) ของถัง","inspection":""},{"code":"HBOGH 2.0","critical":true,"detail":"ถังบรรจุก๊าซแรงดันสูง\n(High-pressure Gas Cylinders)\nจัดเก็บในสถานที่ที่กำหนดไว้ ซึ่งมีความปลอดภัยและเข้าถึงได้เฉพาะเจ้าหน้าที่ที่ได้รับอนุญาต","inspection":""},{"code":"HBOGH 2.1","critical":true,"detail":"ถังบรรจุก๊าซแรงดันสูง\n(High-pressure Gas Cylinders)\nไม่เก็บไว้ใกล้วัตถุหรือสารไวไฟ เช่น น้ำมัน จาระบีหรือสารอื่นที่ติดไฟได้ง่าย","inspection":""},{"code":"HBOGH 2.2","critical":true,"detail":"ถังบรรจุก๊าซ (Gas Cylinders) ไม่เก็บในสถานที่ที่มีอุณหภูมิสูงเกิน 125°F  (51.6 °C)","inspection":""},{"code":"HBOGH 2.3","critical":true,"detail":"ถังบรรจุก๊าซ (Gas Cylinders) ได้รับการป้องกันจากการสั่นสะเทือนที่ผิดปกติ (Abnormal Mechanical Shock) ซึ่งอาจทำความเสียหายให้กับถัง วาล์ว หรือวาล์วปล่อยแรงดัน","inspection":""},{"code":"HBOGH 2.4","critical":true,"detail":"การจัดเก็บถังบรรจุก๊าซขนาดใหญ่\n(Large Gas Cylinders)\nต้องยึดไว้ให้มั่นคงเพื่อป้องกันการล้มกระแทก","inspection":""},{"code":"HBOGH 2.5","critical":true,"detail":"การเคลื่อนย้ายถังบรรจุก๊าซขนาดใหญ่\n(Large Gas Cylinders)\nต้องใช้รถเข็นที่สามารถยึดหรือรัดถังให้มั่นคงได้","inspection":""},{"code":"HBOGH 2.6","critical":true,"detail":"หากถังบรรจุก๊าซ (Gas Cylinders) มีขนาดเล็ก\nและมีการจัดเก็บหรือใช้งานในระนาบแนวนอน จะต้องมีอุปกรณ์จับยึดที่ออกแบบมาเพื่อปกป้องวาล์ว (Valve) และส่วนผ่อนแรงดัน (Regulator)","inspection":""},{"code":"HBOGH 2.7","critical":true,"detail":"หากมีที่ปิดป้องกันวาล์ว (Valve Protection) ต้องปิดไว้ตลอดเวลา ยกเว้นเมื่อเปิดใช้งานถังบรรจุก๊าซ (Gas Cylinders)","inspection":""},{"code":"HBOGH 2.8","critical":true,"detail":"ถังบรรจุก๊าซ (Gas Cylinders) ที่ยังไม่ได้ใช้งานจัดเก็บในลักษณะเดียวกันกับที่ได้รับมาจากผู้จัดจำหน่าย","inspection":""},{"code":"HBOGH 2.9","critical":true,"detail":"ถังบรรจุก๊าซเปล่า (Empty Gas Cylinders) และถังที่บรรจุก๊าซอยู่เต็ม (Full Gas Cylinders) ต้องจัดเก็บแยกกัน โดยต้องออกแบบพื้นที่เพื่อให้ถังที่มีอายุจัดเก็บมากกว่าสามารถนำออกไปได้ก่อนและเคลื่อนย้ายถังอื่นให้น้อยที่สุด","inspection":""},{"code":"HBOGH 2.10","critical":true,"detail":"ถังบรรจุก๊าซ (Gas Cylinders) เก็บในสถานที่แห้งที่ได้รับการระบายอากาศ และมีการจัดวางที่ช่วยป้องกันอุบัติเหตุจากการเคลื่อนย้าย","inspection":""},{"code":"HBOGH 2.11","critical":true,"detail":"ต้องใช้อุปกรณ์ลดแรงดัน\n(Pressure-reducing Regulators) เพื่อลดแรงดันก๊าซจากถังบรรจุ (Cylinder) ก่อนส่งไปท่อส่งก๊าซ","inspection":""},{"code":"HBOGH 2.12","critical":true,"detail":"ถังออกซิเจน (Oxygen Cylinders) ต้องมีแรงดันไม่ต่ำกว่า 25 psig","inspection":""},{"code":"HBOGH 2.13","critical":true,"detail":"ถังที่ใช้หมดให้ติดสัญลักษณ์หรือป้าย\n“หมด” (EMPTY)","inspection":""},{"code":"HBOGH 3.0","critical":true,"detail":"ถังบรรจุออกซิเจนเหลว (Liquid Oxygen Cylinders) จัดเก็บอยู่ด้านนอกอาคารหรือในบริเวณที่มีอากาศถ่ายเท","inspection":""},{"code":"HBOGH 3.1","critical":true,"detail":"หากติดตั้งถังบรรจุออกซิเจนเหลว (Liquid Oxygen Cylinders) ไว้ภายในอาคาร การระบายอากาศต้องทำให้ความเข้มข้นของออกซิเจนในบริเวณที่ติดตั้งนั้นไม่สามารถสูงเกินกว่า 23.5%","inspection":""},{"code":"HBOGH 3.2","critical":true,"detail":"เมื่อใช้งานถังบรรจุออกซิเจนเหลว (Liquid Oxygen Cylinders) อุปกรณ์ประกอบ\nเช่น ตัวควบคุม(Regulators) วาล์ว(Valves)\nสายยาง(Hoses) และอุปกรณ์อื่นๆ ต้องได้รับการออกแบบและทำความสะอาด เพื่อใช้กับออกซิเจนเท่านั้น","inspection":""},{"code":"HBOGH 3.3","critical":true,"detail":"เมื่อใช้งานถังบรรจุออกซิเจนเหลว (Liquid Oxygen Cylinders) ต้องใช้อุปกรณ์ป้องกันส่วนบุคคล (อุปกรณ์ปกป้องดวงตา ถุงมือ ฯลฯ) ซึ่งออกแบบมาสำหรับการทำงานกับของเหลวเย็นยวดยิ่ง (Cryogenic Liquids)","inspection":""},{"code":"HBOGH 4.0","critical":true,"detail":"ต้องกำหนดขั้นตอนการตรวจสอบเพื่อระบุชนิดของก๊าซที่บรรจุอยู่ในถังบรรจุก๊าซ (Gas Cylinders) ที่ได้รับมาจากผู้จัดจำหน่ายก่อนการใช้งานทุกครั้ง ยกเว้นถังบรรจุก๊าซ (Gas Cylinders) ที่บรรจุอากาศและออกซิเจนที่ใช้ทางการแพทย์","inspection":"เอกสารแสดงให้เห็นว่าถังบรรจุก๊าซ (Gas Cylinders) ที่มาจากผู้จัดจำหน่ายนั้นมีการตรวจสอบชนิดของก๊าซที่บรรจุอยู่ภายใน"},{"code":"HBOGH 5.0","critical":false,"detail":"ผู้ดูแลก๊าซอัดแรงดันต้องผ่านการอบรมเฉพาะทางด้านการจัดการก๊าซอัดแรงดันอย่างปลอดภัยเท่านั้น","inspection":""},{"code":"HBOGH 5.1","critical":true,"detail":"ต้องมีการติดตั้งป้ายระบุข้อความ “ก๊าซสำหรับใช้ทางการแพทย์: ห้ามสูบบุหรี่หรือจุดเปลวไฟ” (Medical Gases: No Smoking or Open Flame) ที่ประตูของสถานที่ติดตั้งระบบจ่ายก๊าซ (Central Gas Supply Systems)\nหรือ พื้นที่เก็บถังบรรจุก๊าซ ที่บรรจุออกซิเจนและอากาศทางการแพทย์","inspection":""},{"code":"HBOGH 6.0","critical":true,"detail":"ระบบการจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) นั้นให้อยู่สูงจากพื้นดิน บริเวณนอกอาคาร หรืออยู่ในอาคารที่มีโครงสร้างกันไฟ ไม่ติดไฟ หรือป้องกันการติดไฟ มีอากาศถ่ายเทอย่างเหมาะสม และใช้เฉพาะจัดเก็บออกซิเจนเท่านั้น","inspection":""},{"code":"HBOGH 6.1","critical":true,"detail":"สถานที่สำหรับระบบการจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) มีการจัดพื้นที่ไม่ให้ถังบรรจุก๊าซและอุปกรณ์ที่เกี่ยวข้องอยู่ต่ำกว่า หรือใกล้กับสายไฟฟ้าที่ผิดปกติ ท่อลำเลียงของเหลวไวไฟหรือของเหลวที่ลุกไหม้ได้ง่าย หรือท่อลำเลียงก๊าซไวไฟ","inspection":""},{"code":"HBOGH 6.2","critical":true,"detail":"สถานที่สำหรับระบบการจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3)\nมีการจัดพื้นที่ให้เข้าถึงอุปกรณ์เคลื่อนที่ได้โดยง่าย\nและมีเพียงบุคลากรที่ได้รับอนุญาตเท่านั้นจึงจะสามารถเข้าไปยังพื้นที่นี้ได้","inspection":""},{"code":"HBOGH 7.0","critical":true,"detail":"ระยะห่างที่น้อยที่สุดจากระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) กับอาคารที่มีโครงสร้างไม้ คือ 50 ฟุต","inspection":""},{"code":"HBOGH 7.1","critical":true,"detail":"ระยะห่างที่น้อยที่สุดจากระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) กับอาคารที่มีโครงสร้างอื่นนอกเหนือจากไม้ คือ 1 ฟุต","inspection":""},{"code":"HBOGH 7.2","critical":true,"detail":"ระยะห่างที่น้อยที่สุดจากระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) กับประตูของอาคารใดๆ ที่อยู่บริเวณใกล้เคียง คือ 10 ฟุต","inspection":""},{"code":"HBOGH 7.3","critical":true,"detail":"ระยะห่างที่น้อยที่สุดจากระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) กับวัตถุติดไฟเร็ว เช่น เศษไม้หรือกระดาษ คือ 50 ฟุต","inspection":""},{"code":"HBOGH 7.4","critical":true,"detail":"ระยะห่างที่น้อยที่สุดจากระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) กับวัตถุติดไฟช้า เช่น ท่อนซุงขนาดใหญ่ คือ 25 ฟุต","inspection":""},{"code":"HBOGH 7.5","critical":true,"detail":"ระยะห่างที่น้อยที่สุดจากระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) กับพื้นที่ชุมนุมสาธารณะ คือ 50 ฟุต","inspection":""},{"code":"HBOGH 7.6","critical":true,"detail":"ระยะห่างที่น้อยที่สุดจากระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) กับบริเวณที่ไม่มีผู้ป่วยนอกคือ 50 ฟุต โดยวัดเป็นเส้นตรงจากอุปกรณ์ปล่อยแรงดันของถังบรรจุภายในที่ส่งออกไปยังท่อ และจากข้อต่อฟิลลิง (Filling Connection) และข้อต่อลม (Vent Connection)","inspection":""},{"code":"HBOGH 7.7","critical":true,"detail":"ระยะห่างที่น้อยที่สุดจากระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) กับบริเวณทางเดินหรือลานจอดรถ คือ 10 ฟุต","inspection":""},{"code":"HBOGH 7.8","critical":true,"detail":"ระยะห่างที่น้อยที่สุดจากระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) กับเส้นแบ่งพื้นที่ที่อยู่ติดกันใดๆ ซึ่งอาจมีการก่อสร้างขึ้น\nคือ 5 ฟุต","inspection":""},{"code":"HBOGH 8.0","critical":true,"detail":"หากผู้ใช้งานมีการติดตั้งซึ่งจำเป็นต้องใช้งานอุปกรณ์ที่เกี่ยวข้องกับระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) จะต้องมีรายละเอียดขั้นตอนการปฏิบัติงานที่เห็นชัดเจนเตรียมไว้ ณ สถานที่นั้น","inspection":""},{"code":"HBOGH 9.0","critical":true,"detail":"สำหรับการติดตั้งกับระบบจัดเก็บออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) ต้องมีการตรวจสอบระบบเก็บออกซิเจนขนาดใหญ่ทุกปี และกระทำโดยตัวแทนผู้มีคุณสมบัติจากเจ้าของอุปกรณ์","inspection":""},{"code":"HBOGH 9.1","critical":true,"detail":"วัชพืชและหญ้าแห้งไม่อยู่ใกล้กับถังบรรจุออกซิเจนขนาดใหญ่ (มีความจุ >20,000 ft3) ภายในระยะ 15 ฟุต","inspection":""}]},{"sheet":"ความปลอดภัย HBOEC","code_prefix":"HBOEC","title":"14. HYPERBARIC ENVIRONMENT OF CARE","items":[{"code":"HBOEC 1.0","critical":false,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงปฏิบัติตามกฎหมายว่าด้วยการควบคุมอาคาร \nและข้อบัญญัติของจังหวัดที่เกี่ยวข้องเรื่องควบคุมอาคาร","inspection":""},{"code":"HBOEC 2.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงปฏิบัติตามกฎระเบียบป้องกันอัคคีภัยตามกฎหมาย \nที่มีผลบังคับใช้ตามที่เหมาะสม","inspection":""},{"code":"HBOEC 2.1","critical":false,"detail":"ทางเดินจากห้องหรือพื้นที่ที่มีการใช้งานของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงไปสู่ทางออกนั้นควรมีความกว้างโดยไม่มีสิ่งกีดขวางอย่างน้อย 36 นิ้ว (90 เซนติเมตร) และมีความสูงอย่างน้อย 7 ฟุต และมีที่ระยะจากพื้นถึงเพดาน (Headroom) (210 เซนติเมตร) อย่างน้อย  6 ฟุต 8 นิ้ว (200 เซนติเมตร)","inspection":""},{"code":"HBOEC 2.2","critical":false,"detail":"ความกว้างโดยไม่มีสิ่งกีดขวางสำหรับประตูเพื่อการเคลื่อนย้ายออกนั้นไม่น้อยกว่า 28 นิ้ว \n(70 เซนติเมตร)","inspection":""},{"code":"HBOEC 2.3","critical":false,"detail":"ไม่มีบันไดหรือมีบันไดไม่เกิน 3 ขั้น  ระหว่างทางเดินจากห้องหรือพื้นที่ที่มีการใช้งานไปยังทางออกของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOEC 2.5","critical":false,"detail":"พื้นทั้งสองฝั่งของประตูระหว่างพื้นที่ที่มีการใช้งานของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงกับทางออกนั้นอยู่ในระดับที่เท่ากันและมีการยกพื้นที่เท่ากันเป็นระยะทางอย่างน้อยเท่ากับบานประตูข้างที่กว้างที่สุด","inspection":""},{"code":"HBOEC 2.6","critical":true,"detail":"ประตูที่ใช้สำหรับเป็นทางออกนั้นต้องสามารถเปิดกว้างได้ 90 องศา","inspection":""},{"code":"HBOEC 2.6.5","critical":true,"detail":"เส้นทางไปยังทางออกของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงนั้นเห็นได้ชัดเจน (ไม่มีหน้าต่างหรือกระจกติดตั้งอยู่ ซึ่งอาจทำให้ทางเดินไปยังทางออกนั้นไม่ชัดเจนหรืออาจเข้าใจไปผิดไปว่าเป็นทางออก)","inspection":""},{"code":"HBOEC 2.7","critical":true,"detail":"ป้ายทางออกในหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงนั้นต้องสว่างชัดเจนตลอดเวลา","inspection":""},{"code":"HBOEC 2.8","critical":true,"detail":"มีแสงสว่างเพียงพออยู่เสมอ (โดยใช้พลังงานสำรอง) ในบริเวณทางเดินไปยังทางออกทั้งหมดเพื่อให้เป็นเส้นทาง และบริเวณทางเดินนั้นต้องไม่มีสิ่งกีดขวาง (เพื่อป้องกันการหกล้ม หรือสะดุด)","inspection":""},{"code":"HBOEC 2.9","critical":true,"detail":"บุคลากรของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงทั้งหมดสามารถเข้าถึง แผนการปกป้องที่เป็นลายลักษณ์อักษรในกรณีที่เกิดอัคคีภัยในหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง และแผนการเคลื่อนย้ายไปยังพื้นที่หลบภัยจากตัวอาคารเมื่อจำเป็น","inspection":"การวางแผนการจัดการเพื่อปกป้องผู้ที่อยู่ในสถานพยาบาลทุกรายในกรณีที่เกิดอัคคีภัย"},{"code":"HBOEC 2.9.1","critical":true,"detail":"บุคลากรด้านเวชศาสตร์ความดันบรรยากาศสูงทั้งหมดได้รับการอบรมและได้รับการบอกกล่าวถึงบทบาทหน้าที่ที่เกี่ยวข้องกับแผนการอพยพเคลื่อนย้ายคนของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงอยู่เสมอ","inspection":"เอกสารแสดงให้เห็นว่าบุคลากรทั้งหมดได้รับการอบรมและได้รับแจ้งให้ทราบถึงหน้าที่ของตนเองในแผนการอพยพเมื่อเกิดอัคคีภัยในสถานพยาบาลอยู่เสมอ"},{"code":"HBOEC 3.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีอุปกรณ์ดับเพลิงเพื่อควบคุมไฟเฉพาะที่","inspection":""},{"code":"HBOEC 6.0","critical":true,"detail":"หากมีปล่องบันไดอยู่ในหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง ปล่องบันไดนี้จะต้องมีประตูกันไฟ","inspection":""},{"code":"HBOEC 7.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงให้ความรู้บุคลากรด้านเวชศาสตร์ความดันบรรยากาศสูงทั้งหมดเป็นประจำในด้านการใช้อุปกรณ์ดับเพลิงเพื่อความปลอดภัยในกรณีฉุกเฉินอย่างเหมาะสม","inspection":""},{"code":"HBOEC 7.1","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงออกแบบมาและบำรุงรักษาเพื่อให้มั่นใจถึงความปลอดภัยในการอพยพผู้ป่วย และเจ้าหน้าที่นั้นมีความรู้ ผ่านการอบรม และมีประสิทธิภาพในการปฏิบัติตามขั้นตอนการอพยพฉุกเฉิน โดยเฉพาะกับผู้ป่วยที่เคลื่อนย้ายตนเองไม่ได้หรือผู้ที่เคลื่อนย้ายตนเองได้จำกัด","inspection":""},{"code":"HBOEC 7.2","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีการฝึกซ้อมและบันทึกแผนฉุกเฉินสำหรับอัคคีภัยที่เลวร้ายที่สุด อย่างน้อยปีละหนึ่งครั้งสำหรับบุคลากรทั้งที่ทำงานเต็มเวลาและล่วงเวลาทั้งหมด","inspection":"เอกสารแสดงให้เห็นว่าบุคลากรทั้งหมดได้รับการอบรมและได้รับแจ้งให้ทราบถึงหน้าที่ของตนเองในแผนการอพยพเมื่อเกิดอัคคีภัยในสถานพยาบาลอยู่เสมอ"},{"code":"HBOEC 7.2.1","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีส่วนร่วมกับการซ้อมหนีไฟขององค์กร","inspection":""},{"code":"HBOEC 10.0","critical":true,"detail":"มีการบรรเทาเหตุและจัดการกับสภาวะที่ก่อให้เกิดอันตรายจากการลื่น สะดุด หกล้ม ไฟฟ้าดูด การไหม้ การโดนพิษ หรือการบาดเจ็บอื่น ๆโดยการควบคุมทางวิศวกรรมและการบริหารจัดการ","inspection":""},{"code":"HBOEC 11.0","critical":false,"detail":"มีบริเวณต้อนรับ ห้องน้ำ และโทรศัพท์เตรียมไว้ให้อย่างเหมาะสมกับปริมาณผู้ป่วยและผู้มาเยี่ยม","inspection":""},{"code":"HBOEC 13.0","critical":true,"detail":"มีการเตรียมความพร้อมอย่างเหมาะสมในการดูแลผู้ป่วยพิการของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOEC 14.0","critical":true,"detail":"ห้องตรวจ ห้องแต่งตัว และบริเวณต้อนรับมีการก่อสร้างและบำรุงรักษาโดยคำนึงถึงความเป็นส่วนตัวของผู้ป่วยระหว่างการสอบถาม ตรวจสอบ ทำการรักษา และให้คำปรึกษา","inspection":""},{"code":"HBOEC 15.0","critical":true,"detail":"มีแสงสว่างและการระบายอากาศอย่างเพียงพอในทั่วทุกพื้นที่ของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOEC 16.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงนั้นสะอาดและมีการบำรุงรักษาอย่างเหมาะสม","inspection":""},{"code":"HBOEC 17.0","critical":false,"detail":"มีการบริการเครื่องดื่มเตรียมไว้ให้กับผู้ป่วย","inspection":""},{"code":"HBOEC 18.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงได้พัฒนาและใช้แผนสำหรับการบริหารจัดการวัสดุและของเสียที่เป็นอันตราย","inspection":"เอกสารเพื่อตรวจสอบการพัฒนาของแผนและนโยบายการจัดการวัสดุและของเสียอันตราย"},{"code":"HBOEC 19.0","critical":true,"detail":"พื้นที่ของหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงเพียงพอสำหรับการรักษาผู้ป่วย และการทำงานด้านการจัดการและการบริหารภายในสถานพยาบาล","inspection":""},{"code":"HBOEC 20.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงวางแผนและใช้งานแผนการบริการจัดการอุปกรณ์ทางการแพทย์","inspection":"เอกสารเพื่อตรวจสอบแผนการจัดการอุปกรณ์ทางการแพทย์"},{"code":"HBOEC 20.1"," ail":"ผู้ป่วยด้านเวชศาสตร์ความดันบรรยากาศสูงทุกรายในงานวิจัยเพื่อการรักษารับทราบรายละเอียดเกี่ยวกับความไม่สะดวกสบายหรือความเสี่ยงที่อาจเกิดขึ้น","inspection":"เอกสารสนับสนุนการแสดงความยินยอมของผู้ป่วยในการเข้าร่วมวิจัยเพื่อการรักษาซึ่งได้รับอนุมัติจากคณะกรรมการพิจารณาของสถาบัน (Institutional Review Board - IRB)"},{"code":"HBOPR 3.3","critical":true,"detail":"ผู้ป่วยด้านเวชศาสตร์ความดันบรรยากาศสูงทุกรายในงานวิจัยเพื่อการรักษารับทราบรายละเอียดทั้งหมดเกี่ยวกับขั้นตอนที่จะต้องปฏิบัติตาม โดยเฉพาะผู้ที่จัดอยู่ในกลุ่มทดลอง","inspection":"เอกสารสนับสนุนการแสดงความยินยอมของผู้ป่วยในการเข้าร่วมวิจัยเพื่อการรักษาซึ่งได้รับอนุมัติจากคณะกรรมการพิจารณาของสถาบัน (Institutional Review Board - IRB)"},{"code":"HBOPR 3.4","critical":true,"detail":"ผู้ป่วยด้านเวชศาสตร์ความดันบรรยากาศสูงทุกรายที่ได้รับการสอบถามให้เข้าร่วมในงานวิจัยรับทราบว่าตนสามารถปฏิเสธที่จะเข้าร่วมและการปฏิเสธนั้นจะไม่มีส่วนเกี่ยวข้องกับการพิจารณาให้ผู้ป่วยเข้ารับการรักษาด้วยออกซิเจนความดันบรรยากาศสูง","inspection":"เอกสารสนับสนุนการแสดงความยินยอมของผู้ป่วยในการเข้าร่วมวิจัยเพื่อการรักษาซึ่งได้รับอนุมัติจากคณะกรรมการพิจารณาของสถาบัน (Institutional Review Board - IRB)"},{"code":"HBOPR 4.0","critical":true,"detail":"ผู้ป่วยด้านเวชศาสตร์ความดันบรรยากาศสูงรับทราบข้อมูลดังต่อไปนี้\nA. สิทธิผู้ป่วย\nB. หน้าที่และความรับผิดชอบของผู้ป่วย\nC. การบริการด้านเวชศาสตร์ความดันบรรยากาศสูงที่มีให้บริการ\nD. ความเตรียมพร้อมในการดูแลผู้ป่วยนอกเวลาและยามฉุกเฉิน\nE. ค่าใช้จ่ายสำหรับการบริการด้านเวชศาสตร์ความดันบรรยากาศสูง\nF. นโยบายการชำระเงิน (ตามสิทธิการรักษา)\nG. วิธีการส่งข้อแนะนำ/ติชม ให้กับสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"มีเอกสารหรือคลิปวีดีโอแสดงให้เห็นว่าผู้ป่วยด้านเวชศาสตร์ความดันบรรยากาศสูงได้รับการบอกกล่าวข้อมูลต่างๆ เช่น \n- หน้าที่และความรับผิดชอบของผู้ป่วย\n- บริการด้านเวชศาสตร์ความดันบรรยากาศสูงที่มีให้บริการ\n- การให้บริการนอกเวลาและการดูแลฉุกเฉิน\n- ค่าใช้จ่ายในการให้บริการ\n- นโยบายการชำระเงิน\n- วิธีการส่งคำติชม"},{"code":"HBOPR 5.0","critical":false,"detail":"การตลาดหรือการโฆษณาเกี่ยวกับศักยภาพและความสามารถของสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูงไม่มีเนื้อหาหลอกลวงผู้ป่วยด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- ตรวจสอบเนื้อหา โดยจะต้องไม่ขัดต่อ พรบ.สถานพยาบาล พ.ศ.2541 และที่แก้ไขเพิ่มเติม ในส่วนที่เกี่ยวกับการโฆษณาสถานพยาบาล"}]},{"sheet":"การพยาบาล HBOPA","code_prefix":"HBOPA","title":"12. HYPERBARIC PATIENT ASSESSMENT","items":[{"code":"HBOPA 1.0","critical":false,"detail":"ผู้ป่วยแต่ละรายได้รับการประเมินทางด้านกายภาพ จิตวิทยา และสถานภาพทางสังคม","inspection":"นโยบาย ขั้นตอน และกระบวนการที่บันทึกไว้เป็นเอกสารสำหรับการประเมินผู้ป่วยในเบื้องต้นและการติดตามผล"},{"code":"HBOPA 1.1","critical":false,"detail":"ผู้ป่วยแต่ละรายได้รับการประเมินภาวะโภชนาการ หากมีความจำเป็นจากความต้องการหรือสภาวะของผู้ป่วย","inspection":"นโยบาย ขั้นตอน และกระบวนการที่บันทึกไว้เป็นเอกสารสำหรับการประเมินผู้ป่วยในเบื้องต้นและการติดตามผล"},{"code":"HBOPA 1.2","critical":false,"detail":"ผู้ป่วยแต่ละรายได้รับการประเมินความสามารถในการดำเนินชีวิต (functional status) ว่าสามารถช่วยเหลือตัวเองได้มากน้อยแค่ไหน","inspection":"นโยบาย ขั้นตอน และกระบวนการที่บันทึกไว้เป็นเอกสารสำหรับการประเมินผู้ป่วยในเบื้องต้นและการติดตามผล"},{"code":"HBOPA 1.3","critical":true,"detail":"มีการประเมินความเจ็บปวดในผู้ป่วยแต่ละราย","inspection":"นโยบาย ขั้นตอน และกระบวนการที่บันทึกไว้เป็นเอกสารสำหรับการประเมินผู้ป่วยในเบื้องต้นและการติดตามผล"},{"code":"HBOPA 1.4","critical":true,"detail":"มีการตรวจวินิจฉัยที่จำเป็น (diagnostic testing) สำหรับผู้ป่วย (ตามความจำเป็น)","inspection":"นโยบาย ขั้นตอน และกระบวนการที่บันทึกไว้เป็นเอกสารสำหรับการประเมินผู้ป่วยในเบื้องต้นและการติดตามผล"},{"code":"HBOPA 1.5","critical":true,"detail":"ผู้ป่วยแต่ละรายได้รับการประเมินซ้ำในห้วงเวลาที่เหมาะสมตามนโยบายของแต่ละ รพ.","inspection":"มีการติดตาม และประเมินผลก่อนสิ้นสุดการรักษา"},{"code":"HBOPA 1.5.1","critical":true,"detail":"เมื่อมีการเปลี่ยนแปลงสำคัญเกิดขึ้นกับสภาวะของผู้ป่วย แพทย์เวชศาสตร์ความดันบรรยากาศสูงต้องติดต่อแพทย์ประจำของผู้ป่วย","inspection":"- แสดงหลักฐานระบบการปรึกษาแพทย์เฉพาะทาง"},{"code":"HBOPA 2.0","critical":true,"detail":"การประเมินผู้ป่วยในขั้นแรกกระทำตามนโยบายของโรงพยาบาล","inspection":"- ตรวจสอบใบประเมินผู้ป่วยแรกรับ"}]},{"sheet":"การพยาบาล HBOPC","code_prefix":"HBOPC","title":"13. HYPERBARIC PATIENT CARE","items":[{"code":"HBOPC 1.0","critical":true,"detail":"มีการวางแผนการดูแลและรักษาผู้ป่วยเพื่อให้แน่ใจว่าเหมาะสมต่อความต้องการและสภาวะของผู้ป่วย","inspection":"- ตรวจสอบกระบวนการ ขั้นตอน หรือ WI ในการส่งข้อมูลระหว่างฝ่ายการพยาบาล และทีมให้การรักษา โดยต้องมีระบุ จำนวนครั้งในการรักษา และวิธีการรักษา อย่างชัดเจน"},{"code":"HBOPC 1.1","critical":true,"detail":"ในการวางแผนการดูแลและรักษาผู้ป่วย ให้พิจารณารายการดังต่อไปนี้\nA. ประวัติผู้ป่วย\nB. สภาวะทางกายภาพของผู้ป่วย\nC. ข้อมูลการวินิจฉัยโรค\nD. ความเสี่ยงและประโยชน์ของการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- ตรวจสอบกระบวนการ ขั้นตอน หรือ WI ในการส่งข้อมูลระหว่างฝ่ายการพยาบาล และทีมให้การรักษา โดยต้องมีระบุ จำนวนครั้งในการรักษา และวิธีการรักษา อย่างชัดเจน"},{"code":"HBOPC 1.2","critical":true,"detail":"ก่อนได้รับเอกสารแสดงความยินยอมสำหรับการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง, ผู้ป่วยหรือผู้ปกครองตามกฎหมายได้รับการบอกกล่าวถึงความเสี่ยง ประโยชน์ และภาวะแทรกซ้อนที่สัมพันธ์กับการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- เอกสารให้ความยินยอม มีรายละเอียดครอบคลุมถึงความเสี่ยง ประโยชน์ และภาวะแทรกซ้อนที่สัมพันธ์กับการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง"},{"code":"HBOPC 1.3","critical":true,"detail":"มีแผนการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง และบันทึกไว้ในเวชระเบียนของผู้ป่วย ก่อนเริ่มการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- มีระบุในคำสั่งการรักษา หรือเอกสารอื่น ในเวชระเบียน"},{"code":"HBOPC 2.0","critical":false,"detail":"ขั้นตอนการดูแลผู้ป่วย \n(เช่น การทำ Debridement) ต้องกระทำโดยเคารพความเป็นส่วนตัว","inspection":"- นโยบายการให้การพยาบาล และการจัดสถานที่ ที่คำนึงถึงความเป็นส่วนตัว"},{"code":"HBOPC 3.0","critical":false,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงจัดการกับการสั่งยา หรือการซื้อและจัดหายาที่ไม่มีอยู่ในหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- มีแนวทางการจัดการเพื่อให้ผู้ป่วยได้รับยาตามแผนการรักษา"},{"code":"HBOPC 3.1","critical":false,"detail":"การเตรียมและการจ่ายยาเป็นไปตามกฎหมาย กฎระเบียบ สิทธิบัตร และมาตรฐานในการประกอบวิชาชีพ","inspection":"นโยบายและขั้นตอนเกี่ยวกับการสั่งจ่ายยา การจัดหายา การเตรียมยา และการแจกจ่ายยา ภายในหน่วยงาน"},{"code":"HBOPC 3.2","critical":false,"detail":"การเตรียมและการจ่ายยามีการควบคุมอย่างเหมาะสม","inspection":"นโยบายและขั้นตอนเกี่ยวกับการสั่งจ่ายยา การจัดหายา การเตรียมยา และการแจกจ่ายยา ภายในหน่วยงาน"},{"code":"HBOPC 3.3","critical":true,"detail":"มีการจัดยาฉุกเฉินเตรียมอยู่เสมอและมีการควบคุมและเก็บรักษาอย่างปลอดภัยในบริเวณที่ทำการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- มีการเตรียมรถ Emergency ที่มียาและเวชภัณฑ์ที่จำเป็นในกรณีฉุกเฉินไว้ และพร้อมใช้งาน"},{"code":"HBOPC 4.0","critical":true,"detail":"ผู้ให้การดูแลผู้ป่วยทั้งหมดได้รับการอบรม และมีทักษะ ที่จำเป็นและเหมาะสมที่จะทำการบำบัดด้านเวชศาสตร์ความดันบรรยากาศสูงให้เป็นไปอย่างปลอดภัย เหมาะสม และมีจรรยาบรรณ","inspection":"- เอกสารสำหรับตรวจสอบ เช่น ใบรับรอง BLS ACLS PLS ใบประกอบวิชาชีพ"},{"code":"HBOPC 4.1","critical":true,"detail":"แพทย์เวชศาสตร์ความดันบรรยากาศสูง (Clinical Hyperbaric Medicine Physician) จบการศึกษาระดับแพทยศาสตร์บัณฑิต (M.D.หรือ D.O.)  จากโรงเรียนแพทย์ที่ได้รับการรับรอง โดยแพทยสภาประเทศไทย","inspection":""},{"code":"HBOPC 4.1.1","critical":false,"detail":"แพทย์เวชศาสตร์ความดันบรรยากาศสูง (Clinical Hyperbaric Medicine Physician) หรือแพทย์ประจำหน่วยงานควรมีผู้ที่ได้รับวุฒิบัตรหรืออนุมัติบัตรสาขาอายุรศาสตร์หรือศัลย์ศาสตร์","inspection":"- แพทย์เวชศาสตร์ความดันบรรยากาศสูง (Clinical Hyperbaric Medicine Physician) ควรเป็นแพทย์ที่อยู่ภายใต้การรับรองของแพทยสภา เช่นแพทย์ที่ได้รับวุฒิบัตรหรืออนุมัติบัตรสาขาเวชศาสตร์ป้องกัน แขนงเวชศาสตร์ทางทะเล หรือเป็นแพทย์ที่มีคุณสมบัติอื่นตามที่แพทยสภารับรอง ทั้งนี้ควรมีแพทย์ผู้เชี่ยวชาญที่ปรึกษา (Associated Specialist) ที่มีวุฒิบัตรหรืออนุมัติบัตรสาขาอายุรศาสตร์หรือศัลยศาสตร์ เพื่อเกิดประโยชน์สูงสุดในการดูแลผู้ป่วย"},{"code":"HBOPC 4.1.2","critical":false,"detail":"แพทย์เวชศาสตร์ความดันบรรยากาศสูง\n(Clinical Hyperbaric Medicine Physician)\nผ่านการอบรมอย่างน้อยหลักสูตรเวชศาสตร์ความดันบรรยากาศสูงเบื้องต้น (Hyperbaric Medicine Introductory Course) 40 ชั่วโมง ของกรมแพทย์ทหารเรือหรือหลักสูตรที่ได้รับการรับรองจากกรมแพทย์ทหารเรือ และมีการเก็บชั่วโมงปฏิบัติการหรือประสบการณ์ด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"เอกสารแสดงให้เห็นว่าผู้ให้บริการด้านสุขภาพและบุคลากรทางเทคนิคทั้งหมดมีคุณสมบัติอย่างน้อยที่สุดที่กำหนดไว้สำหรับการอบรมด้านเวชศาสตร์ความดันบรรยากาศสูงตามที่จำเป็นสำหรับความเชี่ยวชาญในสายงานของตน"},{"code":"HBOPC 4.1.3","critical":true,"detail":"แพทย์เวชศาสตร์ความดันบรรยากาศสูง \n(Clinical Hyperbaric Medicine Physician) \nมีใบประกอบโรคศิลป์ที่ไม่หมดอายุเพื่อทำงานในประเทศไทย","inspection":""},{"code":"HBOPC 4.1.4","critical":false,"detail":"แพทย์เวชศาสตร์ความดันบรรยากาศสูง\n(Clinical Hyperbaric Medicine Physician)\nได้รับการรับรอง (Credentialed)\nอย่างเฉพาะเจาะจงให้ปฏิบัติงานด้านเวชศาสตร์ความดันบรรยากาศสูง ทางคลินิคในสถานพยาบาลนั้น ๆ ภายใต้คณะกรรมการให้สิทธิพิเศษหรือคณะกรรมการรับรองของสถานพยาบาลนั้น (Privileging or credentials committee)","inspection":"เอกสารแสดงให้เห็นว่าแพทย์นั้นได้รับการรับรองเป็นพิเศษเพื่อประกอบการแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูงเพื่อการรักษา (Clinical Hyperbaric Medicine) ในสถานพยาบาลที่ปฏิบัติงานอยู่"},{"code":"HBOPC 4.1.5","critical":false,"detail":"แพทย์เวชศาสตร์ความดันบรรยากาศสูง  \n(Clinical Hyperbaric Medicine Physician) \nได้รับอนุญาตให้ปฏิบัติงานโดยอิสระ หลังจากผ่านช่วงระยะเวลาการฝึกฝน  ซึ่งแพทย์เวชศาสตร์ความดันบรรยากาศสูง  ได้แสดงให้เห็นถึงศักยภาพอย่างสม่ำเสมอในการรักษา ขั้นตอน และความปลอดภัยของเวชศาสตร์ความดันบรรยากาศสูงเพื่อการรักษา","inspection":""},{"code":"HBOPC 4.1.6","critical":false,"detail":"แพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูงได้รับวุฒิบัตรหรืออนุมัติบัตรจากแพทยสภาในสาขาเวชศาสตร์ป้องกัน แขนงเวชศาสตร์ทางทะเล หรือได้รับการรับรองจากกรมแพทย์ทหารเรือ","inspection":""},{"code":"HBOPC 4.2","critical":true,"detail":"ผู้อำนวยการทางการแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูง (Hyperbaric Medical Director) ต้องมีคุณสมบัติเป็นไปตามข้อ HBO PC 4.1, HBO PC 4.1.2, HBO PC 4.1.3","inspection":"ตรวจสอบตาม\nHBO PC 4.1\nHBO PC 4.1.2\nHBO PC 4.1.3"},{"code":"HBOPC 4.2.2","critical":true,"detail":"ผู้อำนวยการทางการแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูง\n(Hyperbaric Medical Director)\nมีสถานะที่ดี ปฏิบัติตามมาตรฐานวิชาชีพ\nไม่มีปัญหาทางจริยธรรมหรือทางกฏหมายที่ส่งผลต่อความน่าเชื่อถือหรือความสามารถในการปฏิบัติหน้าที่ (good standing) และสามารถสนับสนุนการปฏิบัติงานที่มีมาตรฐานระดับสูงได้","inspection":""},{"code":"HBOPC 4.2.3","critical":true,"detail":"ผู้อำนวยการทางการแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูง\n(Hyperbaric Medical Director) แสดงออกถึงความเป็นผู้นำ ความสามารถในการบริหาร\nการฝึกสอน และการจัดการ","inspection":""},{"code":"HBOPC 4.2.4","critical":true,"detail":"ผู้อำนวยการทางการแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูง (Hyperbaric Medical Director) มีความเข้าใจในข้อบัญญัติและกฎระเบียบที่เกี่ยวข้องกับห้องปรับความดันบรรยากาศสูงประเภทต่าง ๆ ที่ใช้ในหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOPC 4.2.5","critical":true,"detail":"แพทย์เวชศาสตร์ความดันบรรยากาศสูงมีบันทึกเป็นหลักฐานถึงจำนวนชั่วโมงการศึกษาต่อเนื่องไม่น้อยกว่า 12 หรือ 24 หน่วยชั่วโมงการศึกษาต่อ 12 เดือน หรือ 24 เดือน","inspection":""},{"code":"HBOPC 4.3","critical":true,"detail":"แพทย์เวชศาสตร์ความดันบรรยากาศสูงมีบันทึกเป็นหลักฐานถึงจำนวนชั่วโมงการศึกษาต่อเนื่องไม่น้อยกว่า 12 หรือ 24 หน่วยชั่วโมงการศึกษาต่อ 12 เดือน หรือ 24 เดือน","inspection":""},{"code":"HBOPC 4.4","critical":true,"detail":"พยาบาลวิชาชีพด้านเวชศาสตร์ความดันบรรยากาศสูง (Hyperbaric Registered Nurse) มีใบอนุญาตประกอบวิชาชีพพยาบาลของประเทศไทย ที่เป็นปัจจุบัน","inspection":""},{"code":"HBOPC 4.4.1","critical":false,"detail":"พยาบาลวิชาชีพด้านเวชศาสตร์ความดันบรรยากาศสูง (Hyperbaric Registered Nurse) อย่างน้อยผ่านการอบรมหลักสูตรเวชศาสตร์ความดันบรรยากาศสูงเบื้องต้น (Hyperbaric Medicine Introductory Course) 40 ชั่วโมง ของกรมแพทย์ทหารเรือ หรือเทียบเท่าและได้รับการรับรองจากกรมแพทย์ทหารเรือ และได้รับการฝึกงานเพิ่มเติมในหน่วยงานที่ได้รับการรับรองจากกรมแพทย์ทหารเรืออย่างน้อย 2 สัปดาห์","inspection":"- เอกสารแสดงให้เห็นว่าผู้ให้บริการด้านสุขภาพและบุคลากรทางเทคนิคทั้งหมดมีคุณสมบัติตามข้อกำหนด\n- แผนในการฝึกงานเพิ่มเติมในหน่วยงานที่ได้รับการรับรองจากกรมแพทย์ทหารเรืออย่างน้อย 2 สัปดาห์"},{"code":"HBOPC 4.4.2","critical":true,"detail":"พยาบาลวิชาชีพด้านเวชศาสตร์ความดันบรรยากาศสูง (Hyperbaric Registered Nurse) ปัจจุบันได้รับประกาศนียบัตรด้าน BLS ที่เป็นปัจจุบัน เป็นอย่างน้อย","inspection":""},{"code":"HBOPC 4.4.3","critical":true,"detail":"พยาบาลวิชาชีพด้านเวชศาสตร์ความดันบรรยากาศสูง (Hyperbaric Registered Nurse) แสดงให้เห็นถึงความสนใจเรียนรู้ การฝึกฝน และการรักษาประสิทธิภาพของการให้การพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- ตรวจสอบคะแนนการศึกษาต่อเนื่อง\n- หลักฐานการมีส่วนร่วมชั่วโมงวิชาการ"},{"code":"HBOPC 4.4.4","critical":true,"detail":"พยาบาลวิชาชีพด้านเวชศาสตร์ความดันบรรยากาศสูง (Hyperbaric Registered Nurse) ได้รับการรับรองให้เป็น พยาบาลเวชศาสตร์ความดันบรรยากาศสูงที่ผ่านการรับรอง (Certified Hyperbaric Registered Nurse – CHRN) เมื่อได้รับรองจากกรมแพทย์ทหารเรือ หรือสภาการพยาบาลว่ามีคุณสมบัติ","inspection":""},{"code":"HBOPC 4.4.5","critical":false,"detail":"พยาบาลวิชาชีพด้านเวชศาสตร์ความดันบรรยากาศสูงที่ผ่านการรับรอง (Certified Hyperbaric Registered Nurse) ได้รับคะแนนการศึกษาต่อเนื่องอย่างน้อย 50 CNEUs ในระยะเวลา 5 ปีที่ผ่านมา และมีคะแนนการศึกษาต่อเนื่องทางเวชศาสตร์ใต้น้ำและความดันบรรยากาศสูงอย่างน้อย 25 ชั่วโมงการศึกษา","inspection":"- ตรวจสอบคะแนน CNEU\n- ตรวจสอบคะแนน UMCEU\n- ตรวจสอบคะแนน CME \n- หลักฐานการมีส่วนร่วมในชั่วโมงวิชาการ"},{"code":"HBOPC 4.5","critical":true,"detail":"(หากมี) ผู้อำนวยการ/ผู้จัดการ ด้านการพยาบาลเวชศาสตร์ความดันบรรยากาศสูง \n(Hyperbaric Nursing Director/Manager) \nจะต้องผ่านมาตรฐานการอบรมของ HBOPC 4.4.1","inspection":""},{"code":"HBOPC 4.5.1","critical":true,"detail":"(หากมี) ผู้อำนวยการ/ผู้จัดการ ด้านการพยาบาลเวชศาสตร์ความดันบรรยากาศสูง\n(Hyperbaric Nursing Director/Manager)\nจะต้องเป็นพยาบาลวิชาชีพด้านเวชศาสตร์ความดันบรรยากาศสูงที่ผ่านการรับรอง\n(Certified Hyperbaric Registered Nurse)","inspection":""},{"code":"HBOPC 4.5.2","critical":true,"detail":"(หากมี) ผู้อำนวยการ/ผู้จัดการ ด้านการพยาบาลเวชศาสตร์ความดันบรรยากาศสูง\n(Hyperbaric Nursing Director/Manager) จะต้องมีประสบการณ์การปฏิบัติอย่างน้อย\n12 เดือน ในงานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOPC 4.5.3","critical":true,"detail":"(หากมี) ผู้อำนวยการ/ผู้จัดการ ด้านการพยาบาลเวชศาสตร์ความดันบรรยากาศสูง\n(Hyperbaric Nursing Director/Manager)\nจะต้องจบการศึกษาระดับปริญญาตรีสาขาการพยาบาล","inspection":""},{"code":"HBOPC 4.5.4","critical":true,"detail":"(หากมี) ผู้อำนวยการ/ผู้จัดการ ด้านการพยาบาลเวชศาสตร์ความดันบรรยากาศสูง\n(Hyperbaric Nursing Director/Manager)\nต้องมีความรู้ในการปฏิบัติงานเกี่ยวกับข้อบัญญัติและกฎระเบียบที่มีผลบังคับใช้ต่อการปฏิบัติงานหน่วยงานเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOPC 4.5.5","critical":false,"detail":"(หากมี) ผู้อำนวยการ/ผู้จัดการ ด้านการพยาบาลเวชศาสตร์ความดันบรรยากาศสูง\n(Hyperbaric Nursing Director/Manager)\nมีส่วนร่วมในองค์กรวิชาชีพที่เหมาะสมสำหรับงานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- เป็นสมาชิกชมรมเวชศาสตร์ใต้น้ำ และ/หรือ เป็นสมาชิกชมรมเวชศาสตร์ทางทะเล"},{"code":"HBOPC 4.5.6","critical":true,"detail":"(หากมี) ผู้อำนวยการ/ผู้จัดการ ด้านการพยาบาลเวชศาสตร์ความดันบรรยากาศสูง\n(Hyperbaric Nursing Director/Manager)\nได้รับอย่างน้อย   50 CNEUs ในระยะเวลา 5 ปีที่ผ่านมา และมีคะแนนการศึกษาต่อเนื่องทางเวชศาสตร์ใต้น้ำและความดันบรรยากาศสูงอย่างน้อย 25 ชั่วโมงการศึกษา และอย่างน้อย 15 ชั่วโมงการศึกษาต่อเนื่องใน 2 ปีที่ผ่านมา","inspection":"เอกสารแสดงให้เห็นว่าผู้ให้บริการด้านสุขภาพที่ได้รับการรับรองทั้งหมดเป็นไปตามข้อกำหนดอย่างน้อยที่สุดสำหรับการศึกษาต่อเนื่องตามที่จำเป็นสำหรับความเชี่ยวชาญในสายงานของตน"},{"code":"HBOPC 4.5.7","critical":true,"detail":"(หากมี) ผู้อำนวยการ/ผู้จัดการ ด้านการพยาบาลเวชศาสตร์ความดันบรรยากาศสูง\n(Hyperbaric Nursing Director/Manager)\nเข้าร่วมในกิจกรรมการให้ความรู้และความเป็นผู้นำด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":""},{"code":"HBOPC 4.7","critical":true,"detail":"เจ้าหน้าที่ผู้ควบคุมห้องปรับความดันบรรยากาศสูง (Hyperbaric chamber operations staff) ผ่านการอบรมหลักสูตรเทคนิคเวชศาสตร์ใต้น้ำ หรือเทียบเท่า ของกรมแพทย์ทหารเรือหรือหลักสูตรเทคนิคความดันบรรยากาศสูงเบื้องต้นที่มีจำนวนชั่วโมงไม่น้อยกว่า 40 ชม. ที่ได้รับการรับรองจากกรมแพทย์ทหารเรือ หรือเทียบเท่า และได้รับการฝึกงานเพิ่มเติม 40 ชม.","inspection":"- เอกสารแสดงให้เห็นว่าผู้ให้บริการด้านสุขภาพและบุคลากรทางเทคนิคทั้งหมดมีคุณสมบัติตามข้อกำหนด\n- ข้อเสนอแนะ แนวทางการได้รับการฝึกงานเพิ่มเติม 40 ชม.(และผ่านการอบรมหลักสูตร CHOC)"},{"code":"HBOPC 4.7.1","critical":true,"detail":"เจ้าหน้าที่ผู้ควบคุมห้องปรับความดันบรรยากาศสูง (Hyperbaric chamber operations staff) ที่ทำงานในพื้นที่ห้องปรับความดันบรรยากาศสูงต้องมีใบประกอบวิชาชีพในงานที่เกี่ยวข้อง","inspection":""},{"code":"HBOPC 4.7.2","critical":true,"detail":"เจ้าหน้าที่ผู้ควบคุมห้องปรับความดันบรรยากาศสูง (Hyperbaric chamber operations staff) ได้รับประกาศนียบัตรด้าน BLS ที่เป็นปัจจุบัน","inspection":""},{"code":"HBOPC 4.7.3","critical":false,"detail":"เจ้าหน้าที่ผู้ควบคุมห้องปรับความดันบรรยากาศสูง (Hyperbaric chamber operations staff) มีความรู้ที่สามารถนำไปใช้ปฏิงานได้ ในเรื่องข้อกำหนดมาตรฐานความปลอดภัยทางด้านเวชศาสตร์ความดันบรรยากาศสูงที่บังคับใช้ทั้งหมด","inspection":"- Check list การประเมินความรู้"},{"code":"HBOPC 4.7.4","critical":true,"detail":"เจ้าหน้าที่ผู้ควบคุมห้องปรับความดันบรรยากาศสูง (Hyperbaric chamber operations staff) มีความรู้ที่สามารถนำไปใช้ปฏิบัติงานได้ในเรื่องขั้นตอนการลดความดัน (Decompression Procedures)","inspection":"- Check list การประเมินความรู้"},{"code":"HBOPC 4.7.5","critical":true,"detail":"เจ้าหน้าที่ผู้ควบคุมห้องปรับความดันบรรยากาศสูง (Hyperbaric chamber operations staff) ได้รับใบประกาศรับรองจากกองเวชศาสตร์ใต้น้ำและการบิน หรือหน่วยงานอื่นของกรมแพทย์ทหารเรือที่เป็นปัจจุบัน","inspection":"- เอกสารรับรองจากหน่วยงานที่กำหนด"},{"code":"HBOPC 4.7.6","critical":false,"detail":"เจ้าหน้าที่ผู้ควบคุมห้องปรับความดันบรรยากาศสูง (Hyperbaric chamber operations staff มีส่วนร่วมในองค์กรวิชาชีพด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- Check list การประเมินความรู้"},{"code":"HBOPC 4.7.8","critical":false,"detail":"เจ้าหน้าที่ผู้ควบคุมห้องปรับความดันบรรยากาศสูง (Hyperbaric chamber operations staff) ผ่านการอบรมและ/หรือมีประสบการณ์ในการบำรุงรักษาห้องปรับความดันบรรยากาศสูง รวมถึงมีพื้นความรู้ทางเครื่องกลตามความเหมาะสม","inspection":"- เป็นสมาชิกชมรมเวชศาสตร์ใต้น้ำ และ/หรือ เป็นสมาชิกชมรมเวชศาสตร์ทางทะเล"},{"code":"HBOPC 4.8","critical":true,"detail":"ผู้อำนวยการด้านความปลอดภัย (Safety Director)\nผ่านการอบรมหลักสูตรเทคนิคเวชศาสตร์ใต้น้ำและความดันบรรยากาศสูงชั้นสูง ของกรมแพทย์ทหารเรือ หรือเทียบเท่า หรือหลักสูตรเทคนิคความดันบรรยากาศสูงเบื้องต้นหรือหลักสูตรการปฏิบัติการห้องปรับแรงดันบรรยากาศสูงที่มีจำนวนชั่วโมงไม่น้อยกว่า 40 ชม. ที่ได้รับการรับรองจากกรมแพทย์ทหารเรือ และได้รับการฝึกงานอย่างน้อย 4 สัปดาห์","inspection":""},{"code":"HBOPC 4.8.1","critical":false,"detail":"ผู้อำนวยการด้านความปลอดภัย(Safety Director) ผ่านการอบรมหลักสูตรเทคนิคเวชศาสตร์ใต้น้ำและความดันบรรยากาศสูงชั้นสูง ของกรมแพทย์ทหารเรือ หรือหลักสูตรผู้อำนวยการความปลอดภัย ที่กองเวชศาสตร์ใต้น้ำและการบิน กรมแพทย์ทหารเรือให้การรับรอง","inspection":"เอกสารเพื่อตรวจสอบว่าผู้อำนวยการด้านความปลอดภัยได้ผ่านหลักสูตรด้านความปลอดภัยของเวชศาสตร์แรงดันบรรยากาศสูง"},{"code":"HBOPC 4.8.2","critical":false,"detail":"ผู้อำนวยการด้านความปลอดภัย(Safety Director) ได้รับการรับรองจากกองเวชศาสตร์ใต้น้ำและการบิน กรมแพทย์ทหารเรือ ภายใน 1 ปี หลังการได้รับตำแหน่งผู้อำนวยการด้านความปลอดภัย","inspection":"เอกสารเพื่อตรวจสอบว่าผู้อำนวยการด้านความปลอดภัยได้รับการรับรองภายใน 1 ปีหลังจากได้รับการแต่งตั้งเป็นผู้อำนวยการด้านความปลอดภัย\n(อาจเป็นวิชาชีพสายความปลอดภัยโดยตรง)"},{"code":"HBOPC 4.9","critical":true,"detail":"หัวหน้าส่วนงานปรับบรรยากาศ (Hyperbaric Technical Director) (หากมีการแต่งตั้ง) ได้รับการอบรมหลักสูตรเทคนิคเวชศาสตร์ใต้น้ำ ของกรมแพทย์ทหารเรือ หรือเทียบเท่า หรืออย่างน้อยผ่านการอบรมหลักสูตรเวชศาสตร์ความดันบรรยากาศสูงเบื้องต้น (Hyperbaric Medicine Introductory Course) 40 ชั่วโมงซึ่งได้รับรองจากกรมแพทย์ทหารเรือ","inspection": on":"เอกสารแสดงให้เห็นว่าพยาบาลมีส่วนในการช่วยเหลือในการปฏิบัติงานประจำวันอย่างเหมาะสม"},{"code":"HBOPC 6.10","critical":true,"detail":"มีแนวทางปฏิบัติ ครอบคลุมกับการกำซาบ (Perfusion) ของเนื้อเยื่อสมองที่เปลี่ยนแปลงไปซึ่งเกี่ยวข้องกับ\nA. พิษจากคาร์บอนมอนอกไซด์\nB. โรคจากการปรับลดแรงดัน\nC. การติดเชื้อทำให้ตายเฉพาะส่วนอย่างฉับพลัน (Acute Necrotizing Infection)\nD. ภาวะฟองอากาศอุดหลอดเลือด (Gas Embolism)","inspection":"เอกสารแสดงให้เห็นว่าพยาบาลมีส่วนในการช่วยเหลือในการปฏิบัติงานประจำวันอย่างเหมาะสม"},{"code":"HBOPC 6.11","critical":false,"detail":"มีแนวทางปฏิบัติ ครอบคลุมกับการเปลี่ยนที่เกิดขึ้นกับความสบาย สภาพสมดุลของของเหลวและอิเล็กโทรไลต์ ซึ่งเกี่ยวข้องกับอาการคลื่นไส้อาเจียน","inspection":"เอกสารแสดงให้เห็นว่าพยาบาลมีส่วนในการช่วยเหลือในการปฏิบัติงานประจำวันอย่างเหมาะสม"}]},{"sheet":"การพยาบาล HBOPE","code_prefix":"HBOPE","title":"15. HYPERBARIC PATIENT EDUCATION","items":[{"code":"HBOPE 1.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงวางแผนและสนับสนุนการเตรียมการและความร่วมมือในกิจกรรมให้ความรู้กับผู้ป่วย","inspection":"มีเอกสาร สื่อ ให้ความรู้\nแผ่นพับ โฆษณา วีดิโอ\nแบบประเมินความรู้หลังให้คำแนะนำ"},{"code":"HBOPE 1.1","critical":false,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงระบุและเตรียมแหล่งที่จำเป็นสำหรับการบรรลุวัตถุประสงค์ในการให้ความรู้สำหรับผู้ป่วย","inspection":"มีเอกสาร สื่อ ให้ความรู้\nแผ่นพับ โฆษณา วีดิโอ\nแบบประเมินความรู้หลังให้คำแนะนำ"},{"code":"HBOPE 1.2","critical":false,"detail":"ผู้ป่วยได้รับความรู้และการอบรมตามความต้องการ ความสามารถ ความถนัดในการเรียนรู้ และความรู้ของตนเองตามที่ได้ประเมินไว้ ในการเรียนรู้อย่างเหมาะสมสำหรับการดูแลรักษาและบริการที่ทางหน่วยงานเวชศาสตร์ความดันบรรยากาศสูงจัดเตรียมไว้ให้","inspection":"มีเอกสาร สื่อ ให้ความรู้\nแผ่นพับ โฆษณา วีดิโอ\nแบบประเมินความรู้หลังให้คำแนะนำ"},{"code":"HBOPE 1.3","critical":false,"detail":"ผู้ป่วยได้รับความรู้เกี่ยวกับโภชนาการ การปรับอาหาร และอื่น ๆ ตามความเหมาะสม","inspection":"มีแนวทางการดูแลผู้ป่วยที่มีภาวะพร่องโภชนาการอย่างชัดเจน"},{"code":"HBOPE 1.4","critical":false,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงให้ความรู้ผู้ป่วยในเรื่องการใช้งานอุปกรณ์ทางการแพทย์ให้เหมาะสมและมีประสิทธิภาพตามความเหมาะสม","inspection":"นโยบายขั้นตอนการใช้อุปกรณ์ในการรักษา เช่น Mask Hood"},{"code":"HBOPE 1.5","critical":true,"detail":"ผู้ป่วยได้รับความรู้ในเรื่องแหล่งข้อมูล วิธีการได้รับการรักษาต่อ การบริการ หรือการรักษาอื่น ๆเพื่อให้ตรงกับความต้องการของผู้ป่วย ตามความเหมาะสม","inspection":"มีเอกสาร สื่อ ให้ความรู้\nแผ่นพับ โฆษณา วีดิโอ\nแบบประเมินความรู้หลังให้คำแนะนำ"},{"code":"HBOPE 1.6","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงให้ความรู้ผู้ป่วยเกี่ยวกับบทบาทหน้าที่ของผู้ป่วยในการรักษาด้วยห้องปรับความดันบรรยากาศสูง","inspection":"ปฐมนิเทศน์ผู้ป่วยและญาติ"},{"code":"HBOPE 1.7","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีการให้ความรู้ที่เกี่ยวกับการดูแลตนเองกับผู้ป่วย ตามความเหมาะสม","inspection":"ความรู้ ก่อน ขณะ และหลังรับการรักษา"},{"code":"HBOPE 1.8","critical":true,"detail":"พยาบาลเข้าไปช่วยเหลือเพื่อให้ความรู้ผู้ป่วยในเรื่องความกังวลอันอันเกิดจากการรับทราบขั้นตอนการบำบัดรักษาด้วยออกซิเจนแรงดันบรรยากาศสูงที่ยังไม่ครบถ้วน","inspection":"นโยบายและขั้นตอนที่เกี่ยวกับการให้ความรู้ผู้ป่วย"},{"code":"HBOPE 1.9","critical":false,"detail":"พยาบาลเข้าไปช่วยเหลือเพื่อให้ความรู้ผู้ป่วยในเรื่องการดูแลสุขภาพที่อาจเปลี่ยนแปลงไปอาจเนื่องมาจากการรักษาบาดแผลเรื้อรัง","inspection":"นโยบายและขั้นตอนที่เกี่ยวกับการให้ความรู้ผู้ป่วย"},{"code":"HBOPE 1.10","critical":true,"detail":"พยาบาลเข้าไปช่วยเหลือเพื่อให้ความรู้ผู้ป่วยในเรื่องการดูแลสุขภาพที่อาจเปลี่ยนแปลงไปอาจเนื่องมาจากการรักษาโรคที่เกิดจากการปรับลดแรงดัน","inspection":"นโยบายและขั้นตอนที่เกี่ยวกับการให้ความรู้ผู้ป่วย"},{"code":"HBOPE 1.11","critical":true,"detail":"พยาบาลเข้าไปช่วยเหลือเพื่อให้ความรู้ผู้ป่วยในเรื่องการดูแลสุขภาพที่อาจเปลี่ยนแปลงไปอาจเนื่องมาจากภาวะอาการเป็นพิษจากคาร์บอนมอนอกไซด์","inspection":"นโยบายและขั้นตอนที่เกี่ยวกับการให้ความรู้ผู้ป่วย"}]},{"sheet":"การพยาบาล HBOIM","code_prefix":"HBOIM","title":"20. HYPERBARIC INFORMATION MANAGEMENT","items":[{"code":"HBOIM 1.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงพัฒนาและรักษาระบบสำหรับการจัดการ ดำเนินการ บำรุงรักษา จัดเก็บ และแจกจ่ายเวชระเบียนผู้ป่วย","inspection":"- นโยบายการจัดเก็บและส่งต่อ เวชระเบียนของหน่วยงาน / รพ."},{"code":"HBOIM 2.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงจัดทำบันทึกการรักษาส่วนบุคคลสำหรับผู้ป่วยแต่ละรายเพื่อการประเมินในการรับการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- เอกสารรับใหม่ / สมุดบัญชีรายชื่อผู้ป่วยทั้งรับใหม่และจำหน่าย"},{"code":"HBOIM 2.1","critical":true,"detail":"มีเพียงบุคลากรด้านเวชศาสตร์ความดันบรรยากาศสูงเท่านั้นที่ได้รับอนุญาตให้กรอกรายละเอียดในเวชระเบียนผู้ป่วย","inspection":"ตรวจสอบเวชระเบียน / OPD Card / เวชระเบียนผู้ป่วยนอก"},{"code":"HBOIM 2.2","critical":true,"detail":"รายละเอียดในเวชระเบียนผู้ป่วยประกอบไปด้วยข้อต่อไปนี้ (กำหนดให้มีเพิ่มได้)\nA. วันที่ ผู้ให้บริการ และอาชีพ (MD, RN, ฯลฯ)\nB. วัตถุประสงค์ของการประเมินหรือการรักษา\nC. ผลการรักษา\nD. การวินิจฉัยหรือการประเมิน\nE. การศึกษา เช่น TCOM, Laboratory, ฯลฯ\nF. การบำบัดที่ใช้\nG. แนวโน้มการรักษา คำแนะนำ และแนวทางต่าง ๆ ที่ให้กับผู้ป่วย\nH. การรับรองและการตรวจสอบเนื้อหาโดยผู้ปฏิบัติงานด้านเวชศาสตร์ความดันบรรยากาศสูงหากจำเป็น","inspection":"ตรวจสอบเวชระเบียน / OPD Card / เวชระเบียนผู้ป่วยนอก"},{"code":"HBOIM 3.0","critical":true,"detail":"มีการแต่งตั้งเจ้าหน้าที่ด้านเวชศาสตร์ความดันบรรยากาศสูงหนึ่งรายให้ดูแลเวชระเบียนผู้ป่วย โดยมีหน้าที่ความรับผิดชอบดังนี้\n(กำหนดให้มีเพิ่มได้)\nA. ความลับ ความปลอดภัย และสภาพทางกายภาพของเวชระเบียน\nB. การค้นหาเวชระเบียนผู้ป่วยเมื่อมีการร้องขอ\nC. เลขประจำตัวที่แตกต่างกันของแต่ละเวชระเบียนผู้ป่วย\nD. การควบคุมดูแลการรวบรวม ดำเนินการ บำรุงรักษา จัดเก็บ ค้นหา และส่งต่อเวชระเบียนผู้ป่วย\nE. การรักษารูปแบบเวชระเบียนด้านเวชศาสตร์ความดันบรรยากาศสูงซึ่งมีการกำหนด จัดระเบียบ และรักษาความปลอดภัยไว้แล้ว","inspection":"- คำสั่งแต่งตั้ง Job assignment JDJS"},{"code":"HBOIM 4.0","critical":false,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีนโยบายที่เหมาะสมสำหรับเวชระเบียนผู้ป่วย ตามรายการดังนี้ (กำหนดให้มีเพิ่มได้)\nA. การเก็บรักษาเวชระเบียนที่ยังคงใช้งานอยู่\nB. การคัดเวชระเบียนที่ไม่ใช้งานออกไป\nC. การกรอกข้อมูลในเวชระเบียนตรงตามเวลา\nD. การให้ข้อมูลที่มีอยู่ในเวชระเบียน\nE. ความถี่ในการตรวจสอบเวชระเบียน","inspection":"- นโยบายของสถานพยาบาล การบันทึก / การทำลายเวชระเบียน ตามห้องเวลาที่กำหนดของโรงพยาบาลนั้นๆ"},{"code":"HBOIM 4.1","critical":false,"detail":"หากมิได้กำหนดโดยกฎหมายเป็นอย่างอื่น เนื้อหาและรูปแบบของเวชระเบียนการรักษาด้านเวชศาสตร์ความดันบรรยากาศสูง รวมทั้งลำดับของข้อมูลนั้นเป็นแบบเดียวกัน","inspection":"- นโยบายของสถานพยาบาล การบันทึก / การทำลายเวชระเบียน ตามห้องเวลาที่กำหนดของโรงพยาบาลนั้นๆ"},{"code":"HBOIM 4.2","critical":true,"detail":"รายงาน ประวัติ ลักษณะทางกายภาพ บันทึกความก้าวหน้า และข้อมูลผู้ป่วยที่เกี่ยวข้องอื่น ๆ มีการตรวจสอบและรวบรวมลงในเวชระเบียนผู้ป่วยอย่างตรงเวลา","inspection":"- ตรวจสอบรายละเอียด / ความชัดเจนของเวชระเบียนผู้ป่วย\n- การสุ่มตรวจเวชระเบียนจากคณะกรรมการของ รพ."},{"code":"HBOIM 4.3","critical":true,"detail":"กรอกข้อมูลในเวชระเบียนผู้ป่วยให้อ่านได้ชัดเจน","inspection":"- ตรวจสอบรายละเอียด / ความชัดเจนของเวชระเบียนผู้ป่วย\n- การสุ่มตรวจเวชระเบียนจากคณะกรรมการของ รพ."},{"code":"HBOIM 5.0","critical":true,"detail":"เวชระเบียนผู้ป่วยมีการตรวจสอบเป็นประจำเพื่อความสมบูรณ์และความถูกต้องของเวลาของข้อมูล และมีการปฏิบัติเพื่อพัฒนาคุณภาพและความตรงเวลาของเอกสารซึ่งส่งผลต่อการดูแลผู้ป่วย","inspection":"- ตรวจสอบรายละเอียด / ความชัดเจนของเวชระเบียนผู้ป่วย\n- การสุ่มตรวจเวชระเบียนจากคณะกรรมการของ รพ."}]},{"sheet":"การพยาบาล HBOIP","code_prefix":"HBOIP","title":"21. HYPERBARIC INFECTION PREVENTION","items":[{"code":"HBOIP 1.0","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงมีขั้นตอนความร่วมมือเพื่อลดความเสี่ยงในการติดเชื้อในโรงพยาบาลซึ่งเป็นโรคติดเชื้อประจำถิ่นและเป็นโรคระบาดในบรรดาผู้ป่วย เจ้าหน้าที่ และผู้มาเยี่ยม","inspection":"นโยบายของสถานพยาบาล / แนวทางควบคุมการติดเชื้อของสถานพยาบาลด้านเวชศาสตร์ความดันบรรยากาศสูง"},{"code":"HBOIP 1.1","critical":true,"detail":"บุคลากรด้านเวชศาสตร์ความดันบรรยากาศสูงหนึ่งรายหรือมากกว่านั้นมีหน้าที่ดำเนินการขั้นตอนการควบคุมการติดเชื้อ","inspection":"- เอกสารการแต่งตั้งเจ้าหน้าที่รับผิดชอบ/ผู้ดูแล ให้ดูแลงาน IC โดยเฉพาะ ทั้งการประสานการปฏิบัติร่วมกับ รพ. และควบคุมแนวทางการปฏิบัติด้าน IC ของ HBOT"},{"code":"HBOIP 1.2","critical":true,"detail":"หน่วยงานเวชศาสตร์ความดันบรรยากาศสูงทำหน้าที่ควบคุมการระบาดของโรคติดเชื้อจากโรงพยาบาลเมื่อมีการตรวจพบเจอ","inspection":""}]},{"sheet":"การพยาบาล HBOMS","code_prefix":"HBOMS","title":"22. HYPERBARIC MEDICAL STAFF","items":[{"code":"HBOMS 1.0","critical":false,"detail":"ผู้อำนวยการทางการแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูง (Hyperbaric Medicine Director) มีขีดความสามารถและศักยภาพที่เหมาะสม และมีกระบวนการการรับรอง จากคณะกรรมการ","inspection":""},{"code":"HBOMS 1.1","critical":true,"detail":"บุคลากรทางการแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูงทั้งหมดเข้าร่วมในกิจกรรมการศึกษาต่อเนื่องที่เกี่ยวข้องกับการปฏิบัติงานของแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- การเก็บคะแนน UMCEU ของเจ้าหน้าที่"},{"code":"HBOMS 1.1.1","critical":true,"detail":"มีเอกสารบันทึกการมีส่วนร่วมในกิจกรรมการศึกษาต่อเนื่องของเจ้าหน้าที่ทางการแพทย์ด้านเวชศาสตร์ความดันบรรยากาศสูง","inspection":"- เอกสารบันทึกรายชื่อผู้เข้าร่วมกิจกรรมการศึกษาต่อเนื่อง / ประชุมวิชาการ / Medical Actitvities\n- ใบ Certificate การอบรมเพิ่มเติมในสาขาที่เกี่ยวข้องกับการดูแลรักษาผู้ป่วยเวชศาสตร์ความดันบรรยากาศสูง"}]}]}];

const $ = (id) => document.getElementById(id);
let allRows = [];

function onAdminUnitChange() {
  const sel = $('f-unit-sel'), txt = $('f-unit');
  const isOther = sel.value === '__other__';
  txt.style.display = isOther ? '' : 'none';
  if (!isOther) txt.value = '';
}
function getAdminUnit() {
  const sel = $('f-unit-sel');
  return sel.value === '__other__' ? $('f-unit').value.trim() : sel.value;
}

function toggleNotPassed(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '▲ ซ่อนเนื้อหา' : '▼ ดูเนื้อหา';
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadData() {
  if (!API_URL) { alert('ยังไม่ได้ตั้งค่า API_URL ในไฟล์ Dashboard'); return; }
  const unit = getAdminUnit();
  const date = $('f-date').value;
  $('summary-area').innerHTML = '<div class="loading">กำลังโหลดข้อมูล...</div>';
  try {
    const url = API_URL + '?action=list' + (unit ? '&unit=' + encodeURIComponent(unit) : '') + (date ? '&date=' + encodeURIComponent(date) : '');
    const res = await fetch(url);
    const j = await res.json();
    if (!j.ok) { $('summary-area').innerHTML = '<div class="empty">ผิดพลาด: ' + escapeHtml(j.error) + '</div>'; return; }
    allRows = j.rows;
    render();
  } catch (e) {
    $('summary-area').innerHTML = '<div class="empty">เชื่อมต่อ server ไม่ได้: ' + escapeHtml(e.message) + '</div>';
  }
}

// อัพเดต: รวมข้อมูลโดย item เพื่อคำนวณคะแนนเฉลี่ย (ใช้ใน category summary)
function aggregateByItem() {
  const m = {};
  const itemMeta = {};
  DATA.forEach(cat => cat.sections.forEach(sec => sec.items.forEach(item => {
    itemMeta[item.code] = { category: cat.category, section_code: sec.code_prefix, section_title: sec.title,
                            detail: item.detail, critical: item.critical };
  })));
  allRows.forEach(r => {
    if (!m[r.item_code]) m[r.item_code] = { rows: [] };
    m[r.item_code].rows.push(r);
  });
  Object.keys(m).forEach(code => {
    const rs = m[code].rows;
    const scored = rs.filter(r => !r.skipped && r.score !== null && r.score !== undefined);
    const sum = scored.reduce((s, r) => s + r.score, 0);
    m[code].avg = scored.length ? sum / scored.length : null;
    m[code].count = scored.length;
    m[code].code = code;
    Object.assign(m[code], itemMeta[code] || {});
  });
  return m;
}

function categoryStats(aggregated) {
  const cats = { 'อำนวยการ': { items: [], inspectors: new Set() },
                 'ความปลอดภัย': { items: [], inspectors: new Set() },
                 'การพยาบาล': { items: [], inspectors: new Set() } };
  Object.values(aggregated).forEach(it => { if (cats[it.category]) cats[it.category].items.push(it); });
  allRows.forEach(r => { if (cats[r.group]) cats[r.group].inspectors.add(r.inspector_name); });
  Object.keys(cats).forEach(k => {
    const c = cats[k];
    const items = c.items.filter(i => i.avg !== null);
    c.totalItems = c.items.length;
    c.scoredItems = items.length;
    c.sumAvg = items.reduce((s, i) => s + i.avg, 0);
    c.maxScore = items.length * 4;
    c.percent = c.maxScore ? (c.sumAvg / c.maxScore * 100) : 0;
    c.gradeAvg = c.scoredItems ? (c.sumAvg / c.scoredItems) : 0;
    c.criticalFail = items.filter(i => i.critical && i.avg < 3).length;
    c.notPassedItems = items.filter(i => i.avg !== null && i.avg >= 2 && i.avg < 3);
  });
  return cats;
}

// ใหม่: รวมข้อมูลโดย (section, inspector) เพื่อสร้างตารางผู้ตรวจรายหัวข้อ
function aggregateBySectionInspector() {
  // result: { sectionCode: { inspector_name: { scored: [], skipped: [], section_submitted: bool, group: string } } }
  const result = {};
  allRows.forEach(r => {
    const sec = r.section_code;
    const ins = r.inspector_name;
    if (!sec || !ins) return;
    if (!result[sec]) result[sec] = {};
    if (!result[sec][ins]) result[sec][ins] = { scored: [], skipped: [], submitted: false, group: r.group };
    if (r.skipped) {
      result[sec][ins].skipped.push(r.item_code);
    } else if (r.score !== null && r.score !== undefined) {
      result[sec][ins].scored.push(r.item_code);
    }
    if (r.section_submitted) result[sec][ins].submitted = true;
  });
  return result;
}

function render() {
  const agg = aggregateByItem();
  const cats = categoryStats(agg);
  const inspectorMap = aggregateBySectionInspector();

  let totalSum = 0, totalMax = 0, totalScored = 0, totalCritFail = 0;
  Object.values(cats).forEach(c => {
    totalSum += c.sumAvg; totalMax += c.maxScore;
    totalScored += c.scoredItems; totalCritFail += c.criticalFail;
  });
  const allInspectors = new Set();
  allRows.forEach(r => allInspectors.add(r.inspector_name));
  const gradeAvg = totalScored ? (totalSum / totalScored).toFixed(2) : '0.00';

  let html = `
  <div class="card overall-card">
    <h2>สรุปภาพรวมทั้งหน่วยงาน</h2>
    <div class="grid">
      <div class="stat"><b>${totalSum.toFixed(2)}</b><small>คะแนนรวม (จากค่าเฉลี่ย)</small></div>
      <div class="stat"><b>${totalMax}</b><small>คะแนนเต็ม</small></div>
      <div class="stat"><b>${totalMax ? (totalSum/totalMax*100).toFixed(2) : '0.00'}%</b><small>เปอร์เซ็นต์</small></div>
      <div class="stat"><b>${gradeAvg} / 4</b><small>เกรดเฉลี่ยรวม</small></div>
      <div class="stat"><b>${totalScored}</b><small>ข้อที่ตรวจแล้ว</small></div>
      <div class="stat"><b style="color:#ffd166">${totalCritFail}</b><small>ข้อบังคับ (*) ที่ยังไม่ผ่าน</small></div>
      <div class="stat"><b>${allInspectors.size}</b><small>ผู้ตรวจทั้งหมด</small></div>
    </div>
  </div>
  <div class="cat-cards">`;
  let idx = 0;
  ['อำนวยการ','ความปลอดภัย','การพยาบาล'].forEach(catName => {
    idx++;
    const c = cats[catName];
    const insp = Array.from(c.inspectors);
    const npId = 'np-' + catName;
    const notPassedHtml = c.notPassedItems.length > 0
      ? `<div class="not-passed-list" id="${npId}">
          <div class="not-passed-title">
            <span>⚠ ข้อที่ไม่ผ่าน (คะแนน 2–2.99) — ${c.notPassedItems.length} ข้อ</span>
            <button class="np-toggle-btn" onclick="toggleNotPassed('${npId}', this)">▼ ดูเนื้อหา</button>
          </div>
          <div class="not-passed-items">
            ${c.notPassedItems.map(i =>
              `<div class="not-passed-item">
                <span class="not-passed-code">${escapeHtml(i.code)}</span>
                <span class="not-passed-detail">${escapeHtml(i.detail)}</span>
                <span class="not-passed-score">${i.avg.toFixed(2)}</span>
              </div>`
            ).join('')}
          </div>
        </div>`
      : '';
    html += `<div class="card cat-card cat-${idx}">
      <h3>${catName}</h3>
      <div class="big">${c.sumAvg.toFixed(2)} / ${c.maxScore}</div>
      <div class="mini">${c.maxScore ? (c.sumAvg/c.maxScore*100).toFixed(2) : '0.00'}% &nbsp;•&nbsp; เกรดเฉลี่ย ${c.gradeAvg.toFixed(2)}/4 &nbsp;•&nbsp; ตรวจแล้ว ${c.scoredItems}/${c.totalItems} ข้อ &nbsp;•&nbsp; ไม่ผ่านข้อบังคับ ${c.criticalFail}</div>
      <div class="inspectors">ผู้ตรวจ (${insp.length}): ${escapeHtml(insp.join(', ')) || '-'}</div>
      ${notPassedHtml}
    </div>`;
  });
  html += '</div>';

  html += '<div class="tabs">';
  ['อำนวยการ','ความปลอดภัย','การพยาบาล'].forEach((c, i) => {
    html += `<div class="tab ${i===0?'active':''}" data-tab="tab-${i}">${c}</div>`;
  });
  html += '</div>';

  ['อำนวยการ','ความปลอดภัย','การพยาบาล'].forEach((catName, i) => {
    html += `<div class="tab-pane ${i===0?'active':''}" id="tab-${i}">`;
    html += buildInspectorTables(catName, inspectorMap);
    html += '</div>';
  });

  $('summary-area').innerHTML = html;
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.tab).classList.add('active');
    });
  });
}

function buildInspectorTables(catName, inspectorMap) {
  let html = '';
  const cat = DATA.find(c => c.category === catName);
  if (!cat) return '';
  cat.sections.forEach(sec => {
    const sectionCode = sec.code_prefix;
    const totalItems = sec.items.length;
    const sectionInspectors = inspectorMap[sectionCode] || {};
    const inspectorNames = Object.keys(sectionInspectors).filter(name =>
      sectionInspectors[name].group === catName
    );

    html += `<div class="section-block">
      <div class="section-block-header">
        <span>${escapeHtml(sectionCode)} — ${escapeHtml(sec.title)}</span>
        <span class="total-info">ข้อทั้งหมด ${totalItems} ข้อ &nbsp;•&nbsp; ผู้ตรวจ ${inspectorNames.length} คน</span>
      </div>`;

    if (inspectorNames.length === 0) {
      html += '<div class="empty" style="padding:20px;">ยังไม่มีผู้ตรวจในหัวข้อนี้</div></div>';
      return;
    }

    html += '<table><thead><tr>'
      + '<th>ชื่อผู้ตรวจ</th>'
      + '<th class="center">ข้อที่ตรวจแล้ว</th>'
      + '<th class="center">ข้อทั้งหมด</th>'
      + '<th class="center">ข้อที่ข้าม</th>'
      + '<th class="center">สถานะส่ง</th>'
      + '<th>ข้อที่ต้องตรวจให้ครบ</th>'
      + '</tr></thead><tbody>';

    inspectorNames.forEach(name => {
      const data = sectionInspectors[name];
      const scoredCount = data.scored.length;
      const skippedCount = data.skipped.length;
      const submitted = data.submitted;

      // หาข้อที่ยังไม่ทำ (ไม่ตรวจ และไม่ข้าม)
      const doneCodes = new Set([...data.scored, ...data.skipped]);
      const missingCodes = sec.items
        .filter(it => !doneCodes.has(it.code))
        .map(it => it.code);

      const completionPercent = totalItems ? Math.round((scoredCount + skippedCount) / totalItems * 100) : 0;
      const completionClass = (scoredCount + skippedCount) === totalItems ? '' : 'partial';

      let statusBadge;
      if (submitted) {
        statusBadge = '<span class="status-text submitted">✓ ส่งแล้ว</span>';
      } else if (scoredCount + skippedCount > 0) {
        statusBadge = '<span class="status-text in-progress">⏳ กำลังตรวจ</span>';
      } else {
        statusBadge = '<span class="status-text pending">-</span>';
      }

      // ข้อที่ต้องตรวจ - แสดงเฉพาะเมื่อ submitted = true
      let missingDisplay;
      if (!submitted) {
        missingDisplay = '<span class="strike">(ยังไม่กดส่ง)</span>';
      } else if (missingCodes.length === 0) {
        missingDisplay = '<span class="check-box" title="ตรวจครบทุกข้อ">✓</span> <span style="color:var(--success);font-size:12px;">ครบ</span>';
      } else {
        missingDisplay = '<div class="missing-codes">' +
          missingCodes.map(c => `<span class="missing-code">${escapeHtml(c)}</span>`).join('') +
          '</div>';
      }

      html += `<tr>
        <td><b>${escapeHtml(name)}</b></td>
        <td class="center">
          <div class="completion-cell">
            <span><b>${scoredCount}</b></span>
            <div class="completion-bar"><div class="completion-fill ${completionClass}" style="width:${completionPercent}%"></div></div>
          </div>
        </td>
        <td class="center">${totalItems}</td>
        <td class="center">${skippedCount > 0 ? skippedCount : '<span class="strike">-</span>'}</td>
        <td class="center">${statusBadge}</td>
        <td>${missingDisplay}</td>
      </tr>`;
    });

    html += '</tbody></table>';

    // ตรวจสอบความสอดคล้อง: ผู้ตรวจทุกคนต้องให้คะแนน/ข้าม ในข้อเดียวกัน
    if (inspectorNames.length >= 2) {
      const scoredBy = {}, skippedBy = {};
      inspectorNames.forEach(name => {
        const d = sectionInspectors[name];
        d.scored.forEach(code => { (scoredBy[code] = scoredBy[code] || []).push(name); });
        d.skipped.forEach(code => { (skippedBy[code] = skippedBy[code] || []).push(name); });
      });
      const mismatches = sec.items.filter(it => scoredBy[it.code] && skippedBy[it.code]);
      if (mismatches.length > 0) {
        html += `<div class="skip-mismatch">
          <div class="skip-mismatch-title">⚠ ข้อที่ผู้ตรวจตัดสินใจไม่ตรงกัน (บางคนให้คะแนน บางคนข้าม) — ${mismatches.length} ข้อ</div>
          ${mismatches.map(it => `<div class="skip-mismatch-row">
            <span class="skip-mismatch-code">${escapeHtml(it.code)}</span>
            <span class="skip-mismatch-detail">ให้คะแนน: ${escapeHtml(scoredBy[it.code].join(', '))} &nbsp;|&nbsp; ข้าม: ${escapeHtml(skippedBy[it.code].join(', '))}</span>
          </div>`).join('')}
        </div>`;
      } else {
        html += '<div class="skip-ok">✓ ผู้ตรวจทุกคนให้คะแนน/ข้าม ตรงกันทุกข้อ</div>';
      }
    }

    html += '</div>';
  });
  return html;
}

function exportXLSX() {
  if (allRows.length === 0) { alert('ยังไม่มีข้อมูล'); return; }
  const agg = aggregateByItem();
  const inspectorMap = aggregateBySectionInspector();
  const cats = categoryStats(agg);
  const wb = XLSX.utils.book_new();

  // Sheet 1: Summary
  const sumRows = [
    ['สรุปผลการตรวจมาตรฐานหน่วยงาน HBO'],
    ['หน่วยงาน', getAdminUnit() || 'ทั้งหมด'],
    ['วันที่', $('f-date').value || 'ทั้งหมด'],
    ['สร้างเมื่อ', new Date().toLocaleString('th-TH')],
    [],
    ['กลุ่ม','คะแนนรวม(จากค่าเฉลี่ย)','คะแนนเต็ม','เปอร์เซ็นต์','จำนวนข้อตรวจแล้ว','จำนวนข้อทั้งหมด','ข้อบังคับไม่ผ่าน']
  ];
  ['อำนวยการ','ความปลอดภัย','การพยาบาล'].forEach(k => {
    const c = cats[k];
    sumRows.push([k, c.sumAvg.toFixed(2), c.maxScore, c.maxScore ? (c.sumAvg/c.maxScore*100).toFixed(2) + '%' : '-',
                  c.scoredItems, c.totalItems, c.criticalFail]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(sumRows);
  ws1['!cols'] = [{wch:18},{wch:22},{wch:14},{wch:14},{wch:18},{wch:18},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws1, 'สรุป');

  // Sheet 2: Inspector by Section
  const insHeader = ['หมวด','หัวข้อ (รหัส)','หัวข้อ (ชื่อ)','ชื่อผู้ตรวจ','ข้อที่ตรวจแล้ว','ข้อทั้งหมด','ข้อที่ข้าม','สถานะส่ง','ข้อที่ต้องตรวจให้ครบ'];
  const insRows = [insHeader];
  DATA.forEach(cat => {
    cat.sections.forEach(sec => {
      const sectionInspectors = inspectorMap[sec.code_prefix] || {};
      const names = Object.keys(sectionInspectors).filter(n => sectionInspectors[n].group === cat.category);
      if (names.length === 0) {
        insRows.push([cat.category, sec.code_prefix, sec.title, '(ยังไม่มีผู้ตรวจ)', 0, sec.items.length, 0, '-', '-']);
        return;
      }
      names.forEach(name => {
        const d = sectionInspectors[name];
        const doneCodes = new Set([...d.scored, ...d.skipped]);
        const missing = sec.items.filter(it => !doneCodes.has(it.code)).map(it => it.code);
        const status = d.submitted ? 'ส่งแล้ว' : ((d.scored.length + d.skipped.length) > 0 ? 'กำลังตรวจ' : '-');
        const missingDisplay = d.submitted ? (missing.length === 0 ? 'ครบ' : missing.join(', ')) : '(ยังไม่กดส่ง)';
        insRows.push([cat.category, sec.code_prefix, sec.title, name,
                      d.scored.length, sec.items.length, d.skipped.length, status, missingDisplay]);
      });
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(insRows);
  ws2['!cols'] = [{wch:14},{wch:10},{wch:30},{wch:22},{wch:14},{wch:12},{wch:12},{wch:14},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws2, 'สรุปต่อผู้ตรวจ');

  // Sheet 3: Detail by item (averages)
  const detailHeader = ['หมวด','รหัสกลุ่ม','รหัสข้อ','วิกฤต','รายละเอียด','คะแนนเฉลี่ย','จำนวนผู้ตรวจ'];
  const detailRows = [detailHeader];
  DATA.forEach(cat => {
    cat.sections.forEach(sec => {
      sec.items.forEach(item => {
        const it = agg[item.code];
        detailRows.push([cat.category, sec.code_prefix, item.code, item.critical ? '*' : '',
          item.detail,
          it && it.avg !== null ? it.avg.toFixed(2) : '',
          it ? it.count : 0]);
      });
    });
  });
  const ws3 = XLSX.utils.aoa_to_sheet(detailRows);
  ws3['!cols'] = [{wch:14},{wch:10},{wch:14},{wch:7},{wch:50},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws3, 'คะแนนรายข้อ');

  // Sheet 4: Raw data
  const rawHeader = ['timestamp','unit','date','group','inspector','item_code','section','critical','score','skipped','note','photo_urls','section_submitted'];
  const rawRows = [rawHeader].concat(allRows.map(r => [r.timestamp, r.unit, r.inspection_date, r.group,
    r.inspector_name, r.item_code, r.section_code, r.is_critical ? 'YES' : '',
    r.score === null ? '' : r.score, r.skipped ? 'YES' : '', r.note, (r.photo_urls||[]).join(' | '),
    r.section_submitted ? 'YES' : '']));
  const ws4 = XLSX.utils.aoa_to_sheet(rawRows);
  XLSX.utils.book_append_sheet(wb, ws4, 'ข้อมูลดิบ');

  const date = $('f-date').value || new Date().toISOString().slice(0,10);
  const unit = (getAdminUnit() || 'all').replace(/[^\w\u0E00-\u0E7F-]/g, '_');
  XLSX.writeFile(wb, `HBO_Summary_${unit}_${date}.xlsx`);
}

$('btn-load').addEventListener('click', loadData);
$('btn-export').addEventListener('click', exportXLSX);

$('f-date').valueAsDate = new Date();

function buildNotPassedPrintPage() {
  if (!allRows.length) { $('print-notpassed-page').innerHTML = ''; return; }
  const agg = aggregateByItem();
  const cats = categoryStats(agg);
  const unit = getAdminUnit() || '-';
  const date = $('f-date').value || '-';

  let html = `
    <div style="text-align:center;border-bottom:2px solid #333;padding-bottom:10px;margin-bottom:18px;">
      <div style="font-size:15px;font-weight:700;">รายการข้อที่ไม่ผ่าน (คะแนน 2 – 2.99)</div>
      <div style="font-size:12px;color:#555;margin-top:4px;">หน่วยงาน: ${escapeHtml(unit)} &nbsp;|&nbsp; วันที่ตรวจ: ${escapeHtml(date)}</div>
    </div>`;

  ['อำนวยการ','ความปลอดภัย','การพยาบาล'].forEach(catName => {
    const c = cats[catName];
    html += `<div class="np-print-cat">
      <div class="np-print-cat-title">ด้าน${escapeHtml(catName)}</div>`;
    if (!c.notPassedItems.length) {
      html += `<div class="np-print-empty">— ไม่มีข้อที่ไม่ผ่าน —</div>`;
    } else {
      html += `<table class="np-print-table">
        <thead><tr>
          <th style="width:110px">รหัสข้อ</th>
          <th>รายละเอียด</th>
          <th style="width:70px;text-align:center">คะแนนเฉลี่ย</th>
        </tr></thead><tbody>
        ${c.notPassedItems.map(i => `<tr>
          <td><span class="np-code-tag">${escapeHtml(i.code)}</span></td>
          <td>${escapeHtml(i.detail)}</td>
          <td style="text-align:center;color:#b45309;font-weight:700">${i.avg.toFixed(2)}</td>
        </tr>`).join('')}
        </tbody></table>`;
    }
    html += `</div>`;
  });

  $('print-notpassed-page').innerHTML = html;
}

$('btn-print').addEventListener('click', () => { buildNotPassedPrintPage(); window.print(); });
